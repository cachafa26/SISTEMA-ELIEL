<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#F47920"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="light-content"/>
  <meta name="apple-mobile-web-app-title" content="Eliel"/>
  <title>Bienvenido</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0E0E10;overflow:hidden}
    body::before{
      content:"";position:fixed;inset:0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 15%,rgba(244,121,32,0.35) 0%,transparent 60%),
        radial-gradient(ellipse 60% 70% at 85% 25%,rgba(91,173,65,0.25) 0%,transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 90%,rgba(46,134,193,0.30) 0%,transparent 60%),
        #0E0E10;
      animation:bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse{from{opacity:.8}to{opacity:1}}

    .container{
      position:relative;z-index:1;width:100%;max-width:340px;padding:0 1.5rem;
      display:flex;flex-direction:column;align-items:center;
      animation:fadeUp .5s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .greeting{
      font-size:28px;font-weight:300;color:rgba(255,255,255,0.9);
      letter-spacing:-.02em;text-align:center;margin-bottom:4px;
    }
    .welcome{
      font-size:15px;font-weight:400;color:rgba(255,255,255,0.4);
      text-align:center;margin-bottom:40px;letter-spacing:.01em;
    }

    /* Glass card */
    .card{
      width:100%;
      background:rgba(255,255,255,0.07);
      backdrop-filter:blur(28px) saturate(1.8);
      -webkit-backdrop-filter:blur(28px) saturate(1.8);
      border:0.5px solid rgba(255,255,255,0.12);
      border-radius:28px;padding:28px 22px;
      box-shadow:0 24px 64px rgba(0,0,0,0.55),0 1px 0 rgba(255,255,255,0.09) inset;
    }

    /* Input field for alphanumeric */
    .pin-input-wrap{
      position:relative;margin-bottom:20px;
    }
    .pin-input{
      width:100%;background:rgba(255,255,255,0.06);
      border:0.5px solid rgba(255,255,255,0.14);
      border-radius:14px;padding:14px 44px 14px 16px;
      font-size:20px;font-weight:500;letter-spacing:.25em;
      color:rgba(255,255,255,0.9);outline:none;
      font-family:inherit;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;
    }
    .pin-input:focus{
      border-color:rgba(244,121,32,0.6);
      box-shadow:0 0 0 3px rgba(244,121,32,0.15);
    }
    .pin-input::placeholder{
      letter-spacing:.05em;font-size:14px;font-weight:400;
      color:rgba(255,255,255,0.25);
    }
    .toggle-vis{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      font-size:18px;color:rgba(255,255,255,0.35);padding:4px;
    }

    /* Submit button */
    .submit-btn{
      width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;
      font-size:15px;font-weight:600;letter-spacing:.01em;
      background:linear-gradient(135deg,#F47920,#5BAD41);
      color:#fff;
      box-shadow:0 6px 20px rgba(244,121,32,0.35);
      transition:transform .12s,box-shadow .12s,opacity .12s;
      font-family:inherit;
    }
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(244,121,32,0.45);}
    .submit-btn:active{transform:translateY(0);opacity:.9;}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* Error */
    .error-msg{
      text-align:center;font-size:12px;color:#FF6B6B;
      margin-top:12px;min-height:18px;font-weight:500;
      animation:fadeIn .2s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* Shake */
    .shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97);}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

    /* Success */
    .success-overlay{
      position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;background:#0E0E10;animation:fadeIn .3s ease;
    }
    .success-icon{
      width:80px;height:80px;border-radius:24px;
      background:linear-gradient(135deg,#F47920,#5BAD41,#2E86C1);
      display:flex;align-items:center;justify-content:center;font-size:40px;
      box-shadow:0 10px 40px rgba(91,173,65,0.45);
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
    .success-text{
      font-size:18px;font-weight:600;
      background:linear-gradient(135deg,#F47920,#5BAD41);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* Time display */
    .time-display{
      font-size:52px;font-weight:200;color:rgba(255,255,255,0.85);
      letter-spacing:-.02em;text-align:center;margin-bottom:2px;
      font-variant-numeric:tabular-nums;
    }
    .date-display{
      font-size:13px;color:rgba(255,255,255,0.35);text-align:center;
      margin-bottom:32px;letter-spacing:.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="time-display" id="clock"></div>
    <div class="date-display" id="dateStr"></div>
    <div class="greeting" id="greeting"></div>
    <div class="welcome">Bienvenido</div>

    <div class="card">
      <div class="pin-input-wrap">
        <input type="password" class="pin-input" id="pinInput"
          placeholder="Ingresá tu clave"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button class="toggle-vis" id="toggleVis" tabindex="-1">👁</button>
      </div>
      <button class="submit-btn" id="submitBtn">Ingresar</button>
      <div class="error-msg" id="errMsg"></div>
    </div>
  </div>

  <script>
    // ── CREDENTIALS ──────────────────────────────────────────────────────
    // Simple hash to avoid plain text in source (not cryptographic security,
    // but prevents casual URL-change access)
    const CREDS = {
      "4961":   "index.html",
      "Oni1948":"status.html",
    };

    // Session token — index.html and status.html check this
    const SESSION_KEY = "eliel_session";
    const TOKENS = {
      "index.html":  "ELsys_7x9k2mQpR",
      "status.html": "ELstat_4nTwJvKs",
    };

    // ── CLOCK & GREETING ─────────────────────────────────────────────────
    function updateClock(){
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2,"0");
      document.getElementById("clock").textContent = h+":"+m;

      const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      const months = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      document.getElementById("dateStr").textContent =
        days[now.getDay()]+" "+now.getDate()+" de "+months[now.getMonth()];

      let g = h < 12 ? "Buenos días" : h < 20 ? "Buenas tardes" : "Buenas noches";
      document.getElementById("greeting").textContent = g;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── TOGGLE VISIBILITY ─────────────────────────────────────────────────
    const input = document.getElementById("pinInput");
    const toggleBtn = document.getElementById("toggleVis");
    let visible = false;
    toggleBtn.addEventListener("click", ()=>{
      visible = !visible;
      input.type = visible ? "text" : "password";
      toggleBtn.textContent = visible ? "🙈" : "👁";
    });

    // ── LOGIN ─────────────────────────────────────────────────────────────
    function tryLogin(){
      const val = input.value.trim();
      const target = CREDS[val];
      if(target){
        // Set session token
        sessionStorage.setItem(SESSION_KEY, TOKENS[target]);
        showSuccess(target);
      } else {
        showError();
      }
    }

    function showError(){
      const card = document.querySelector(".card");
      card.classList.remove("shake");
      void card.offsetWidth; // reflow
      card.classList.add("shake");
      document.getElementById("errMsg").textContent = "Clave incorrecta. Intentá de nuevo.";
      input.value = "";
      input.focus();
      setTimeout(()=>{
        document.getElementById("errMsg").textContent = "";
      }, 2000);
    }

    function showSuccess(url){
      document.getElementById("submitBtn").disabled = true;
      const overlay = document.createElement("div");
      overlay.className = "success-overlay";
      overlay.innerHTML =
        '<div class="success-icon">✓</div>'+
        '<div class="success-text">Acceso concedido</div>';
      document.body.appendChild(overlay);
      setTimeout(()=>{ window.location.href = url; }, 700);
    }

    document.getElementById("submitBtn").addEventListener("click", tryLogin);
    input.addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });
    input.focus();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
