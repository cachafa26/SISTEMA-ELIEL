                </div>
                <div style={{height:5,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:(v/maxCat*100)+"%",background:catColors[i%catColors.length],borderRadius:3,transition:"width .3s"}}/>
                </div>
              </div>
            ))
          }
        </div>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:500,marginBottom:12,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Ingresos por módulo</div>
          {fuentes.map(f=>(
            <div key={f.n} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{color:"var(--color-text-primary)"}}>{f.n}</span>
                <span style={{color:"var(--color-text-secondary)",fontWeight:500}}>${fmt(f.v)}</span>
              </div>
              <div style={{height:5,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:(f.v/maxFuente*100)+"%",background:f.c,borderRadius:3,transition:"width .3s"}}/>
              </div>
            </div>
          ))}
          {totalIngresos>0&&(
            <div style={{marginTop:14,padding:"8px 10px",background:totalGastos/totalIngresos>0.7?"var(--color-background-danger)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",fontSize:12,color:totalGastos/totalIngresos>0.7?"var(--color-text-danger)":"var(--color-text-secondary)"}}>
              Gastado: <strong>{fmtPct(totalGastos/totalIngresos*100)}</strong> de los ingresos
            </div>
          )}
        </div>
      </div>

      {/* ── PRESUPUESTO MENSUAL ── */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)"}}>Presupuesto mensual — {["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][mesActual]}</div>
          <button onClick={()=>setShowPresupuesto(s=>!s)} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>+ Límite</button>
        </div>
        {showPresupuesto&&(
          <div style={{background:"rgba(120,120,128,0.06)",borderRadius:"var(--r-md)",padding:"12px",marginBottom:12,border:"0.5px solid var(--glass-border)"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Categoría</label><select value={presupCat} onChange={e=>setPresupCat(e.target.value)}><option value="">Elegir...</option>{CATS_GASTO.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Límite mensual ($)</label><input type="number" value={presupMonto} onChange={e=>setPresupMonto(e.target.value)} placeholder="0"/></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={guardarPresupuesto} style={{fontSize:12,padding:"6px 14px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#F47920,#5BAD41)",color:"#fff",fontWeight:600,cursor:"pointer"}}>Guardar</button>
              <button onClick={()=>setShowPresupuesto(false)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        )}
        {Object.keys(presupuestos).length===0?<div style={{fontSize:12,color:"var(--text-secondary)",padding:"4px 0"}}>Sin presupuestos definidos. Agregá límites por categoría.</div>:(
          <div style={{display:"grid",gap:8}}>
            {Object.entries(presupuestos).map(([cat,limite])=>{
              const gastado=gastosMes.filter(g=>g.cat===cat).reduce((a,g)=>a+g.monto,0);
              const pct=limite>0?Math.min(100,(gastado/limite)*100):0;
              const over=gastado>limite;
              return(
                <div key={cat}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                    <span style={{color:"var(--text-primary)",fontWeight:500}}>{cat}</span>
                    <span style={{color:over?"var(--text-danger)":"var(--text-secondary)"}}>${fmt(gastado)} / ${fmt(limite)}{over?" ⚠":""}</span>
                  </div>
                  <div style={{height:5,background:"rgba(120,120,128,0.15)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:over?"var(--text-danger)":pct>80?"var(--text-warning)":"var(--text-success)",borderRadius:3,transition:"width .4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{marginTop:12,paddingTop:10,borderTop:"0.5px solid var(--glass-border)",fontSize:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"var(--text-secondary)"}}>Total gastado este mes:</span>
          <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(totalGastosMes)}</span>
        </div>
      </div>

      {/* ── PROYECCIÓN DE INGRESOS ── */}
      <div style={{background:"var(--bg-tint-blue)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:12}}>Proyección de ingresos — próximos 30 días</div>
        {(()=>{
          const djConfirmados=(data.dj?.eventos||[]).filter(e=>(e.estado==="Confirmado"||e.estado==="Señado")&&e.saldo>0).reduce((a,e)=>a+e.saldo,0);
          const djSenas=(data.dj?.eventos||[]).filter(e=>e.estado==="Señado"&&e.sena>0).reduce((a,e)=>a+e.sena,0);
          const bhEstimado=bhSueldo;
          const sc30Pesos=pendienteRetiro*(blue||1450);
          const totalEstimado=djConfirmados+bhEstimado+sc30Pesos;
          const items=[
            {l:"DJ — saldo pendiente (confirmados)",v:djConfirmados,show:djConfirmados>0},
            {l:"BH Trade — sueldo mes actual",v:bhEstimado,show:bhEstimado>0},
            {l:"Mi 30% SC (en pesos)",v:sc30Pesos,show:sc30Pesos>0},
          ].filter(i=>i.show);
          return items.length===0?<div style={{fontSize:12,color:"var(--text-info)"}}>Cargá eventos DJ, despachos BH y ventas SC para ver la proyección.</div>:(
            <div>
              {items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid rgba(46,134,193,0.2)",fontSize:13}}>
                  <span style={{color:"var(--text-info)"}}>{item.l}</span>
                  <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(item.v)}</span>
                </div>
              ))}
              <div style={{marginTop:10,display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700}}>
                <span style={{color:"var(--text-info)"}}>Total estimado</span>
                <span style={{color:"var(--text-primary)"}}>${fmt(totalEstimado)}</span>
              </div>
              <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:6}}>* Estimación basada en datos actuales. No garantiza ingresos reales.</div>
            </div>
          );
        })()}
      </div>

      {/* Lista gastos */}
      {gastos.length>0&&(
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Historial de gastos</div>
          {[...gastos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(g=>(
            <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:"var(--color-text-primary)",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.desc}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>
                  {g.fecha} · {g.cat} · {g.fuente}
                  {g.moneda==="USD"&&g.cotiz&&<span style={{color:"var(--color-text-info)"}}> · {fmtUSD(g.montoOriginal||0)} @ ${fmt(g.cotiz)}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,marginLeft:12}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-danger)"}}>-${fmt(g.monto)}</div>
                  {g.moneda==="USD"&&<div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{fmtUSD(g.montoOriginal||0)}</div>}
                </div>
                <button onClick={()=>eliminar(g.id)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"2px 4px",borderRadius:4,lineHeight:1}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// MODAL PEDIDO (SC)
// ══════════════════════════════════════════════════════════════════════════
function PedidoModal({data,save,blue,onClose,showToast,clienteIdx}){
  const [cliente,setCliente]=useState("");
  const [fecha,setFecha]=useState(hoy());
  const [tc,setTc]=useState(blue?String(Math.round(blue)):"1450");
  const [items,setItems]=useState([{nombre:ARTS[0],cantidad:"",precioUnitario:"",moneda:"ARS"}]);
  const [pagoTotal,setPagoTotal]=useState("");
  const [pagoCompleto,setPagoCompleto]=useState(false);
  const [entrega,setEntrega]=useState("Retira Once");
  const [datosExp,setDatosExp]=useState({nombre:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:""});
  const [preview,setPreview]=useState(null);
  const [errores,setErrores]=useState([]);

  const handleCliente=val=>{
    setCliente(val);
    if(clienteIdx[val]&&clienteIdx[val].direccion){
      setDatosExp({nombre:clienteIdx[val].nombre||val,dni:clienteIdx[val].dni||"",direccion:clienteIdx[val].direccion||"",localidad:clienteIdx[val].localidad||"",provincia:clienteIdx[val].provincia||"",expreso:clienteIdx[val].expreso||""});
    }
  };

  const addItem=()=>setItems([...items,{nombre:ARTS[0],cantidad:"",precioUnitario:"",moneda:"ARS"}]);
  const updItem=(i,f,v)=>{const its=[...items];its[i]={...its[i],[f]:v};setItems(its);};
  const remItem=i=>setItems(items.filter((_,idx)=>idx!==i));
  const calcARS=it=>it.moneda==="USD"?Number(it.precioUnitario||0)*Number(tc):Number(it.precioUnitario||0);
  const totalPedido=items.reduce((a,it)=>a+calcARS(it)*Number(it.cantidad||0),0);

  useEffect(()=>{if(pagoCompleto)setPagoTotal(String(Math.round(totalPedido)));else setPagoTotal("");},[pagoCompleto,totalPedido]);

  const generarPreview=()=>{
    if(!cliente.trim()){showToast("Ingresá el nombre del cliente");return;}
    const itemsN=items.filter(it=>it.cantidad&&it.precioUnitario).map(it=>({nombre:it.nombre,cantidad:Number(it.cantidad),precioUnitario:calcARS(it)}));
    if(!itemsN.length){showToast("Agregá al menos un artículo");return;}
    const res=distribuir(itemsN,data.contenedores,data.ventas);
    setErrores(res.errores);
    if(res.errores.length){setPreview(null);return;}
    setPreview(res);
  };

  const confirmar=()=>{
    if(!preview)return;
    const resultado=preview.resultado;
    const totalG=resultado.reduce((a,r)=>a+r.subtotal,0);
    const pagoN=Number(pagoTotal||0);const tcN=Number(tc)||1450;const pid=Date.now().toString();
    const nuevasVentas=resultado.map(r=>{
      const prop=totalG>0?(r.subtotal/totalG)*pagoN:0;
      const estado=entrega==="Expreso"?"A despachar":entrega.includes("Ezeiza")?"A retirar Ezeiza":"A retirar Once";
      return{id:pid+Math.random().toString(36).slice(2,5),contId:r.contId,fecha,articulo:r.artNombre,cantidad:r.cantidad,cliente,precioVenta:r.precioUnitario,total:r.subtotal,usd:r.subtotal/tcN,pago:prop,tipoCambioUsado:tcN,pedidoId:pid,entrega,estado};
    });
    let newData={...data,ventas:[...(data.ventas||[]),...nuevasVentas]};
    if(entrega==="Expreso"){
      const desp={id:pid,fecha,cliente:datosExp.nombre||cliente,dni:datosExp.dni,direccion:datosExp.direccion,localidad:datosExp.localidad,provincia:datosExp.provincia,expreso:datosExp.expreso,estado:"Pendiente",pedidoId:pid,articulos:resultado.map(r=>r.artNombre+" x"+r.cantidad).join(", ")};
      newData={...newData,despachos:[...(data.despachos||[]),desp]};
    }
    // Persist client data
    if(datosExp.nombre||datosExp.dni||datosExp.direccion){
      newData={...newData,clientes:{...(newData.clientes||{}),[cliente]:{nombre:datosExp.nombre||cliente,dni:datosExp.dni||"",direccion:datosExp.direccion||"",localidad:datosExp.localidad||"",provincia:datosExp.provincia||"",expreso:datosExp.expreso||""}}};
    }
    save(newData);showToast("Pedido cargado ✓");onClose();
  };

  const clienteSuggs=Object.keys(clienteIdx);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"1rem"}}>
      <div style={{background:"var(--color-background-primary)",borderRadius:16,width:"100%",maxWidth:600,padding:"1.75rem",margin:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.35)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem",borderBottom:"1px solid #e8e8e8",paddingBottom:"1rem"}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:600,margin:0,color:"var(--color-text-primary)"}}>Nuevo pedido</h2>
            <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:"3px 0 0"}}>Completá los datos y el sistema distribuye automáticamente</p>
          </div>
          <button onClick={onClose} style={{border:"1px solid #ddd",background:"rgba(120,120,128,0.08)",cursor:"pointer",fontSize:15,color:"var(--color-text-secondary)",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1rem"}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Cliente</label>
            <div style={{marginTop:3}}>
              <Autocomplete value={cliente} onChange={handleCliente} suggestions={clienteSuggs} placeholder="Nombre del cliente"/>
            </div>
          </div>
          <div><label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Fecha</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={{width:"100%",marginTop:3,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,color:"var(--color-text-secondary)"}}>{blue?"Blue · $"+fmt(blue):"Blue ($/USD)"}</label><input type="number" value={tc} onChange={e=>setTc(e.target.value)} style={{width:"100%",marginTop:3,boxSizing:"border-box"}}/></div>
        </div>

        <div style={{background:"rgba(120,120,128,0.08)",borderRadius:10,padding:"12px",marginBottom:"1rem"}}>
          <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"var(--color-text-primary)"}}>Artículos</p>
          {items.map((it,i)=>(
            <div key={i} style={{background:"var(--color-background-primary)",borderRadius:8,padding:"10px",marginBottom:8,border:"1px solid #eee"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>Artículo {i+1}</span>
                {items.length>1&&<button onClick={()=>remItem(i)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:12}}>✕</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 70px",gap:6}}>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Artículo</label><select value={it.nombre} onChange={e=>updItem(i,"nombre",e.target.value)} style={{width:"100%",marginTop:2,fontSize:12}}>{ARTS.map(a=><option key={a}>{a}</option>)}</select></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cant.</label><input type="number" value={it.cantidad} onChange={e=>updItem(i,"cantidad",e.target.value)} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Precio</label><input type="number" value={it.precioUnitario} onChange={e=>updItem(i,"precioUnitario",e.target.value)} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Moneda</label><select value={it.moneda} onChange={e=>updItem(i,"moneda",e.target.value)} style={{width:"100%",marginTop:2,fontSize:12}}><option value="ARS">$ARS</option><option value="USD">USD</option></select></div>
              </div>
              {it.cantidad&&it.precioUnitario&&<div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:5}}>Subtotal: ${fmt(calcARS(it)*Number(it.cantidad))} · {fmtUSD(calcARS(it)*Number(it.cantidad)/Number(tc||1450))}</div>}
            </div>
          ))}
          <button onClick={addItem} style={{fontSize:12,padding:"5px 10px",borderRadius:6,cursor:"pointer",border:"1px solid #ddd",background:"transparent",color:"var(--color-text-secondary)"}}>+ Artículo</button>
        </div>

        {totalPedido>0&&<div style={{background:"rgba(120,120,128,0.08)",borderRadius:8,padding:"10px 12px",marginBottom:"1rem",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Total del pedido</span>
          <span style={{fontWeight:500,fontSize:15}}>${fmt(totalPedido)} · {fmtUSD(totalPedido/Number(tc||1450))}</span>
        </div>}

        <div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Pago recibido ($ARS)</label>
          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
            <input type="number" value={pagoTotal} onChange={e=>{setPagoTotal(e.target.value);setPagoCompleto(false);}} style={{flex:1,boxSizing:"border-box"}} placeholder="0"/>
            <button onClick={()=>setPagoCompleto(p=>!p)} style={{whiteSpace:"nowrap",fontSize:12,padding:"7px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"1px solid #ddd",background:pagoCompleto?"var(--color-text-success)":"var(--color-background-primary)",color:pagoCompleto?"var(--color-background-primary)":"var(--color-text-secondary)",fontWeight:pagoCompleto?500:400}}>
              {pagoCompleto?"✓ Pago total":"Pago total"}
            </button>
          </div>
        </div>

        <div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Tipo de entrega</label>
          <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
            {["Expreso","Retira Ezeiza","Retira Once"].map(e=>(
              <button key={e} onClick={()=>setEntrega(e)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"1px solid "+(entrega===e?"var(--color-border-info)":"var(--color-border-tertiary)"),background:entrega===e?"var(--color-background-info)":"var(--color-background-primary)",color:entrega===e?"var(--color-text-info)":"var(--color-text-secondary)",fontWeight:entrega===e?500:400}}>
                {e==="Expreso"?"🚚 Expreso":e==="Retira Ezeiza"?"📍 Ezeiza":"📍 Once"}
              </button>
            ))}
          </div>
        </div>

        {entrega==="Expreso"&&(
          <div style={{background:"var(--color-background-info)",borderRadius:10,padding:"12px",marginBottom:"1rem"}}>
            <p style={{fontSize:12,fontWeight:500,margin:"0 0 8px",color:"var(--color-text-info)"}}>Datos para expreso</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{k:"nombre",l:"Nombre completo",full:true},{k:"dni",l:"DNI"},{k:"expreso",l:"Expreso"},{k:"direccion",l:"Dirección",full:true},{k:"localidad",l:"Localidad"},{k:"provincia",l:"Provincia"}].map(f=>(
                <div key={f.k} style={f.full?{gridColumn:"1/-1"}:{}}>
                  <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>{f.l}</label>
                  <input value={datosExp[f.k]} onChange={e=>setDatosExp({...datosExp,[f.k]:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
          </div>
        )}

        {errores.length>0&&(
          <div style={{background:"var(--color-background-danger)",border:"1px solid #f5c6c6",borderRadius:10,padding:"10px 14px",marginBottom:"1rem"}}>
            <p style={{fontSize:13,fontWeight:700,margin:"0 0 4px",color:"var(--color-text-danger)"}}>⚠️ Stock insuficiente</p>

}

function TabArmado({cont,updateCont,showToast}){
  const [form,setForm]=useState({nombre:ARTS[0],gramaje:"",ancho:"1.6",largo:"600",cantidad:"",precio:"",moneda:"RMB"});
  const [editId,setEditId]=useState(null);
  const LIMITE=25500;
  const esTinta=n=>n.includes("TINTA");
  const submit=()=>{
    if(!form.cantidad||!form.precio){showToast("Completá cantidad y precio");return;}
    const isT=esTinta(form.nombre);
    const artData={...form,id:editId||Date.now().toString(),cantidad:Number(form.cantidad),precio:Number(form.precio),gramaje:isT?0:Number(form.gramaje),ancho:isT?0:Number(form.ancho),largo:isT?0:Number(form.largo)};
    const arts=editId?(cont.articulos||[]).map(a=>a.id===editId?artData:a):[...(cont.articulos||[]),artData];
    const pt=arts.reduce((a,x)=>a+pesoRollo(x)*Number(x.cantidad),0);
    if(pt>LIMITE){showToast("⚠️ Excede 25.500 kg");return;}
    updateCont({...cont,articulos:arts,pesoTotal:pt});
    setEditId(null);setForm({nombre:ARTS[0],gramaje:"",ancho:"1.6",largo:"600",cantidad:"",precio:"",moneda:"RMB"});
    showToast(editId?"Actualizado":"Artículo agregado");
  };
  const startEdit=art=>{setEditId(art.id);setForm({nombre:art.nombre,gramaje:art.gramaje||"",ancho:art.ancho||"1.6",largo:art.largo||"600",cantidad:art.cantidad,precio:art.precio||"",moneda:art.moneda||"RMB"});};
  const removeArt=id=>{const arts=(cont.articulos||[]).filter(x=>x.id!==id);updateCont({...cont,articulos:arts,pesoTotal:arts.reduce((a,x)=>a+pesoRollo(x)*x.cantidad,0)});};
  const pesoTotal=(cont.articulos||[]).reduce((a,x)=>a+pesoRollo(x)*Number(x.cantidad),0);
  const fobTot=(cont.articulos||[]).reduce((a,x)=>a+Number(x.precio||0)*Number(x.cantidad),0);
  const pctPeso=Math.min(100,(pesoTotal/LIMITE)*100);
  const isT=esTinta(form.nombre);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:"1rem"}}>
        {[{l:"Peso total",v:fmt(pesoTotal)+" kg",w:pesoTotal>LIMITE},{l:"Límite",v:fmt(LIMITE)+" kg"},{l:"FOB total",v:fmt(fobTot)},{l:"Unidades",v:fmt((cont.articulos||[]).reduce((a,x)=>a+Number(x.cantidad),0))}].map(x=>(
          <div key={x.l} style={{background:"rgba(120,120,128,0.08)",backdropFilter:"blur(8px)",borderRadius:"var(--r-md)",padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{x.l}</div>
            <div style={{fontSize:14,fontWeight:500,color:x.w?"var(--color-text-danger)":"var(--color-text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--color-text-secondary)",marginBottom:3}}><span>Uso del contenedor</span><span>{fmtPct(pctPeso)}</span></div>
        <div style={{height:6,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pctPeso+"%",background:pctPeso>95?"var(--color-border-danger)":"var(--color-border-info)",borderRadius:3}}/></div>
      </div>
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"1rem",marginBottom:"1rem"}}>
        <p style={{fontSize:13,fontWeight:500,margin:"0 0 8px"}}>{editId?"Editar artículo":"Agregar artículo"}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Artículo</label><select value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} style={{width:"100%",marginTop:2}}>{ARTS.map(a=><option key={a}>{a}</option>)}</select></div>
          {!isT&&(<><div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Gramaje</label><input type="number" value={form.gramaje} onChange={e=>setForm({...form,gramaje:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div><div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Ancho (m)</label><input type="number" value={form.ancho} onChange={e=>setForm({...form,ancho:e.target.value})} step="0.1" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div><div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Largo (m)</label><input type="number" value={form.largo} onChange={e=>setForm({...form,largo:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div></>)}

        <div style={{display:"flex",gap:8}}>
          <button onClick={submit} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>{editId?"Guardar":"Agregar"}</button>

function CuentasView({data,save,showToast}){
  const [modal,setModal]=useState(null);const[monto,setMonto]=useState("");
  const [desde,setDesde]=useState("");const[hasta,setHasta]=useState("");
  const porCliente={};
  for(const v of(data.ventas||[]).filter(v=>(!desde||v.fecha>=desde)&&(!hasta||v.fecha<=hasta))){
    if(!porCliente[v.cliente])porCliente[v.cliente]={ventas:[],debe:0,favor:0};
    const cob=pagadoVenta(v,data.pagos);const saldo=Number(v.total||0)-cob;
    porCliente[v.cliente].ventas.push({...v,saldo});
    if(saldo>0)porCliente[v.cliente].debe+=saldo;else if(saldo<0)porCliente[v.cliente].favor+=Math.abs(saldo);
  }

function ExtractoView({data}){
  const [desde,setDesde]=useState("");const[hasta,setHasta]=useState("");
  const movs=[];
  for(const v of(data.ventas||[])){if(Number(v.pago||0)>0)movs.push({fecha:v.fecha,tipo:"Pago inicial",cliente:v.cliente,monto:Number(v.pago),detalle:v.articulo+" ×"+v.cantidad,contId:v.contId});}
  for(const p of(data.pagos||[])){const v=(data.ventas||[]).find(v=>v.id===p.ventaId);if(v)movs.push({fecha:p.fecha,tipo:"Pago posterior",cliente:v.cliente,monto:Number(p.monto),detalle:v.articulo+" ×"+v.cantidad,contId:v.contId});}
  for(const r of(data.retiros||[])){movs.push({fecha:r.fecha,tipo:"Retiro 30%",cliente:"—",monto:0,montoUSD:Number(r.montoUSD),detalle:r.nota||"",contId:null});}
  const filtrados=movs.filter(m=>(!desde||m.fecha>=desde)&&(!hasta||m.fecha<=hasta)).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const totalCob=filtrados.filter(m=>m.tipo!=="Retiro 30%").reduce((a,m)=>a+m.monto,0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
      <h2 style={{fontSize:18,fontWeight:500,margin:0}}>Extracto</h2>
      <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Total cobrado: ${fmt(totalCob)}</span>
    </div>
    <FiltroFechas desde={desde} setDesde={setDesde} hasta={hasta} setHasta={setHasta}/>
    {filtrados.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:14}}>Sin movimientos.</p>:(
      <div style={{display:"grid",gap:6}}>
        {filtrados.map((m,i)=>{
          const cont=m.contId?(data.contenedores||[]).find(c=>c.id===m.contId):null;
          const color=m.tipo==="Retiro 30%"?"var(--color-text-warning)":m.tipo==="Pago posterior"?"var(--color-text-info)":"var(--color-text-success)";
          return(<div key={i} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"10px 1rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:11,fontWeight:500,color,padding:"1px 6px",borderRadius:4,background:color+"22"}}>{m.tipo}</span>
                <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{m.fecha}</span>
              </div>
              <div style={{fontSize:13,fontWeight:500}}>{m.cliente}</div>
              <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{m.detalle+(cont?" · "+cont.nombre:"")}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {m.monto>0&&<div style={{fontSize:15,fontWeight:500,color:"var(--color-text-success)"}}>${fmt(m.monto)}</div>}
              {m.montoUSD>0&&<div style={{fontSize:13,color:"var(--color-text-warning)",fontWeight:500}}>{fmtUSD(m.montoUSD)}</div>}
            </div>
          </div>);
        })}
      </div>
    )}
  </div>);
}

function DespachosView({data,save,showToast}){
  const [manual,setManual]=useState(false);
  const [form,setForm]=useState({cliente:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:"",articulos:""});
  const despachos=[...(data.despachos||[])].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const pendientes=despachos.filter(d=>d.estado==="Pendiente");
  const agregarManual=()=>{
    if(!form.cliente)return;
    save({...data,despachos:[...(data.despachos||[]),{id:Date.now().toString(),fecha:hoy(),...form,estado:"Pendiente"}]});
    setForm({cliente:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:"",articulos:""});
    setManual(false);showToast("Despacho agregado");
  };
  const actualizarEstado=(id,estado)=>save({...data,despachos:data.despachos.map(d=>d.id===id?{...d,estado}:d)});
  const calcularBultos=d=>{
    // Parsea "30GR x5, TINTA NEGRO x3" -> [{nombre,cantidad,esTinta}]
    if(!d.articulos)return[{...d,bultoLabel:"",bultoNum:1,bultoTotal:1}];
    const items=d.articulos.split(",").map(s=>{
      const m=s.trim().match(/^(.+?)\s*[xX×]\s*(\d+)$/);
      if(!m)return null;
      const nombre=m[1].trim();const cantidad=parseInt(m[2]);
      const esTinta=nombre.includes("TINTA");
      return{nombre,cantidad,esTinta};
    }).filter(Boolean);
    const rollos=items.filter(i=>!i.esTinta);
    const tintas=items.filter(i=>i.esTinta);
    const bultos=[];
    // 1 etiqueta por cada rollo individual
    rollos.forEach(r=>{
      for(let i=0;i<r.cantidad;i++){
        bultos.push({tipo:"rollo",desc:r.nombre+" (1 rollo)"});
      }
    });
    // Tintas: hasta 20 unidades por bulto
    const totalTintas=tintas.reduce((a,t)=>a+t.cantidad,0);
    const descTintas=tintas.map(t=>t.nombre.replace("TINTA ","")+" x"+t.cantidad).join(", ");
    if(totalTintas>0){
      const numBultosTinta=Math.ceil(totalTintas/20);
      for(let i=0;i<numBultosTinta;i++){
        const desde=i*20+1;const hasta=Math.min((i+1)*20,totalTintas);
        const label=numBultosTinta>1?"Tintas "+desde+"-"+hasta+" de "+totalTintas+" ("+descTintas+")":"Tintas ("+descTintas+")";
        bultos.push({tipo:"tinta",desc:label});
      }
    }
    // Si no hay artículos reconocibles, 1 bulto genérico
    if(bultos.length===0)return[{...d,bultoLabel:"",bultoNum:1,bultoTotal:1}];
    return bultos.map((b,i)=>({...d,bultoLabel:b.desc,bultoNum:i+1,bultoTotal:bultos.length}));
  };
  const CSS_ETIQUETA="*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:11px}"+
    ".page{display:flex;flex-wrap:wrap;gap:4mm;padding:5mm}"+
    ".r{border:1.5px solid #000;padding:4mm 5mm;width:95mm;page-break-inside:avoid;break-inside:avoid}"+
    ".dest{font-size:13px;font-weight:bold;margin-bottom:2mm}"+
    ".row{display:flex;gap:3mm;margin-bottom:1mm;line-height:1.3}"+
    ".t{color:#444;min-width:18mm;font-size:9px;text-transform:uppercase;padding-top:1px}"+
    ".v{font-weight:600;font-size:11px;flex:1}"+
    ".bulto{margin-top:3mm;padding-top:2mm;border-top:1px dashed #999;font-size:9px;color:#444;display:flex;justify-content:space-between}"+
    ".bnum{font-size:14px;font-weight:bold;color:#000}"+
    "@media print{body{margin:0}.page{padding:3mm;gap:3mm}}";
  const htmlEtiqueta=(b)=>{
    const total=b.bultoTotal||1;const num=b.bultoNum||1;
    return "<div class='r'>"+
      "<div class='dest'>"+(b.cliente||"")+"</div>"+
      "<div class='row'><div class='t'>DNI</div><div class='v'>"+(b.dni||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Dirección</div><div class='v'>"+(b.direccion||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Localidad</div><div class='v'>"+(b.localidad||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Provincia</div><div class='v'>"+(b.provincia||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Expreso</div><div class='v'>"+(b.expreso||"—")+"</div></div>"+
      (b.bultoLabel?"<div class='bulto'><span>"+b.bultoLabel+"</span><span class='bnum'>"+num+"/"+total+"</span></div>":"")+
      "</div>";
  };
  const abrirPDF=(etiquetas,titulo)=>{
    const w=window.open("","_blank");
    if(!w)return;
    const body="<div class='page'>"+etiquetas.map(htmlEtiqueta).join("")+"</div>";
    w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><title>"+titulo+"</title><style>"+CSS_ETIQUETA+"</style></head><body>"+body+"<script>window.onload=()=>{setTimeout(()=>window.print(),300);}<\/script></body></html>");
    w.document.close();
  };
  const imprimirUno=desp=>{
    const bultos=calcularBultos(desp);
    abrirPDF(bultos,"Rótulo — "+desp.cliente);
  };
  const imprimirTodosPendientes=()=>{
    if(!pendientes.length){showToast("No hay pendientes");return;}
    const todasEtiquetas=pendientes.flatMap(d=>calcularBultos(d));
    const totalBultos=todasEtiquetas.length;
    abrirPDF(todasEtiquetas,"Rótulos — "+pendientes.length+" despachos");
    const nuevosDespachos=data.despachos.map(d=>pendientes.some(p=>p.id===d.id)?{...d,estado:"Despachado"}:d);
    save({...data,despachos:nuevosDespachos});
    showToast(pendientes.length+" despachos · "+totalBultos+" etiquetas generadas");
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
      <h2 style={{fontSize:18,fontWeight:500,margin:0}}>Despachos</h2>
      <div style={{display:"flex",gap:6}}>
        {pendientes.length>0&&<button onClick={imprimirTodosPendientes} style={{fontSize:11,padding:"6px 10px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-border-info)",color:"var(--color-background-primary)",fontWeight:500}}>🖨️ Imprimir {pendientes.length} pendientes</button>}
        <button onClick={()=>setManual(true)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>+ Manual</button>
      </div>
    </div>
    {manual&&(<div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"1rem",marginBottom:"1rem"}}>
      <p style={{fontSize:13,fontWeight:500,margin:"0 0 8px"}}>Nuevo despacho manual</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Nombre completo</label><input value={form.cliente} onChange={e=>setForm({...form,cliente:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>DNI</label><input value={form.dni} onChange={e=>setForm({...form,dni:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Expreso</label><input value={form.expreso} onChange={e=>setForm({...form,expreso:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Dirección</label><input value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Localidad</label><input value={form.localidad} onChange={e=>setForm({...form,localidad:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Provincia</label><input value={form.provincia} onChange={e=>setForm({...form,provincia:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Artículos</label><input value={form.articulos} onChange={e=>setForm({...form,articulos:e.target.value})} placeholder="Ej: 30GR x5, 61GR x2" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={agregarManual} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-success)",color:"var(--color-background-primary)",fontWeight:500}}>Agregar</button>
        <button onClick={()=>setManual(false)} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:"var(--color-text-secondary)"}}>Cancelar</button>
      </div>
    </div>)}
    {despachos.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:14}}>Sin despachos.</p>:(
      <div style={{display:"grid",gap:8}}>
        {despachos.map(d=>(
          <div key={d.id} style={{background:"var(--color-background-primary)",border:d.estado==="Pendiente"?"1px solid #378ADD":"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"12px 1rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <div style={{fontWeight:500,fontSize:14}}>{d.cliente}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:1}}>{d.fecha+" · "+(d.expreso||"Sin expreso")}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={d.estado||"Pendiente"} onChange={e=>actualizarEstado(d.id,e.target.value)} style={{fontSize:11,padding:"3px 6px",borderRadius:4}}><option>Pendiente</option><option>Despachado</option></select>
                <button onClick={()=>imprimirUno(d)} style={{fontSize:11,padding:"4px 10px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",whiteSpace:"nowrap"}}>🖨️</button>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{[d.direccion,d.localidad,d.provincia].filter(Boolean).join(" · ")+(d.dni?" · DNI "+d.dni:"")}</div>
            {d.articulos&&<div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>{d.articulos}</div>}
          </div>
        ))}
      </div>
    )}
  </div>);
}

  </script>

  <script>
    function runApp() {
      if(typeof Babel==="undefined"){showErr("Babel no cargó. Recargá la página.");return;}
      try{
        setMsg("Compilando…");
        var src=document.getElementById("src").textContent;
        var result=Babel.transform(src,{
          presets:[["react",{"runtime":"classic","pragma":"React.createElement"}]],
          filename:"app.jsx"
        });
        setMsg("Iniciando…");
        var {useState,useEffect,useRef}=React;
        var run=new Function("React","useState","useEffect","useRef",result.code+"\nreturn App;");
        var AppComp=run(React,useState,useEffect,useRef);
        var root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(AppComp));
        document.getElementById("loading").style.display="none";
        console.log("\u2713 App lista");
      }catch(e){console.error("Error:",e);showErr(e);}
    }
    if(document.readyState==="complete"){runApp();}
    else{window.addEventListener("load",runApp);}
  </script>
</body>
</html>
