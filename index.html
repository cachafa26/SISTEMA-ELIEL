  <style>
    /* ── LIQUID GLASS DESIGN SYSTEM ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    
    body{
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:var(--bg-base);color:var(--text-primary);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      transition:background .3s,color .3s;
    }

    /* ── LIGHT MODE ─────────────────────────────────────────────────── */
    :root{
      /* SC Brand colors from logo */
      --sc-orange:#F47920;
      --sc-green:#5BAD41;
      --sc-blue:#2E86C1;
      --sc-gradient:linear-gradient(135deg,#F47920 0%,#5BAD41 50%,#2E86C1 100%);
      --sc-gradient-soft:linear-gradient(135deg,rgba(244,121,32,0.12) 0%,rgba(91,173,65,0.12) 50%,rgba(46,134,193,0.12) 100%);

      /* Backgrounds */
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);
      --bg-modal:rgba(255,255,255,0.92);
      --bg-tint-green:rgba(91,173,65,0.12);
      --bg-tint-orange:rgba(244,121,32,0.12);
      --bg-tint-blue:rgba(46,134,193,0.12);
      --bg-tint-red:rgba(220,53,69,0.10);
      --bg-tint-amber:rgba(255,149,0,0.12);
      --bg-overlay:rgba(0,0,0,0.45);

      /* Glass effect */
      --glass-blur:blur(20px) saturate(1.8);
      --glass-border:rgba(255,255,255,0.55);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.7) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.07),0 1px 0 rgba(255,255,255,0.6) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 1.5px 0 rgba(255,255,255,0.65) inset;

      /* Text */
      --text-primary:#1C1C1E;
      --text-secondary:#636366;
      --text-tertiary:#AEAEB2;
      --text-success:#1A7F3C;
      --text-warning:#B25000;
      --text-danger:#C0392B;
      --text-info:#1A5FA5;
      --text-on-color:#fff;

      /* Borders */
      --border-sm:0.5px solid rgba(0,0,0,0.10);
      --border-md:0.5px solid rgba(0,0,0,0.16);
      --border-card:0.5px solid rgba(255,255,255,0.8);
      --border-input:0.5px solid rgba(0,0,0,0.18);
      --border-focus:rgba(46,134,193,0.6);
      --border-success:rgba(91,173,65,0.4);
      --border-danger:rgba(192,57,43,0.3);

      /* Radius */
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-pill:100px;

      /* Semantic aliases (keep old names working) */
      --font-sans:"Inter",-apple-system,sans-serif;
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(240,242,245,0.8);
      --color-background-tertiary:var(--bg-base);
      --color-background-success:var(--bg-tint-green);
      --color-background-warning:var(--bg-tint-amber);
      --color-background-danger:var(--bg-tint-red);
      --color-background-info:var(--bg-tint-blue);
      --color-text-primary:var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-tertiary:var(--text-tertiary);
      --color-text-success:var(--text-success);
      --color-text-warning:var(--text-warning);
      --color-text-danger:var(--text-danger);
      --color-text-info:var(--text-info);
      --color-border-tertiary:rgba(0,0,0,0.08);
      --color-border-secondary:rgba(0,0,0,0.14);
      --color-border-primary:rgba(0,0,0,0.28);
      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);
      --color-border-info:rgba(46,134,193,0.4);
      --color-border-warning:rgba(178,80,0,0.3);
      --border-radius-md:var(--r-md);
      --border-radius-lg:var(--r-lg);
      --border-radius-xl:var(--r-xl);
    }

      --text-primary:#F2F2F7;
      --text-secondary:#AEAEB2;
      --text-tertiary:#636366;
      --text-success:#5BAD41;
      --text-warning:#F47920;
      --text-danger:#FF6B6B;
      --text-info:#5B9BD5;
      --border-sm:0.5px solid rgba(255,255,255,0.10);
      --border-md:0.5px solid rgba(255,255,255,0.14);
      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
    }}

      --border-sm:0.5px solid rgba(255,255,255,0.10);

      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(28,28,30,0.6);
      --color-background-tertiary:var(--bg-base);

      --color-background-warning:var(--bg-tint-amber);

    }
    html[data-theme="light"]{
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);

      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);

    /* ── GLOBAL AMBIENT BACKGROUND ──────────────────────────────────── */
    body::before{
      content:"";position:fixed;inset:0;z-index:-1;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%,rgba(244,121,32,0.18) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 20%,rgba(91,173,65,0.14) 0%,transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 90%,rgba(46,134,193,0.16) 0%,transparent 70%),
        var(--bg-base);
      pointer-events:none;
    }

    /* ── GLASS CARD ─────────────────────────────────────────────────── */
    .glass{
      background:var(--bg-card);
      backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
    }
    .glass-sm{
      background:var(--bg-card);
      backdrop-filter:blur(12px) saturate(1.6);
      -webkit-backdrop-filter:blur(12px) saturate(1.6);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow-sm);
    }
    .glass-nav{
      background:var(--bg-nav);
      backdrop-filter:blur(24px) saturate(2);
      -webkit-backdrop-filter:blur(24px) saturate(2);
      border-bottom:0.5px solid var(--glass-border);
    }

    /* ── INPUTS ─────────────────────────────────────────────────────── */
    input,select,textarea{
      font-family:inherit;font-size:14px;padding:9px 12px;
      border:var(--border-input);border-radius:var(--r-sm);
      background:var(--bg-input);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      color:var(--text-primary);outline:none;
      transition:border-color .15s,box-shadow .15s;width:100%;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--border-focus);
      box-shadow:0 0 0 3px rgba(46,134,193,0.15);
    }
    input::placeholder{color:var(--text-tertiary)}

    /* ── BUTTONS ─────────────────────────────────────────────────────── */
    button{font-family:inherit;cursor:pointer;}
    .btn-primary{
      background:var(--sc-gradient);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(244,121,32,0.3);
      transition:transform .12s,box-shadow .12s,opacity .12s;
      letter-spacing:0.01em;
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,121,32,0.4);}
    .btn-primary:active{transform:translateY(0);opacity:.9;}
    .btn-glass{
      background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:var(--border-card);color:var(--text-primary);
      padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;
      box-shadow:var(--glass-shadow-sm);transition:transform .12s,box-shadow .12s;
    }
    .btn-glass:hover{transform:translateY(-1px);box-shadow:var(--glass-shadow);}
    .btn-danger{
      background:var(--bg-tint-red);color:var(--text-danger);
      border:0.5px solid var(--border-danger);
      padding:6px 12px;border-radius:var(--r-pill);font-size:12px;font-weight:500;
    }
    .btn-success{
      background:linear-gradient(135deg,#5BAD41,#3D8B2A);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(91,173,65,0.35);
      transition:transform .12s,box-shadow .12s;
    }
    .btn-success:hover{transform:translateY(-1px);}

    /* ── PILLS / BADGES ─────────────────────────────────────────────── */
    .pill{display:inline-flex;align-items:center;padding:3px 10px;font-size:11px;font-weight:500;border-radius:var(--r-pill);}
    .pill-green{background:var(--bg-tint-green);color:var(--text-success);}
    .pill-orange{background:var(--bg-tint-orange);color:var(--text-warning);}
    .pill-blue{background:var(--bg-tint-blue);color:var(--text-info);}
    .pill-red{background:var(--bg-tint-red);color:var(--text-danger);}
    .pill-gray{background:rgba(120,120,128,0.12);color:var(--text-secondary);}

    /* ── PROGRESS BAR ───────────────────────────────────────────────── */
    .progress-track{height:5px;background:rgba(120,120,128,0.15);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

    /* ── TABLE ──────────────────────────────────────────────────────── */
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;
      color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;
      border-bottom:var(--border-sm);}
    td{padding:9px 10px;border-bottom:var(--border-sm);color:var(--text-primary);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(120,120,128,0.05);}

    /* ── LOADING ─────────────────────────────────────────────────────── */
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;z-index:9999;
      background:var(--bg-base);
    }
    #loading::before{
      content:"";position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%,rgba(244,121,32,0.2) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%,rgba(91,173,65,0.16) 0%,transparent 70%);
    }
    .spin{
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid rgba(120,120,128,0.15);
      border-top-color:var(--sc-orange);
      animation:sp .7s linear infinite;z-index:1;
    }
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading p{font-size:13px;color:var(--text-secondary);z-index:1;font-weight:500;}
    #loading .brand{
      font-size:22px;font-weight:700;letter-spacing:-.02em;z-index:1;
      background:var(--sc-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* ── ERROR ───────────────────────────────────────────────────────── */
    #err{display:none;position:fixed;inset:0;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;background:var(--bg-base);padding:2rem;text-align:center;z-index:9999}
    #err h3{color:var(--text-danger);font-size:15px;margin-bottom:8px}
    #err pre{font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-width:500px;
      background:var(--bg-card);padding:12px;border-radius:var(--r-md);max-height:300px;overflow:auto;text-align:left;border:var(--border-sm)}
    #err button{margin-top:8px;padding:9px 20px;border:none;background:var(--sc-gradient);color:#fff;border-radius:var(--r-pill);font-size:13px;font-weight:600;cursor:pointer}

    /* ── SCROLLBAR ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(120,120,128,0.3);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(120,120,128,0.5)}

    /* ── TOAST ───────────────────────────────────────────────────────── */
    .toast{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:var(--border-card);box-shadow:var(--glass-shadow-lg);
      padding:10px 20px;border-radius:var(--r-pill);
      font-size:13px;font-weight:500;color:var(--text-primary);
      animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
    }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

    /* ── MODAL ───────────────────────────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;z-index:1000;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:flex-start;justify-content:center;
      overflow-y:auto;padding:1rem;
    }
    .modal-box{
      background:var(--bg-modal);backdrop-filter:blur(40px) saturate(2);-webkit-backdrop-filter:blur(40px) saturate(2);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-lg);
      border-radius:var(--r-xl);width:100%;max-width:560px;padding:24px;
      margin:auto;animation:modalIn .3s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* ── SC HEADER GRADIENT ──────────────────────────────────────────── */
    .sc-header{
      background:var(--sc-gradient);
      padding:3px 12px 3px 4px;border-radius:var(--r-pill);
      display:inline-flex;align-items:center;gap:6px;
    }
    .sc-header span{color:#fff;font-weight:700;font-size:12px;letter-spacing:.02em;}

    /* ── METRIC CARD ─────────────────────────────────────────────────── */
    .metric-card{
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-sm);
      border-radius:var(--r-lg);padding:14px 16px;

function obtenerServiciosPaquete(paquete){
  const BASE_INTER = [
    ["Dirección artística y servicio de DJ","Musicalización completa, selección musical personalizada y conducción artística del evento"],
    ["Coordinación general","Conducción integral del flujo del evento y gestión del equipo en piso"],
    ["Realización de timing","Planificación, armado y seguimiento del cronograma del evento"],
    ["Reunión técnica previa","Encuentro de planificación y alineación de detalles logísticos y artísticos"],
    ["Comunicación por handies UHF","Canal interno exclusivo para coordinación del equipo de trabajo"],
    ["Confección de plano técnico","Relevamiento y diseño del plano técnico del salón para optimización del montaje"],
    ["Flete, armado, desarmado y seguros","Traslado integral del equipamiento, montaje y desmontaje completo, con cobertura de seguros"],
    ["Sistema de sonido Line Array Hi-Fi","Sistema de sonido principal de alta fidelidad con cobertura Line Array para salón principal"],
    ["Refuerzo de sonido perimetral","Sistemas de audio perimetrales para cobertura uniforme en salón principal"],
    ["Sonido en área de recepción","Sistema de audio independiente para la recepción de invitados"],
    ["Monitoreo de DJ","Sistema de monitoreo profesional en cabina"],
    ["Iluminación perimetral de salón","Iluminación arquitectónica perimetral en salón principal"],
    ["Iluminación perimetral en recepción","Iluminación ambiental perimetral en área de recepción"],
    ["10 cabezales robóticos móviles","Cabezales de movimiento robotizados para efectos dinámicos de iluminación"],
    ["18 bolas espejadas","Esfera de espejos con iluminación puntual para efecto visual en pista"],
    ["Máquina de humo","Generador de humo de baja densidad para complemento de efectos lumínicos"],
    ["Pista de baile de acero pulido 8×8 m","Pista de baile premium en acero pulido de 8 × 8 metros"],
    ["Cabina con pantalla LED 4×2 m y frente 4×1 m","Cabina de DJ con pantalla LED central de 4 × 2 m y panel frontal LED de 4 × 1 m"],
    ["Pines direccionales de mesas","Señalización lumínica direccional para identificación de mesas"],
    ["Operador de sonido y VJ","Operador técnico de sonido en vivo y videojockey para gestión de contenidos visuales"],
  ];
  if(!paquete||paquete==="basica_inter") return BASE_INTER;
  if(paquete==="basica_icon") return BASE_INTER.map(s=>{
    if(s[0].includes("10 cabezales")) return ["20 cabezales robóticos móviles",s[1].replace("10","20")];
    if(s[0].includes("8×8")) return ["Pista de baile de acero pulido 9,6×9,6 m","Pista de baile premium en acero pulido de 9,6 × 9,6 metros"];
    if(s[0].includes("4×2 m y frente 4×1")) return ["Cabina con pantalla LED 5×3 m y frente 5×1 m","Cabina de DJ con pantalla LED central de 5 × 3 m y panel frontal LED de 5 × 1 m"];
    return s;
  });
  return BASE_INTER;
}

function generarPresupuestoHTML(d, blue){
  const hoy=new Date();
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fmtD=dt=>dt.getDate()+' de '+meses[dt.getMonth()]+' de '+dt.getFullYear();
  const venc=new Date(hoy); venc.setDate(venc.getDate()+15);
  const fechaParts=d.fecha?d.fecha.match(/(\d{4})/):null;
  const yearDoc=fechaParts?fechaParts[1]:hoy.getFullYear();
  const numDoc=d.numeroDoc||('#EMD-'+yearDoc+'-'+(180+Math.floor(Math.random()*170)));
  // Support both pre-built servicios array OR conTecnica+paquete
  const conTec=d.conTecnica||false;
  const servicios=d.servicios||(conTec
    ? obtenerServiciosPaquete(d.paquete||"basica_inter")
    : [
        ["Realización de timing","Planificación y armado del cronograma del evento"],
        ["Servicio de DJ","Musicalización completa y dirección artística"],
        ["Coordinación general","Conducción integral del flujo del evento"],
        ["Comunicación por handies UHF","Canal interno exclusivo para el equipo de trabajo"],
        ["Reunión técnica previa","Encuentro de planificación y alineación de detalles"],
      ]);
  const splitIdx=conTec?(d.seccionTecnicaDesde??5):(d.seccionTecnicaDesde??null);
  const notaPrecioFinal=d.notaPrecio||(conTec?null:"* Sin técnica incluida");
  let svcsHTML='';
  servicios.forEach((svc,i)=>{
    if(splitIdx!==null&&i===splitIdx) svcsHTML+=`<tr><td colspan="2"><div class="sub-eyebrow">EQUIPAMIENTO TÉCNICO</div></td></tr>`;
    const n=svc[0]||svc.nombre||''; const desc=svc[1]||svc.descripcion||'';
    svcsHTML+=`<tr><td class="svc-check-cell"><div class="svc-check">✓</div></td><td><div class="svc-name">${n}</div><div class="svc-desc">${desc}</div></td></tr>`;
  });
  const invRow=d.invitados?`<tr><td class="lbl">Invitados</td><td class="val">${d.invitados}</td></tr>`:'';
  let optsHTML='';
  if(d.opcionales&&d.opcionales.length>0){
    optsHTML=`<div class="eyebrow" style="margin-top:18px">Servicios opcionales</div>`;
    d.opcionales.forEach(opt=>{
      const n=opt[0]||opt.nombre||''; const desc=opt[1]||opt.descripcion||''; const p=opt[2]||opt.precio||'';
      optsHTML+=`<div class="opt-item"><div class="opt-left"><div class="opt-dot"></div><div><div class="opt-name">${n}</div><div class="opt-desc">${desc}</div></div></div><div class="opt-price">${p}</div></div>`;
    });
  }
  const descHTML=d.descuentoPagoTotal?`<div class="pago-opt p2"><div class="pago-tag">Opción 2 · Descuento ${d.descuentoPagoTotal}</div><div class="pago-title">Pago total anticipado</div><div class="pago-body">Abono del total antes del ${fmtD(venc)}. Incluye un ${d.descuentoPagoTotal} de descuento sobre el precio total.</div></div>`:'';
  const notaHTML=notaPrecioFinal?`<div class="p-nota">${notaPrecioFinal}</div>`:'';
  return PRESUPUESTO_TEMPLATE
    .replace('{{FECHA_EMISION}}',fmtD(hoy))
    .replace(/{{FECHA_VENCIMIENTO}}/g,fmtD(venc))
    .replace(/{{NUMERO_DOC}}/g,numDoc)
    .replace('{{CLIENTE}}',d.cliente||'')
    .replace('{{TIPO_EVENTO}}',d.tipoEvento||'')
    .replace('{{FECHA_EVENTO}}',d.fecha||'')
    .replace('{{SALON}}',d.salon||'')
    .replace('{{INVITADOS_ROW}}',invRow)
    .replace('{{SERVICIOS_ROWS}}',svcsHTML)
    .replace('{{OPCIONALES_SECTION}}',optsHTML)
    .replace('{{PRECIO}}',String(d.precio||''))
    .replace('{{NOTA_PRECIO}}',notaHTML)
    .replace('{{OPCION_DESCUENTO}}',descHTML);
}

function generarReciboHTML(d, blue){

  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  const numDoc=d.numeroDoc||('#REC-'+hoy.getFullYear()+'-'+(180+Math.floor(Math.random()*170)));

  const salonRow=d.salon?`<tr><td class="lbl">Salón</td><td class="val">${d.salon}</td></tr>`:'';
  const medioRow=d.medioPago?`<tr><td class="lbl">Medio de pago</td><td class="val">${d.medioPago}</td></tr>`:'';
  const obsSection=d.observaciones?`<div class="eyebrow" style="margin-top:14px">Observaciones</div><p style="font-size:9px;color:#9090A8;line-height:1.5">${d.observaciones}</p>`:'';
  const historial=d.historial||[{fecha:fmtD(hoy),concepto:d.concepto||'Pago',medio:d.medioPago||'Efectivo',monto:Number(d.montoAbonado||0)}];
  const histRows=historial.map(h=>`<tr><td class="td-fecha">${h.fecha||fmtD(hoy)}</td><td class="td-concepto">${h.concepto}</td><td class="td-medio">${h.medio||'Efectivo'}</td><td class="td-monto">USD ${fmtNum(h.monto)}</td></tr>`).join('');
  return RECIBO_TEMPLATE
    .replace(/{{NUMERO_DOC}}/g,numDoc)
    .replace(/{{FECHA_EMISION}}/g,fmtD(hoy))
    .replace(/{{CLIENTE}}/g,d.cliente||'')
    .replace(/{{TIPO_EVENTO}}/g,d.tipoEvento||'')
    .replace('{{SALON}}',d.salon||'')
    .replace('{{FECHA_ROW}}',fechaRow)
    .replace('{{SALON_ROW}}',salonRow)
    .replace('{{MEDIO_ROW}}',medioRow)
    .replace('{{HISTORIAL_ROWS}}',histRows)
    .replace(/{{MONTO_ABONADO_FMT}}/g,fmtNum(d.montoAbonado||0))
    .replace('{{SALDO_FMT}}',saldo>0?fmtNum(saldo):'0')
    .replace('{{MONTO_TOTAL_FMT}}',fmtNum(d.montoTotal||0))
    .replace('{{OBS_SECTION}}',obsSection);
}

// ── CONSTANTES ────────────────────────────────────────────────────────────

const CATS_GASTO = ["Vivienda","Alimentación","Transporte","Servicios","Salud","Ocio","Inversión","Otros"];

const fmt = n => Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtUSD = n => "USD "+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => Number(n||0).toFixed(1)+"%";
const pesoRollo = a => a.pesoUnitarioOverride!=null ? Number(a.pesoUnitarioOverride) : (Number(a.gramaje||0)/1000)*Number(a.ancho||0)*Number(a.largo||0);
const hoy = () => new Date().toISOString().split("T")[0];
const haceUnMes = () => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; };

const EMPTY = {
  contenedores:[], ventas:[], pagos:[], retiros:[], despachos:[],

// ── HELPERS SC ────────────────────────────────────────────────────────────
async function fetchBlue(){
  try{const r=await fetch("https://dolarapi.com/v1/dolares/blue");const d=await r.json();return d.venta||d.compra||null;}catch{return null;}
}
function pagadoVenta(v,pagos){
  return Number(v.pago||0)+(pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
}
function cobradoUSD(v,pagos){
  const total=Number(v.total||0);if(total===0)return 0;
  return Number(v.usd||0)*Math.min(1,pagadoVenta(v,pagos)/total);
}
function stockDisp(contId,artNombre,ventas){
  return(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre).reduce((a,v)=>a+Number(v.cantidad),0);
}
// USD value of a venta with fallback chain (handles bad/missing usd field)
function ventaUSD(v, tcBlue){
  const u=Number(v.usd||0);
  if(u>0) return u;
  const tcUsado=Number(v.tipoCambioUsado||v.tipoCambio||0);
  if(tcUsado>0&&Number(v.total||0)>0) return Number(v.total)/tcUsado;
  if(Number(v.total||0)>0&&tcBlue>0) return Number(v.total)/tcBlue;
  return 0;
}
function ventaCobradoUSD(v, pagos, tcBlue){
  const totalARS=Number(v.total||0); if(totalARS===0) return 0;
  const fraccion=Math.min(1, pagadoVenta(v,pagos)/totalARS);
  return ventaUSD(v,tcBlue)*fraccion;
}
function distribuir(items,contenedores,ventas){
  const resultado=[];const errores=[];
  for(const item of items){
    let rest=Number(item.cantidad);
    const cs=contenedores.filter(c=>{
      const art=(c.articulos||[]).find(a=>a.nombre===item.nombre);
      if(!art)return false;
      return(Number(art.cantidad)-stockDisp(c.id,item.nombre,ventas))>0;
    }).map(c=>{
      const art=(c.articulos||[]).find(a=>a.nombre===item.nombre);
      const sd=Number(art.cantidad)-stockDisp(c.id,item.nombre,ventas);
      const vUSD=(ventas||[]).filter(v=>v.contId===c.id).reduce((a,v)=>a+Number(v.usd||0),0);
      const costo=c.costoTotal||0;const enG=costo>0&&vUSD>costo;const pct=costo>0?vUSD/costo:0;
      return{c,sd,enG,pct};
    }).sort((a,b)=>{
      // 1. Containers in profit first
      if(a.enG!==b.enG)return b.enG-a.enG;
      // 2. Both in profit: oldest first (lowest id = created first)
      if(a.enG&&b.enG)return Number(a.c.id)-Number(b.c.id)||a.c.id.localeCompare(b.c.id);
      // 3. Neither in profit: closest to profit first (highest pct)
      return b.pct-a.pct;
    });
    const total=cs.reduce((a,x)=>a+x.sd,0);
    if(total<rest){errores.push('"'+item.nombre+'": necesitás '+item.cantidad+', hay '+total);continue;}
    for(const x of cs){
      if(rest<=0)break;
      const bajar=Math.min(rest,x.sd);
      resultado.push({artNombre:item.nombre,contId:x.c.id,contNombre:x.c.nombre,cantidad:bajar,precioUnitario:item.precioUnitario,subtotal:bajar*item.precioUnitario});
      rest-=bajar;
    }
  }
  return{resultado,errores};
}
function precioPromedioUltimoMes(contId,artNombre,ventas){
  const desde=haceUnMes();
  const vs=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&v.fecha>=desde&&Number(v.precioVenta||0)>0);
  if(!vs.length){const all=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&Number(v.precioVenta||0)>0);if(!all.length)return 0;return all.reduce((a,v)=>a+Number(v.precioVenta),0)/all.length;}
  return vs.reduce((a,v)=>a+Number(v.precioVenta),0)/vs.length;
}

function buildClienteIndex(ventas,despachos,clientesPersistentes){
  const idx={...CLIENTES_BASE,...(clientesPersistentes||{})};
  for(const v of(ventas||[])){if(v.cliente&&!idx[v.cliente])idx[v.cliente]={};}
  for(const d of(despachos||[])){if(d.cliente)idx[d.cliente]={...(idx[d.cliente]||{}),nombre:d.cliente,dni:d.dni||"",direccion:d.direccion||"",localidad:d.localidad||"",provincia:d.provincia||"",expreso:d.expreso||""};}
  return idx;
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────
function Autocomplete({value,onChange,suggestions,placeholder,style}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const filtered=suggestions.filter(s=>s.toLowerCase().includes((value||"").toLowerCase())&&s!==value).slice(0,7);
  useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);
  },[]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} placeholder={placeholder} style={style||{width:"100%",boxSizing:"border-box"}}/>
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--color-background-primary)",border:"1px solid var(--color-border-secondary)",borderRadius:"0 0 var(--border-radius-md) var(--border-radius-md)",zIndex:9999,maxHeight:200,overflowY:"auto",boxShadow:"0 6px 20px rgba(0,0,0,0.18)"}}>
          {filtered.map(s=>(
            <div key={s} onMouseDown={e=>{e.preventDefault();onChange(s);setOpen(false);}}
              style={{padding:"9px 12px",fontSize:13,cursor:"pointer",color:"var(--color-text-primary)",background:"var(--color-background-primary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"}
              onMouseLeave={e=>e.currentTarget.style.background="var(--color-background-primary)"}>{s}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── BH TRADE HELPERS ──────────────────────────────────────────────────────
function bhSueldoMes(despachosMes, mes){
  const total=despachosMes.reduce((a,d)=>a+d.total,0);
  const base=160000;
  const esAguinaldo=mes===5||mes===11;
  const aguinaldoMonto=esAguinaldo?base*0.5:0; // aguinaldo = 50% de la BASE solamente
  return{total,base,aguinaldo:esAguinaldo,aguinaldoMonto,sueldo:total+base+aguinaldoMonto};
}

    window.addEventListener("closeChat",closeChatHandler);
    document.addEventListener("keydown",handler);
    return()=>document.removeEventListener("keydown",handler);
  },[]);

  const [fbReady, setFbReady] = useState(false);
  const dbRef = useRef(null);

  useEffect(()=>{
    let unsub = null;
    (async()=>{
      setBlue(await fetchBlue());
      try{
        const db = window._fbDB;
        if(!db) throw new Error("Firebase no cargado");
        const docRef = window.firebase.firestore().doc("eliel/datos");
        dbRef.current = docRef;
        const snap = await docRef.get();
        if(snap.exists){
          const remote = snap.data().payload;
          // migrate v9 to v10
          const migrated = remote && (remote._v===9||remote._v===10) ? {
            ...EMPTY,...remote,
            clientes: remote.clientes||{},
            bh: {...(remote.bh||{}), cobros:(remote.bh?.cobros||[])},
            dj: {...(remote.dj||{}), eventos:(remote.dj?.eventos||[]), presupuestos:(remote.dj?.presupuestos||[])},
            fin: {...(remote.fin||{}), presupuestos:(remote.fin?.presupuestos||{})},
            _v:10
          } : EMPTY;
          setData(migrated);
        } else {
          setData(EMPTY);
        }
        unsub = docRef.onSnapshot(snap=>{
          if(snap.exists){
            const remote = snap.data().payload;
            if(remote&&(remote._v===9||remote._v===10)){
              const migrated={...EMPTY,...remote,clientes:remote.clientes||{},bh:{...( remote.bh||{}),cobros:(remote.bh?.cobros||[])},fin:{...(remote.fin||{}),presupuestos:(remote.fin?.presupuestos||{})},_v:10};
              setData(migrated);
            }
          }
        });
        setFbReady(true);
      } catch(e){
        console.error("Firebase error:",e);
        const raw=localStorage.getItem("eliel_v10")||localStorage.getItem("eliel_v9");
        setData(raw?JSON.parse(raw):EMPTY);
      }
    })();
    return ()=>{ if(unsub) unsub(); };
  },[]);

  const save=async nd=>{
    setData(nd);
    try{localStorage.setItem("eliel_v10",JSON.stringify(nd));}catch{}
    if(dbRef.current){
      try{
        await dbRef.current.set({payload:nd,ts:Date.now()});

  };
  const showToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(null),2800);};

  if(!data)return <div style={{padding:"2rem",color:"var(--color-text-secondary)"}}>Cargando...</div>;

  // Calculos SC globales
  const stockUni={};
  for(const c of data.contenedores){
    for(const art of(c.articulos||[])){
      if(!stockUni[art.nombre])stockUni[art.nombre]=0;
      stockUni[art.nombre]+=Math.max(0,Number(art.cantidad)-stockDisp(c.id,art.nombre,data.ventas));
    }
  }
  let totalCobUSD=0,totalCostoUSD=0,totalVentaUSD=0,mi30Total=0;
  const tcForCalc=blue||1450;
  for(const c of data.contenedores){
    const costo=c.costoTotal||0;
    const ventasCont=(data.ventas||[]).filter(v=>v.contId===c.id);
    const facturadoCont=ventasCont.reduce((a,v)=>a+ventaUSD(v,tcForCalc),0);
    const cobradoCont=ventasCont.reduce((a,v)=>a+ventaCobradoUSD(v,data.pagos,tcForCalc),0);
    totalCostoUSD+=costo;
    totalVentaUSD+=facturadoCont;
    totalCobUSD+=cobradoCont;
    // Mi30 se calcula POR CONTENEDOR: solo suma si ese cont está en ganancia
    const gananciaCont=Math.max(0,facturadoCont-costo);
    mi30Total+=gananciaCont*0.3;
  }
  // Ventas sin contenedor (edge case)
  const contIds=new Set((data.contenedores||[]).map(c=>c.id));
  const ventasHuerfanas=(data.ventas||[]).filter(v=>!contIds.has(v.contId));
  totalVentaUSD+=ventasHuerfanas.reduce((a,v)=>a+ventaUSD(v,tcForCalc),0);
  totalCobUSD+=ventasHuerfanas.reduce((a,v)=>a+ventaCobradoUSD(v,data.pagos,tcForCalc),0);
  // gananciaTotal para referencia (no se usa para mi30)
  const gananciaTotal=Math.max(0,totalVentaUSD-totalCostoUSD);
  const totalRetirado=(data.retiros||[]).reduce((a,r)=>a+Number(r.montoUSD||0),0);
  const pendienteRetiro=Math.max(0,mi30Total-totalRetirado);
  const clienteIdx=buildClienteIndex(data.ventas,data.despachos,data.clientes);

  // Calculos BH globales
  // BH total devengado = suma de sueldos por mes (despachos + base + aguinaldo si aplica)
  const bhTotalAnio=(()=>{
    const despachos=data.bh?.despachos||[];
    const meses=[...new Set(despachos.map(d=>d.mes))];
    // Include current month even if no despachos
    if(!meses.includes(new Date().getMonth())) meses.push(new Date().getMonth());
    return meses.reduce((a,mes)=>{
      const dm=despachos.filter(d=>d.mes===mes);
      return a+bhSueldoMes(dm,mes).sueldo;
    },0);
  })();
  const mesActual=new Date().getMonth();
  const bhDespachosMes=(data.bh?.despachos||[]).filter(d=>d.mes===mesActual);
  const bhSueldo=bhSueldoMes(bhDespachosMes,mesActual).sueldo;
  const bhCobradoTotal=(data.bh?.cobros||[]).reduce((a,c)=>a+Number(c.monto||0),0);
  const bhPendienteCobro=Math.max(0,bhTotalAnio-bhCobradoTotal);

  // Calculos DJ globales
  const djEventos=data.dj?.eventos||[];
  const _hoyISO=new Date().toISOString().split("T")[0];
  const djRealizados=djEventos.filter(e=>{
    if(e.estado==="Realizado"||e.estado==="Señado") return true;
    if(e.estado==="Confirmado"&&e.fecha<_hoyISO){
      const cobrado=(e.pagos||[]).reduce((a,p)=>a+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
      return Math.max(0,Number(e.cobroUSD||0)-cobrado)===0;
    }
    return false;
  });
  // Ganancia = lo cobrado que supera el costo, sin importar estado
  const djGananciaUSD=djEventos.reduce((a,e)=>{
    if(e.estado==="Pendiente") return a;
    const cobrado=(e.pagos||[]).reduce((s,p)=>s+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
    return a+Math.max(0,cobrado-Number(e.costoUSD||0));
  },0);
  // Cobrado = suma de pagos reales de todos los eventos no-Pendiente
  const djCobradoUSD=djEventos.reduce((a,e)=>{
    if(e.estado==="Pendiente") return a;
    const cobrado=(e.pagos||[]).reduce((s,p)=>s+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
    return a+cobrado;
  },0);
  const djGanancia=djGananciaUSD; // alias for backward compat
  const djCobrado=djCobradoUSD;

  // Calculos Finanzas

// BOTTOM NAV — Liquid Glass pill selector
// ══════════════════════════════════════════════════════════════════════════
function BottomNav({modulos,modulo,goModulo,toggleTheme,theme,blue,fbReady,logout,onSearch,onChat}){
  const trackRef = useRef(null);
  const [pillStyle,setPillStyle] = useState({left:0,width:0});
  const activeIdx = modulos.findIndex(m=>m.id===modulo);

  useEffect(()=>{
    if(!trackRef.current) return;
    const items = trackRef.current.querySelectorAll(".bottom-nav-item");
    if(items[activeIdx]){
      const item = items[activeIdx];
      const track = trackRef.current;
      const trackRect = track.getBoundingClientRect();
      const itemRect = item.getBoundingClientRect();
      setPillStyle({
        left: itemRect.left - trackRect.left,
        width: itemRect.width,
      });
    }
  },[activeIdx, modulos]);

  return(
    <div className="bottom-nav">
      <div className="bottom-nav-track" ref={trackRef}>
        {/* Animated glass pill */}
        <div className="bottom-nav-pill" style={{
          left: pillStyle.left,
          width: pillStyle.width,
        }}/>
        {modulos.map((m,i)=>(
          <button
            key={m.id}
            className={"bottom-nav-item"+(modulo===m.id?" active":"")}
            onClick={()=>goModulo(m.id)}
          >
            <span className="bottom-nav-icon">{m.icon}</span>
            <span className="bottom-nav-label">{m.label}</span>
          </button>
        ))}
      </div>
            {/* Action strip */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 12px 0",marginTop:2,borderTop:"0.5px solid var(--glass-border)"}}>
        <button onClick={onSearch} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",padding:"3px 8px",borderRadius:8,color:"var(--text-secondary)"}}>
          <span style={{fontSize:14}}>🔍</span><span style={{fontSize:9,fontWeight:500,color:"var(--text-secondary)"}}>Buscar</span>
        </button>
        <button onClick={onChat} style={{display:"flex",alignItems:"center",gap:4,background:"linear-gradient(135deg,rgba(244,121,32,0.2),rgba(91,173,65,0.2))",border:"0.5px solid rgba(244,121,32,0.3)",cursor:"pointer",padding:"4px 12px",borderRadius:20,color:"var(--text-primary)"}}>
          <span style={{fontSize:14}}>🤖</span><span style={{fontSize:9,fontWeight:700}}>IA</span>
        </button>
        <button onClick={toggleTheme} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",padding:"3px 8px",borderRadius:8,color:"var(--text-secondary)"}}>
          <span style={{fontSize:14}}>{theme==="dark"?"☀️":"🌙"}</span><span style={{fontSize:9,fontWeight:500,color:"var(--text-secondary)"}}>Tema</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:3,padding:"3px 4px"}}>
          <span style={{fontSize:8,fontWeight:700,color:fbReady?"var(--text-success)":"var(--text-warning)"}}>{fbReady?"●":"⚠"}</span>
          <span style={{fontSize:9,color:"var(--text-secondary)"}}>{fbReady?"sync":"local"}</span>
        </div>
        <button onClick={logout} style={{display:"flex",alignItems:"center",gap:4,background:"var(--bg-tint-red)",border:"0.5px solid var(--border-danger)",cursor:"pointer",padding:"3px 10px",borderRadius:20,color:"var(--text-danger)"}}>

        </button>

  );

function buildSystemPrompt(data, blue, stockUni, pendienteRetiro, bhPendienteCobro){
  const tc = blue||1450;
  const _sc30Pesos = Math.round((pendienteRetiro||0) * tc);
  const _bhPesos = Math.round(bhPendienteCobro||0);
  const _totalRetiroPesos = _sc30Pesos + _bhPesos;
  const conts = (data.contenedores||[]).map(c=>{
    const vs = (data.ventas||[]).filter(v=>v.contId===c.id);
    const fact = vs.reduce((a,v)=>a+Number(v.usd||0),0);
    const stock = {};
    (c.articulos||[]).forEach(art=>{
      const vendido = vs.filter(v=>v.articulo===art.nombre).reduce((a,v)=>a+Number(v.cantidad),0);
      stock[art.nombre] = Math.max(0, art.cantidad - vendido);
    });
    return `- ${c.nombre}: costo USD ${c.costoTotal||0}, facturado USD ${fact.toFixed(0)}, stock: ${JSON.stringify(stock)}`;
  }).join('\n');

  const stockResumen = Object.entries(stockUni).filter(([,v])=>v>0)
    .map(([k,v])=>`${k}: ${v} u`).join(', ');

  const ventasRecientes = [...(data.ventas||[])].sort((a,b)=>b.fecha.localeCompare(a.fecha)||(b.id||"").localeCompare(a.id||"")).slice(0,10)
    .map(v=>`${v.fecha} ${v.cliente} ${v.articulo} x${v.cantidad} $${v.total} USD${v.usd||0}`).join('\n');

  const deudores = {};
  (data.ventas||[]).forEach(v=>{
    const pag = Number(v.pago||0)+(data.pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
    const saldo = Number(v.total||0)-pag;
    if(saldo>0){ deudores[v.cliente]=(deudores[v.cliente]||0)+saldo; }
  });
  const deudoresStr = Object.entries(deudores).map(([k,v])=>`${k}: $${Math.round(v)}`).join(', ');

  const eventos = (data.dj?.eventos||[]).map(e=>`${e.fecha} ${e.nombre} ${e.estado} cobro:${e.monedaCobro||'USD'}${e.cobro} costo:${e.monedaCosto||'ARS'}${e.costo}`).join('\n');

  const clientes = Object.entries({...CLIENTES_BASE,...(data.clientes||{})}).slice(0,30)
    .map(([k,v])=>k+(v.expreso?' ('+v.expreso+(v.localidad?', '+v.localidad:'')+')':'')).join(', ');
  const arts = ARTS.join(', ');

  return `Sos el asistente IA del Sistema de Gestión de Eliel. Tenés acceso completo a sus datos en tiempo real.

DATOS ACTUALES:
Dólar blue: $${tc}
Stock disponible total: ${stockResumen}

CONTENEDORES:
${conts||'Sin contenedores'}

ÚLTIMAS VENTAS:
${ventasRecientes||'Sin ventas'}

CLIENTES CON DEUDA:
${deudoresStr||'Ninguno'}

EVENTOS DJ:
${eventos||'Sin eventos'}

CLIENTES REGISTRADOS (primeros 30):
${clientes}

ARTÍCULOS DISPONIBLES:
${arts}

RETIROS PENDIENTES:
- Mi 30% SC: $${_sc30Pesos.toLocaleString('es-AR')} ARS pendiente de retirar
- BH Trade: $${_bhPesos.toLocaleString('es-AR')} ARS pendiente de cobrar
- TOTAL: $${_totalRetiroPesos.toLocaleString('es-AR')} ARS

ESTADOS DE ENTREGA: A despachar, Despachado, A retirar Ezeiza, A retirar Once, Retirado
ESTADOS DJ: Pendiente (presupuesto aguardando respuesta), Confirmado (cliente aceptó), Realizado (evento terminado)

TU ROL:
1. Respondés preguntas sobre el negocio con los datos reales
2. Cuando el usuario quiere CARGAR DATOS (pedido, evento, retiro, gasto, despacho), recopilás TODA la información necesaria preguntando lo que falta, y cuando tenés todo generás un JSON de acción
3. Siempre confirmás antes de ejecutar cualquier acción

ACCIONES QUE PODÉS EJECUTAR (responder con JSON exacto cuando tenés todos los datos):
Para cargar un PEDIDO:
{"action":"CARGAR_PEDIDO","data":{"contId":"15VO CONTENEDOR","cliente":"nombre","articulo":"29GR 1,60x600","cantidad":N,"precioVenta":N,"entrega":"Expreso","tipoCambioUsado":TC,"dni":"","direccion":"","localidad":"","provincia":"","expreso":"nombre del transporte"}}

Podés generar 3 tipos de documentos PDF profesionales:

PARA PRESUPUESTO DJ necesitás: nombre cliente, fecha evento, salon/venue, tipo evento (casamiento/cumpleanos/etc), invitados (aprox), con tecnica o sin, precio USD, recepcionistas (incluidas/opcionales/sin).
Si falta CUALQUIER dato → preguntar todo en un solo mensaje antes de generar.

PARA CONFIRMACION DJ necesitas del presupuesto original + opcionales elegidos + forma de pago (total con 10pct descuento o 2 cuotas 50/50).

PARA RECIBO DJ necesitas: nombre cliente, evento, monto total USD, monto abonado USD, concepto (sena/anticipo/cuota/pago total), medio de pago (default efectivo).

Cuando tenes TODOS los datos, mostrar resumen breve y pedir confirmacion. Si el usuario confirma, responder con el JSON de accion DIRECTAMENTE en el texto, SIN backticks, SIN triple comillas, SIN formato markdown. Solo el JSON puro pegado al final del texto.

Cuando el usuario adjunta un PDF o archivo:
- Extraé la información clave (cliente, evento, fecha, salón, montos, concepto, saldo pendiente)
- Hacé un resumen breve de lo que encontraste en 2-3 líneas
- Preguntá qué quiere hacer: ¿registrar un pago? ¿confirmar el evento? ¿cargar los datos?
- NO mostrés el texto crudo del documento, solo el resumen y la pregunta

Cuando el cliente ACEPTA un presupuesto existente, usar accion:
{"action":"CONFIRMAR_PRESUPUESTO","data":{"presupuestoId":"id_del_presupuesto_o_null","cliente":"nombre","precio":8200}}

REGLA PRESUPUESTO DJ: El estado siempre es "Pendiente" automáticamente. NUNCA preguntar al usuario por el estado. Las condiciones de pago son siempre 50/50 en cuotas o total con 10% descuento - NO preguntar.

Para generar presupuesto DJ responder con:
{"action":"GENERAR_PRESUPUESTO_DJ","data":{"cliente":"nombre","tipoEvento":"Casamiento","fecha":"15 de agosto de 2026","salon":"Nombre salon","invitados":"300 personas","conTecnica":true,"paquete":"basica_inter","precio":8200,"precio_str":"8.200","recepcionistas":"opcionales","opcionales":[]}}

Para generar recibo DJ responder con:
{"action":"GENERAR_RECIBO_DJ","data":{"cliente":"nombre","tipoEvento":"Casamiento","fechaEvento":"15 de agosto de 2026","salon":"Nombre salon","montoTotal":8200,"montoAbonado":4100,"concepto":"Sena","medioPago":"Efectivo","observaciones":null}}

Para generar confirmacion DJ responder con:
{"action":"GENERAR_CONFIRMACION_DJ","data":{"cliente":"nombre","tipoEvento":"Casamiento","fechaEvento":"15 de agosto de 2026","salon":"Nombre salon","invitados":"300","conTecnica":true,"paquete":"basica_inter","precioBase":8200,"opcionalesElegidos":[],"formaPago":"total","descuento":10}}`;
}

  const sendMessage = async (text) => {
    if(!text.trim()||loading) return;

    // If there's a pending action and user confirms
    if(pendingAction){
      const lower = text.toLowerCase();

      // Special case: waiting for cost to confirm presupuesto
      // ── Pago de pedido SC ──────────────────────────────────────────────────
      if(pendingAction.action==="_PAGO_PEDIDO_"){
        const {pedidoId: pId, ventaId, total} = pendingAction.data;

          pagoMonto = total; // pagó todo
        } else if(lower==="no"||lower==="n"){
          pagoMonto = 0; // no pagó nada
        } else {
          // intenta parsear un número
          const num = Number(text.replace(/[^0-9.,]/g,"").replace(",","."));
          if(!isNaN(num)&&num>0) pagoMonto = num;

        // Actualizar TODAS las ventas del pedido (por pedidoId o ventaId)

        const saldo = Math.max(0, total-pagoMonto);

          ? "✓ Pago total registrado. Saldo: $0."
          : pagoMonto>0
            ? "✓ Pago parcial de $"+pagoMonto.toLocaleString("es-AR")+" registrado. Saldo pendiente: $"+saldo.toLocaleString("es-AR")+"."
            : "✓ Sin pago registrado. Saldo pendiente: $"+total.toLocaleString("es-AR")+".";
        setMsgs(m=>[...m,{role:"assistant",content:msg}]);
        setPendingAction(null);
        setLoading(false);
        return;
      }

      if(pendingAction.action==="_EJECUTAR_CONFIRMACION_PRES"){
        // Parse cost from message: "$150000", "150.000", "USD 800", "0"
        const usdMatch=text.match(/USD\s*([\d.,]+)/i);
        const arsMatch=text.match(/\$\s*([\d.,]+)/i)||text.match(/([\d.,]+)\s*(?:pesos|ars|peso)?/i);
        let costoRaw=0; let costoMoneda='ARS';
        if(usdMatch){costoRaw=parseFloat(usdMatch[1].replace(/\./g,'').replace(',','.'));costoMoneda='USD';}
        else if(arsMatch){costoRaw=parseFloat(arsMatch[1].replace(/\./g,'').replace(',','.'));costoMoneda='ARS';}
        const updatedAction={...pendingAction,data:{...pendingAction.data,costoRaw,costoMoneda}};
        setMsgs(m=>[...m,{role:"user",content:text},{role:"assistant",content:"✓ Ejecutando..."}]);
        setInput("");
      if(attachedFile) setAttachedFile(null);
        await executeAction(updatedAction);
        const costoStr=costoMoneda==="ARS"?"$"+costoRaw.toLocaleString('es-AR'):"USD "+costoRaw;
        setMsgs(m=>[...m.slice(0,-1),{role:"assistant",content:"✅ Evento confirmado. Costo registrado: "+costoStr+". Ganancia estimada: USD "+(Number(pendingAction.data.pres?.precio||0)-(costoMoneda==="ARS"?costoRaw/(blue||1450):costoRaw)).toFixed(0)+". Podés editarlo desde la sección Confirmados."}]);
        return;
      }

      // Use word-boundary check to avoid "posible", "básico", "servicio" triggering
      const confirmWords = /\b(si|sí|sip|dale|ok|okay|confirma|confirmado|confirmá|cargá|carga|listo|va|claro|perfecto|adelante|seguí|generar|genera|hacelo|sí\s*x|yep|yes)\b/i;
      if(confirmWords.test(lower)){
        const userMsg = {role:"user",content:text};
        const confirmMsg = {role:"assistant",content:"✓ Ejecutando..."};
        setMsgs(m=>[...m,userMsg,confirmMsg]);
        setInput("");
        const prevAction = pendingAction;
        await executeAction(pendingAction);
        // Si executeAction cambió pendingAction (ej: _PAGO_PEDIDO_), no sobreescribir
        if(prevAction.action==="CARGAR_PEDIDO"){
          // El mensaje de pago ya fue seteado dentro de executeAction
          setLoading(false);
          if(inputRef.current) inputRef.current.focus();
          return;
        }
        setMsgs(m=>[...m.slice(0,-1),{role:"assistant",content:"✅ ¡Listo! Los datos fueron guardados correctamente."}]);
        return;
      } else if(lower.includes("no")||lower.includes("cancel")){
        setMsgs(m=>[...m,{role:"user",content:text},{role:"assistant",content:"Cancelado. ¿Qué más necesitás?"}]);
        setInput("");
        setPendingAction(null);
        return;
      }
    }

    const newMsgs = [...msgs, {role:"user",content:text}];
    setMsgs(newMsgs);
    setInput("");
    setLoading(true);

    try {
      const systemPrompt = buildSystemPrompt(data, blue||1450, stockUni, pendienteRetiro||0, bhPendienteCobro||0);
      const controller = new AbortController();
      const timeoutId = setTimeout(()=>controller.abort(), 30000);
      let response;
      try{
        response = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          signal: controller.signal,
          headers:{
            "Content-Type":"application/json",
            "x-api-key": ANTHROPIC_KEY,
            "anthropic-version":"2023-06-01",
            "anthropic-dangerous-direct-browser-access":"true",
          },
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:1000,
            system: systemPrompt,
            messages: newMsgs.map((m,i)=>{
              // Attach file to the last user message
              if(m.role==="user" && i===newMsgs.length-1 && attachedFile){
                return {role:"user", content:[
                  {type: attachedFile.mediaType==="application/pdf"?"document":"image",
                   source:{type:"base64",media_type:attachedFile.mediaType,data:attachedFile.base64}},
                  {type:"text",text:m.content||"Analizá este documento y extraé la información relevante para el sistema."}
                ]};
              }
              return {role:m.role,content:m.content};
            })
          })
        });
        clearTimeout(timeoutId);
      }catch(fetchErr){
        clearTimeout(timeoutId);
        const isAbort = fetchErr.name==="AbortError";
        const errTxt = isAbort?"Tiempo de espera agotado (30s). Intentá de nuevo.":"Error de red: "+fetchErr.message+". Verificá tu conexión.";
        setMsgs(m=>[...m,{role:"assistant",content:"⚠ "+errTxt}]);
        setLoading(false); return;
      }

      const result = await response.json();
      console.log("API response status:", response.status, "body:", JSON.stringify(result).slice(0,200));
      if(!response.ok || result.error){
        const status = response.status;
        const errMsg = result.error?.message||JSON.stringify(result.error||{});
        console.error("API error:",status, errMsg);
        if(status===401||result.error?.type==="authentication_error"){
          setMsgs(m=>[...m,{role:"assistant",content:"⚠ API key inválida (error 401). Tocá ⚙ arriba para ingresar tu key correctamente.\n\nKey actual (primeros 12 chars): "+(ANTHROPIC_KEY.slice(0,12)||"(vacía)")}]);
        } else if(status===0||!response.ok){
          setMsgs(m=>[...m,{role:"assistant",content:"⚠ Error de red (status "+status+"). Verificá tu conexión a internet o intentá desde otra red.\n\nDetalle: "+errMsg}]);
        } else {
          setMsgs(m=>[...m,{role:"assistant",content:"Error "+status+": "+errMsg}]);
        }
        setLoading(false); return;
      }
      const reply = result.content?.[0]?.text||"Sin respuesta";

      // Extract JSON action - handle ```json fences and nested objects
      let actionFound = false;
      // First strip code fences from the full reply
      const replyStripped = reply.replace(/```json\s*/gi,"").replace(/```\s*/g,"");
      // Find JSON by locating "action" key and extracting balanced braces
      const actionIdx = replyStripped.indexOf('"action"');
      if(actionIdx >= 0){
        // Walk back to find the opening {
        let startIdx = actionIdx;
        while(startIdx > 0 && replyStripped[startIdx] !== "{") startIdx--;
        // Walk forward counting braces to find matching }
        let depth = 0, endIdx = startIdx;
        for(let i = startIdx; i < replyStripped.length; i++){
          if(replyStripped[i]==="{") depth++;
          else if(replyStripped[i]==="}"){depth--; if(depth===0){endIdx=i;break;}}
        }
        if(endIdx > startIdx){
          try{
            const jsonStr = replyStripped.slice(startIdx, endIdx+1);
            const action = JSON.parse(jsonStr);
            if(action.action){
              setPendingAction(action);
              // Clean reply: remove everything from first ``` or { of JSON
              let cleanReply = reply
                .replace(/```json[\s\S]*?```/gi,"")
                .replace(/```[\s\S]*?```/g,"")
                .trim();
              // Also remove any bare JSON block left
              if(cleanReply.includes(jsonStr.slice(0,30))){
                cleanReply = cleanReply.slice(0, cleanReply.indexOf(jsonStr.slice(0,30))).trim();
              }
              if(!cleanReply) cleanReply = "Tengo todo listo.";
              if(!cleanReply.match(/[?¿]/)) cleanReply += "\n\n¿Confirmás? (sí / no)";
              setMsgs(m=>[...m,{role:"assistant",content:cleanReply}]);
              actionFound = true;
            }
          }catch(parseErr){console.warn("JSON parse error:",parseErr);}
        }
      }
      if(!actionFound){
        setMsgs(m=>[...m,{role:"assistant",content:reply}]);
      }
    } catch(err){
      setMsgs(m=>[...m,{role:"assistant",content:"Error al conectar con el asistente. Verificá tu conexión."}]);
      console.error(err);
    }
    setLoading(false);
    if(inputRef.current) inputRef.current.focus();
  };

  // Minimized state: show floating pill
  if(chatState==="minimized"){
    return(
      <div onClick={()=>{if(typeof onClose==="function")onClose();}} style={{
        position:"fixed",bottom:90,right:20,zIndex:1500,
        background:"linear-gradient(135deg,#F47920,#5BAD41)",
        borderRadius:28,padding:"10px 16px",
        display:"flex",alignItems:"center",gap:8,cursor:"pointer",
        boxShadow:"0 8px 28px rgba(244,121,32,0.45)",
        animation:"fadeIn .2s ease",
      }}
      onClick={()=>window.dispatchEvent(new CustomEvent("openChat"))}>
        <span style={{fontSize:18}}>🤖</span>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#fff",lineHeight:1}}>Asistente IA</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.8)",marginTop:1}}>{msgs.length>1?msgs.length-1+" mens.":"listo"}</div>
        </div>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>▲</span>
      </div>
    );
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",flexDirection:"column",
      background:"var(--bg-base)"}}
    onClick={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      {/* Header */}
      <div style={{
        background:"var(--bg-nav)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",
        borderBottom:"0.5px solid var(--glass-border)",
        padding:"12px 16px",display:"flex",alignItems:"center",gap:12,
        boxShadow:"var(--glass-shadow-sm)",flexShrink:0,
      }}>
        <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#F47920,#5BAD41,#2E86C1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🤖</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--text-primary)",letterSpacing:"-.01em"}}>Asistente IA</div>
          <div style={{fontSize:11,color:ANTHROPIC_KEY?"var(--text-success)":"var(--text-warning)",fontWeight:500}}>"● Conectado · Claude Sonnet"</div>
        </div>
        
        <button onClick={onClose} title="Minimizar" style={{width:30,height:30,borderRadius:"50%",border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",color:"var(--text-secondary)",marginRight:6}}>▼</button>
        <button onClick={()=>onFullClose&&onFullClose()} title="Cerrar chat" style={{width:30,height:30,borderRadius:"50%",border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",color:"var(--text-secondary)"}}>✕</button>
      </div>



      {/* Messages — only if key is set */}
      <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
            {m.role==="assistant"&&(
              <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#F47920,#5BAD41)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginBottom:2}}>🤖</div>
            )}
            <div style={{
              maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
              background:m.role==="user"?"linear-gradient(135deg,#2E86C1,#185FA5)":"var(--bg-card)",
              backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
              border:m.role==="user"?"none":"0.5px solid var(--glass-border)",
              boxShadow:"var(--glass-shadow-sm)",
              fontSize:13,lineHeight:1.5,
              color:m.role==="user"?"#fff":"var(--text-primary)",
              whiteSpace:"pre-wrap",wordBreak:"break-word",
            }}>
              {m.content}

            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#F47920,#5BAD41)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
            <div style={{padding:"10px 14px",borderRadius:"18px 18px 18px 4px",background:"var(--bg-card)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)"}}>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--text-secondary)",animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite`}}/>
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Quick actions + input */}
      <>
      <div style={{padding:"0 1rem 8px",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        {["¿Cuánto stock queda?","¿Quién me debe?","Presupuesto DJ","Recibo DJ","Cargar pedido"].map(q=>(
          <button key={q} onClick={()=>sendMessage(q)} style={{
            fontSize:11,padding:"6px 12px",borderRadius:"var(--r-pill)",
            border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",
            backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",
            color:"var(--text-primary)",cursor:"pointer",whiteSpace:"nowrap",
            flexShrink:0,boxShadow:"var(--glass-shadow-sm)",
          }}>{q}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{
        padding:"8px 12px calc(8px + env(safe-area-inset-bottom))",
        background:"var(--bg-nav)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",
        borderTop:"0.5px solid var(--glass-border)",flexShrink:0,
        display:"flex",flexDirection:"column",gap:6,
      }}>
        {/* File preview - arriba del input row */}
        {attachedFile&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"var(--bg-tint-blue)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-md)",fontSize:11}}>
            <span>📄</span>
            <span style={{flex:1,color:"var(--text-info)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{attachedFile.name}</span>
            <button onClick={()=>setAttachedFile(null)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text-secondary)",fontSize:16,padding:0,flexShrink:0,lineHeight:1}}>✕</button>
          </div>
        )}
        {/* Input row */}
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <label style={{width:34,height:34,borderRadius:"50%",border:"0.5px solid "+(attachedFile?"var(--border-info)":"var(--glass-border)"),background:attachedFile?"var(--bg-tint-blue)":"var(--bg-card)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",flexShrink:0,color:attachedFile?"var(--text-info)":"var(--text-secondary)",position:"relative"}}>
          {attachedFile?<>📎<span style={{position:"absolute",top:-4,right:-4,width:10,height:10,background:"var(--text-info)",borderRadius:"50%",border:"1.5px solid var(--bg-base)"}}></span></>:"📎"}
          <input type="file" accept=".pdf,image/png,image/jpeg,image/webp" style={{display:"none"}} onChange={async e=>{
            const file=e.target.files?.[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=ev=>{
              const b64=ev.target.result.split(",")[1];
              const mediaType=file.type||"application/pdf";
              setAttachedFile({name:file.name,base64:b64,mediaType});
            };
            reader.readAsDataURL(file);
            e.target.value="";
          }}/>
        </label>
        <textarea
          ref={inputRef}
          value={input}
          onChange={e=>{setInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(input);}}}
          placeholder="Escribí acá... (Enter para enviar)"
          rows={1}
          style={{
            flex:1,resize:"none",border:"0.5px solid var(--glass-border)",
            borderRadius:18,padding:"10px 14px",fontSize:14,
            background:"var(--bg-input)",color:"var(--text-primary)",
            outline:"none",fontFamily:"inherit",lineHeight:1.4,
            maxHeight:120,overflow:"auto",
          }}
        />
        <button
          onClick={()=>sendMessage(input)}
          disabled={!input.trim()||loading}
          style={{
            width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,
            background:input.trim()&&!loading?"linear-gradient(135deg,#F47920,#5BAD41)":"rgba(120,120,128,0.2)",
            color:input.trim()&&!loading?"#fff":"var(--text-secondary)",
            cursor:input.trim()&&!loading?"pointer":"not-allowed",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
            transition:"all .15s",boxShadow:input.trim()&&!loading?"0 4px 12px rgba(244,121,32,0.4)":"none",
          }}
        >➤</button>
        </div>{/* end input row */}
      </div>
      </>
    </div>
  );
}

// BÚSQUEDA GLOBAL
// ══════════════════════════════════════════════════════════════════════════
function SearchModal({data,onClose,goModulo,setView}){
  const [q,setQ]=useState("");
  const inputRef=useRef();
  useEffect(()=>{if(inputRef.current)inputRef.current.focus();},[]);

  const results=[];
  if(q.trim().length<2){
    // Sin query: mostrar accesos rápidos
  } else {
    const ql=q.toLowerCase();
    // Clientes (ventas)
    const clientes=new Map();
    for(const v of(data.ventas||[])){
      if(v.cliente?.toLowerCase().includes(ql)){
        if(!clientes.has(v.cliente)){
          const vCliente=(data.ventas||[]).filter(x=>x.cliente===v.cliente);
          const debe=vCliente.reduce((a,x)=>{const cob=Number(x.pago||0)+(data.pagos||[]).filter(p=>p.ventaId===x.id).reduce((a2,p)=>a2+Number(p.monto),0);return a+(Math.max(0,Number(x.total||0)-cob));},0);
          clientes.set(v.cliente,{nombre:v.cliente,ventas:vCliente.length,debe});
        }
      }
    }
    for(const [,c] of clientes){
      results.push({type:"cliente",icon:"👤",title:c.nombre,sub:c.ventas+" ventas"+( c.debe>0?" · Debe $"+Number(c.debe).toLocaleString("es-AR"):""),action:()=>{goModulo("supercoating");setView("cuentas");onClose();}});
    }
    // Despachos
    for(const d of(data.despachos||[])){
      if(d.cliente?.toLowerCase().includes(ql)||d.provincia?.toLowerCase().includes(ql)||d.expreso?.toLowerCase().includes(ql)){
        results.push({type:"despacho",icon:"📦",title:d.cliente,sub:d.localidad+", "+d.provincia+" · "+( d.expreso||""),action:()=>{goModulo("supercoating");setView("despachos");onClose();}});
      }
    }
    // Ventas por artículo
    const arts=new Set();
    for(const v of(data.ventas||[])){
      if(v.articulo?.toLowerCase().includes(ql)&&!arts.has(v.articulo)){
        arts.add(v.articulo);
        const vs=(data.ventas||[]).filter(x=>x.articulo===v.articulo);
        const totalU=vs.reduce((a,x)=>a+Number(x.cantidad),0);
        results.push({type:"articulo",icon:"📄",title:v.articulo,sub:totalU+" unidades vendidas en "+vs.length+" ops",action:()=>{goModulo("supercoating");setView("ventas");onClose();}});
      }
    }
    // Contenedores
    for(const c of(data.contenedores||[])){
      if(c.nombre?.toLowerCase().includes(ql)){
        results.push({type:"contenedor",icon:"🗃️",title:c.nombre,sub:(c.articulos||[]).length+" artículos",action:()=>{goModulo("supercoating");setView("contenedores");onClose();}});
      }
    }
    // Eventos DJ
    for(const e of(data.dj?.eventos||[])){
      if(e.nombre?.toLowerCase().includes(ql)){
        results.push({type:"evento",icon:"🎵",title:e.nombre,sub:e.fecha+" · "+e.estado,action:()=>{goModulo("dj");onClose();}});
      }
    }
    // Clientes BH
    for(const d of(data.bh?.despachos||[])){
      if(d.exp?.toLowerCase().includes(ql)){
        results.push({type:"bh",icon:"🚢",title:"Despacho "+d.exp,sub:d.fecha+" · $"+Number(d.total||0).toLocaleString("es-AR"),action:()=>{goModulo("bhtrade");onClose();}});
      }
    }
  }

  const QUICK=[
    {icon:"📦",label:"Super Coating",action:()=>{goModulo("supercoating");onClose();}},
    {icon:"🚢",label:"BH Trade",action:()=>{goModulo("bhtrade");onClose();}},
    {icon:"🎵",label:"DJ",action:()=>{goModulo("dj");onClose();}},
    {icon:"💰",label:"Finanzas",action:()=>{goModulo("finanzas");onClose();}},
    {icon:"💾",label:"Backup JSON",action:()=>{
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="backup_eliel_"+new Date().toISOString().split("T")[0]+".json";
      a.click();onClose();
    }},
  ];

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"10vh 1rem 1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:520,background:"var(--bg-modal)",backdropFilter:"blur(40px) saturate(2)",WebkitBackdropFilter:"blur(40px) saturate(2)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-xl)",boxShadow:"var(--glass-shadow-lg)",overflow:"hidden",animation:"modalIn .25s cubic-bezier(.34,1.2,.64,1)"}}>
        {/* Search input */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"0.5px solid var(--glass-border)"}}>
          <span style={{fontSize:18,flexShrink:0}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Buscar clientes, artículos, eventos, despachos…"
            style={{flex:1,border:"none",background:"transparent",fontSize:15,fontWeight:400,color:"var(--text-primary)",outline:"none",width:"auto"}}/>
          {q&&<button onClick={()=>setQ("")} style={{border:"none",background:"none",fontSize:16,cursor:"pointer",color:"var(--text-secondary)",padding:"0 4px"}}>✕</button>}
          <kbd style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"rgba(120,120,128,0.15)",color:"var(--text-secondary)",border:"0.5px solid var(--glass-border)",whiteSpace:"nowrap"}}>ESC</kbd>
        </div>

        {/* Results */}
        <div style={{maxHeight:"55vh",overflowY:"auto"}}>
          {q.trim().length<2?(
            <div style={{padding:"10px 8px"}}>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",padding:"4px 8px",marginBottom:4}}>Acceso rápido</div>
              {QUICK.map((item,i)=>(
                <button key={i} onClick={item.action} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderRadius:"var(--r-md)",border:"none",background:"none",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(120,120,128,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                  <span style={{fontSize:14,fontWeight:500,color:"var(--text-primary)"}}>{item.label}</span>
                </button>
              ))}
            </div>
          ):results.length===0?(
            <div style={{padding:"2rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin resultados para "{q}"</div>
          ):(
            <div style={{padding:"8px"}}>
              {results.map((r,i)=>(
                <button key={i} onClick={r.action} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderRadius:"var(--r-md)",border:"none",background:"none",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(120,120,128,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:18,width:28,textAlign:"center",flexShrink:0}}>{r.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.title}</div>
                    <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.sub}</div>
                  </div>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:"var(--r-pill)",background:"rgba(120,120,128,0.1)",color:"var(--text-secondary)",flexShrink:0}}>{r.type}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
