<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Eliel"/>
  <title>Sistema Eliel</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    /* CSS variables que la app necesita */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-serif: Georgia, serif;
      --font-mono: "SF Mono", Consolas, monospace;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-background-tertiary: #eeede9;
      --color-background-info: #e6f1fb;
      --color-background-success: #e1f5ee;
      --color-background-warning: #faeeda;
      --color-background-danger: #fcebeb;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-text-tertiary: #9b9b9b;
      --color-text-info: #185fa5;
      --color-text-success: #0f6e56;
      --color-text-warning: #854f0b;
      --color-text-danger: #a32d2d;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --color-border-primary: rgba(0,0,0,0.35);
      --color-border-info: #378add;
      --color-border-success: #1d9e75;
      --color-border-warning: #ba7517;
      --color-border-danger: #e24b4a;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2a2a28;
        --color-background-tertiary: #141412;
        --color-background-info: #0c2a4a;
        --color-background-success: #082e22;
        --color-background-warning: #2e1c04;
        --color-background-danger: #2e0e0e;
        --color-text-primary: #f0efeb;
        --color-text-secondary: #9b9b9b;
        --color-text-tertiary: #6b6b6b;
        --color-text-info: #85b7eb;
        --color-text-success: #5dcaa5;
        --color-text-warning: #ef9f27;
        --color-text-danger: #f09595;
        --color-border-tertiary: rgba(255,255,255,0.10);
        --color-border-secondary: rgba(255,255,255,0.20);
        --color-border-primary: rgba(255,255,255,0.32);
      }
    }
    /* Estilos base para inputs y botones */
    input, select, textarea {
      font-family: inherit;
      font-size: 14px;
      padding: 8px 10px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #378add;
    }
    button { font-family: inherit; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: var(--color-background-tertiary);
      font-size: 14px; color: var(--color-text-secondary);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--color-border-tertiary);
      border-top-color: #1d9e75;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Cargando sistema…</span>
  </div>
  <div id="root"></div>

  <!-- React + Babel para compilar JSX en el browser -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="sistema_eliel.jsx" data-presets="react"></script>

  <script>
    // Esperar a que el JSX cargue y renderizar
    window.addEventListener("load", ()=>{
      document.getElementById("loading").style.display = "none";
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(window.App || App));
    });
  </script>
</body>
</html>
