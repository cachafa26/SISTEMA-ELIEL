// ── MonedaInput: module-level to prevent remount on each keystroke ────────
function MonedaInput({labelText,monedaKey,montoKey,form,setForm}){
  return(
    <div>
      <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>{labelText}</label>
      <div style={{display:"flex",gap:6}}>
        <select value={form[monedaKey]} onChange={e=>setForm(f=>({...f,[monedaKey]:e.target.value}))}
          style={{width:72,flexShrink:0,flex:"none"}}>
          <option value="USD">USD</option>
          <option value="ARS">$ ARS</option>
        </select>
        <input
          type="number"
          value={form[montoKey]}
          onChange={e=>setForm(f=>({...f,[montoKey]:e.target.value}))}
          placeholder="0"
          inputMode="decimal"
          style={{flex:1,minWidth:0}}
        />
      </div>
    </div>
  );
}

function DJView({data,save,showToast,blue,onGenerarDoc}){
  const tc=blue||1450;
  const initForm={nombre:"",fecha:hoy(),estado:"Confirmado",
    monedaCobro:"USD",cobro:"",monedaCosto:"ARS",costo:"",sena:"",notas:""};
  const [form,setForm]=useState(initForm);
  const [editId,setEditId]=useState(null);
  const [tab,setTab]=useState("presupuestos"); // presupuestos | confirmados | realizados

  const eventos=data.dj?.eventos||[];
  const presupuestos=[...(data.dj?.presupuestos||[])].sort((a,b)=>b.id.localeCompare(a.id));
  const hoy2=hoy();
  const confirmados=[...eventos.filter(e=>(e.estado==="Confirmado"||e.estado==="Señado")&&e.fecha>=hoy2)].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const realizados=[...eventos.filter(e=>e.estado==="Realizado"||e.estado==="Cancelado"||(( e.estado==="Confirmado"||e.estado==="Señado")&&e.fecha<hoy2))].sort((a,b)=>b.fecha.localeCompare(a.fecha));


  const ganTotal=realizados.filter(e=>e.estado==="Realizado").reduce((a,e)=>a+Number(e.gananciaUSD||0),0);
  const cobroTotal=realizados.filter(e=>e.estado==="Realizado").reduce((a,e)=>a+Number(e.cobroUSD||0),0);
  const saldoTotal=confirmados.filter(e=>e.saldo>0).reduce((a,e)=>a+Number(e.saldo||0),0);

  const previewCobroUSD=form.monedaCobro==="ARS"?Number(form.cobro||0)/tc:Number(form.cobro||0);
  const previewCostoUSD=form.monedaCosto==="ARS"?Number(form.costo||0)/tc:Number(form.costo||0);
  const previewGanUSD=previewCobroUSD-previewCostoUSD;
  const showPreview=Number(form.cobro||0)>0||Number(form.costo||0)>0;

  const guardarEvento=()=>{
    if(!form.nombre.trim())return;
    const cobroRaw=Number(form.cobro||0),costoRaw=Number(form.costo||0),senaRaw=Number(form.sena||0);
    const cobroUSD=form.monedaCobro==="ARS"?cobroRaw/tc:cobroRaw;
    const costoUSD=form.monedaCosto==="ARS"?costoRaw/tc:costoRaw;
    const senaUSD=form.monedaCobro==="ARS"?senaRaw/tc:senaRaw;
    const gananciaUSD=cobroUSD-costoUSD;
    const saldo=Math.max(0,cobroUSD-senaUSD);
    const evento={
      id:editId||Date.now().toString(),nombre:form.nombre,fecha:form.fecha,estado:form.estado,
      monedaCobro:form.monedaCobro,cobro:cobroRaw,cobroUSD,
      monedaCosto:form.monedaCosto,costo:costoRaw,costoUSD,
      sena:senaRaw,senaUSD,saldo,gananciaUSD,
      margen:cobroUSD>0?(gananciaUSD/cobroUSD*100):0,
      notas:form.notas,tcUsado:tc,
    };
    const nuevos=editId?eventos.map(e=>e.id===editId?evento:e):[...eventos,evento];
    save({...data,dj:{...data.dj,eventos:nuevos}});
    setForm(initForm);setEditId(null);
    showToast(editId?"Evento actualizado":"Evento cargado");
  };

  const editar=e=>{setEditId(e.id);setForm({
    nombre:e.nombre,fecha:e.fecha,estado:e.estado,
    monedaCobro:e.monedaCobro||"USD",cobro:String(e.cobro||""),
    monedaCosto:e.monedaCosto||"ARS",costo:String(e.costo||""),
    sena:String(e.sena||""),notas:e.notas||"",
  });setTab("confirmados");};

  const eliminarEvento=id=>save({...data,dj:{...data.dj,eventos:eventos.filter(e=>e.id!==id)}});
  const actualizarEstado=(id,estado)=>save({...data,dj:{...data.dj,eventos:eventos.map(x=>x.id===id?{...x,estado}:x)}});

  // Confirmar desde presupuesto: crea evento confirmado
  const [modalConfirmar,setModalConfirmar]=useState(null);
  const [costoConfirmar,setCostoConfirmar]=useState("");
  const [monedaCostoConf,setMonedaCostoConf]=useState("ARS");

  const confirmarPresupuesto=(p)=>{
    // Open modal to enter cost before confirming
    setModalConfirmar(p);
    setCostoConfirmar("");
    setMonedaCostoConf("ARS");
  };

  const ejecutarConfirmacion=()=>{
    const p=modalConfirmar;
    if(!p) return;
    const costoRaw=Number(costoConfirmar||0);
    const costoUSD=monedaCostoConf==="ARS"?costoRaw/tc:costoRaw;
    const cobroUSD=Number(p.precio||0);
    const gananciaUSD=cobroUSD-costoUSD;
    const evento={
      id:Date.now().toString(),
      nombre:p.cliente+" — "+p.tipoEvento+(p.salon?" ("+p.salon+")":""),
      fecha:p.fecha,estado:"Confirmado",
      monedaCobro:"USD",cobro:cobroUSD,cobroUSD,
      monedaCosto:monedaCostoConf,costo:costoRaw,costoUSD,
      sena:0,senaUSD:0,saldo:cobroUSD,
      gananciaUSD,margen:cobroUSD>0?(gananciaUSD/cobroUSD*100):0,
      notas:p.invitados||"",tcUsado:tc,
      presupuestoId:p.id,
      salon:p.salon,tipoEvento:p.tipoEvento,cliente:p.cliente,
    };
    const nuevosEventos=[...eventos,evento];
    const nuevosPresupuestos=(data.dj?.presupuestos||[]).map(x=>x.id===p.id?{...x,estado:"Confirmado"}:x);
    save({...data,dj:{...data.dj,eventos:nuevosEventos,presupuestos:nuevosPresupuestos}});
    showToast("✓ Evento confirmado");
    setModalConfirmar(null);setTab("confirmados");
  };

  const rechazarPresupuesto=(id)=>{
    const nuevos=(data.dj?.presupuestos||[]).map(x=>x.id===id?{...x,estado:"Rechazado"}:x);
    save({...data,dj:{...data.dj,presupuestos:nuevos}});showToast("Presupuesto cancelado");
  };

  const eliminarPresupuesto=(id)=>{
    if(!window.confirm("¿Eliminar este presupuesto?"))return;
    save({...data,dj:{...data.dj,presupuestos:(data.dj?.presupuestos||[]).filter(p=>p.id!==id)}});
    showToast("Presupuesto eliminado");
  };

  const stColor={Realizado:"var(--text-success)",Confirmado:"var(--text-info)",Señado:"var(--text-warning)",Cancelado:"var(--text-danger)",Rechazado:"var(--text-danger)",Pendiente:"var(--text-secondary)"};
  const stBg={Realizado:"var(--bg-tint-green)",Confirmado:"var(--bg-tint-blue)",Señado:"var(--bg-tint-amber)",Cancelado:"var(--bg-tint-red)",Rechazado:"var(--bg-tint-red)",Pendiente:"rgba(120,120,128,0.1)"};

  // Tab nav style
  const TabBtn=({id,label,count})=>(
    <button onClick={()=>setTab(id)} style={{
      flex:1,padding:"8px 4px",border:"none",borderRadius:"var(--r-md)",cursor:"pointer",
      fontSize:11,fontWeight:tab===id?700:400,
      background:tab===id?"var(--bg-card)":"transparent",
      color:tab===id?"var(--text-primary)":"var(--text-secondary)",
      boxShadow:tab===id?"var(--glass-shadow-sm)":"none",transition:"all .15s",
    }}>
      {label}{count>0&&<span style={{marginLeft:5,fontSize:10,background:tab===id?"var(--bg-tint-blue)":"rgba(120,120,128,0.15)",color:tab===id?"var(--text-info)":"var(--text-secondary)",padding:"1px 5px",borderRadius:"var(--r-pill)"}}>{count}</span>}
    </button>
  );

  return(
    <div>
      <div style={{marginBottom:"1.25rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 4px",color:"var(--text-primary)"}}>DJ</h2>
        <p style={{fontSize:13,color:"var(--text-secondary)",margin:0}}>Gestión bimonetaria de eventos</p>
      </div>

      {/* Métricas */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        {[
          {l:"Presupuestados",v:presupuestos.filter(p=>p.estado==="Pendiente").length},
          {l:"Confirmados",v:confirmados.length,info:true},
          {l:"Cobrado USD",v:fmtUSD(cobroTotal),green:cobroTotal>0},
          {l:"Ganancia USD",v:fmtUSD(ganTotal),green:ganTotal>0},
          ...(saldoTotal>0?[{l:"Saldo pendiente",v:fmtUSD(saldoTotal),warn:true}]:[]),
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--bg-tint-green)":x.warn?"var(--bg-tint-amber)":x.info?"var(--bg-tint-blue)":"rgba(120,120,128,0.10)",border:"0.5px solid "+(x.green?"var(--border-success)":x.warn?"rgba(244,121,32,.3)":x.info?"var(--border-info)":"var(--glass-border)"),borderRadius:"var(--r-lg)",padding:"12px 14px",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
            <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:x.green?"var(--text-success)":x.warn?"var(--text-warning)":x.info?"var(--text-info)":"var(--text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:16,fontWeight:700,color:x.green?"var(--text-success)":x.warn?"var(--text-warning)":x.info?"var(--text-info)":"var(--text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>

      {/* Confirm presupuesto modal */}
      {modalConfirmar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{background:"var(--bg-modal)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",borderRadius:"var(--r-xl)",padding:"24px",width:"100%",maxWidth:360,border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-lg)",animation:"modalIn .25s cubic-bezier(.34,1.2,.64,1)"}}>
            <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 4px",color:"var(--text-primary)"}}>Confirmar evento</h3>
            <p style={{fontSize:12,color:"var(--text-secondary)",margin:"0 0 16px"}}>{modalConfirmar.cliente} — {modalConfirmar.tipoEvento}<br/>{modalConfirmar.fecha}{modalConfirmar.salon?" · "+modalConfirmar.salon:""}</p>
            <div style={{background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-md)",padding:"8px 12px",marginBottom:14,fontSize:12}}>
              <span style={{color:"var(--text-secondary)"}}>Cobro: </span>
              <strong style={{color:"var(--text-success)"}}>USD {modalConfirmar.precio}</strong>
            </div>
            <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:6}}>Tu costo para este evento</label>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              <select value={monedaCostoConf} onChange={e=>setMonedaCostoConf(e.target.value)} style={{width:72,flexShrink:0}}>
                <option value="ARS">$ ARS</option>
                <option value="USD">USD</option>
              </select>
              <input type="number" value={costoConfirmar} onChange={e=>setCostoConfirmar(e.target.value)} placeholder="0" autoFocus inputMode="decimal"/>
            </div>
            {costoConfirmar&&(
              <div style={{padding:"8px 12px",background:"rgba(120,120,128,0.08)",borderRadius:"var(--r-md)",marginBottom:14,fontSize:12}}>
                Ganancia estimada: <strong style={{color:(Number(modalConfirmar.precio)-(monedaCostoConf==="ARS"?Number(costoConfirmar)/(tc):Number(costoConfirmar)))>=0?"var(--text-success)":"var(--text-danger)"}}>{fmtUSD(Number(modalConfirmar.precio)-(monedaCostoConf==="ARS"?Number(costoConfirmar)/tc:Number(costoConfirmar)))}</strong>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={ejecutarConfirmacion} style={{flex:1,padding:"11px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>✓ Confirmar</button>
              <button onClick={()=>setModalConfirmar(null)} style={{padding:"11px 16px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer",fontSize:13}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* IA hint */}
      <div style={{background:"linear-gradient(135deg,rgba(244,121,32,0.1),rgba(91,173,65,0.1))",border:"0.5px solid rgba(244,121,32,0.25)",borderRadius:"var(--r-lg)",padding:"10px 14px",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>🤖</span>
        <div style={{fontSize:12,color:"var(--text-secondary)"}}>Usá el asistente IA para generar presupuestos PDF, confirmar eventos y registrar pagos con lenguaje natural.</div>
      </div>

      {/* Tabs + add button */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:"1.25rem"}}>
        <div style={{display:"flex",flex:1,gap:4,background:"rgba(120,120,128,0.1)",borderRadius:"var(--r-lg)",padding:4}}>
          <TabBtn id="presupuestos" label="Presupuestos" count={presupuestos.filter(p=>p.estado==="Pendiente").length}/>
          <TabBtn id="confirmados"  label="Confirmados"  count={confirmados.length}/>
          <TabBtn id="realizados"   label="Historial"    count={realizados.length}/>
        </div>
        <button onClick={()=>setTab(tab==="nuevo"?"confirmados":"nuevo")} style={{
          flexShrink:0,padding:"8px 14px",borderRadius:"var(--r-lg)",border:"none",cursor:"pointer",
          background:tab==="nuevo"?"var(--bg-tint-blue)":"linear-gradient(135deg,#185FA5,#2E86C1)",
          color:"#fff",fontWeight:700,fontSize:13,
          boxShadow:tab==="nuevo"?"none":"0 4px 14px rgba(24,95,165,0.35)",
        }}>{tab==="nuevo"?"✕":"+ Evento"}</button>
      </div>

      {/* ── TAB: PRESUPUESTOS ── */}
      {tab==="presupuestos"&&(
        <div>
          {presupuestos.length===0
            ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>
              Sin presupuestos. Usá el asistente IA para generar uno.
            </div>
            :<div style={{display:"grid",gap:10}}>
              {presupuestos.map(p=>(
                <div key={p.id} style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"var(--text-primary)",marginBottom:2}}>{p.cliente}</div>
                      <div style={{fontSize:11,color:"var(--text-secondary)"}}>{p.tipoEvento} · {p.fecha} · {p.salon}</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <span style={{fontSize:11,padding:"2px 9px",borderRadius:"var(--r-pill)",fontWeight:600,background:stBg[p.estado]||"rgba(120,120,128,0.1)",color:stColor[p.estado]||"var(--text-secondary)"}}>{p.estado}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--text-success)"}}>USD {p.precio}</div>
                    <div style={{display:"flex",gap:6}}>
                      {p.pdfData&&<button onClick={()=>{
                        const link=document.createElement("a");link.href=p.pdfData;
                        link.download=`Presupuesto_${p.cliente}_${p.fecha}.pdf`;link.click();
                      }} style={{fontSize:11,padding:"5px 10px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--border-info)",background:"var(--bg-tint-blue)",color:"var(--text-info)",cursor:"pointer"}}>⬇ PDF</button>}
                      {p.estado==="Pendiente"&&<>
                        <button onClick={()=>confirmarPresupuesto(p)} style={{fontSize:11,padding:"5px 10px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",cursor:"pointer",fontWeight:600}}>✓ Confirmar</button>
                        <button onClick={()=>rechazarPresupuesto(p.id)} style={{fontSize:11,padding:"5px 10px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--border-danger)",background:"var(--bg-tint-red)",color:"var(--text-danger)",cursor:"pointer"}}>✕ Rechazar</button>
                      </>}
                      {p.estado==="Rechazado"&&<>
                        <button onClick={()=>{
                          const nuevos=(data.dj?.presupuestos||[]).map(x=>x.id===p.id?{...x,estado:"Pendiente"}:x);
                          save({...data,dj:{...data.dj,presupuestos:nuevos}});showToast("Presupuesto reactivado");
                        }} style={{fontSize:11,padding:"5px 10px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--border-info)",background:"var(--bg-tint-blue)",color:"var(--text-info)",cursor:"pointer",fontWeight:600}}>↩ Reactivar</button>
                        <button onClick={()=>confirmarPresupuesto(p)} style={{fontSize:11,padding:"5px 10px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",cursor:"pointer",fontWeight:600}}>✓ Confirmar igual</button>
                      </>}
                      <button onClick={()=>eliminarPresupuesto(p.id)} style={{fontSize:11,padding:"5px 8px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>🗑</button>
                    </div>
                  </div>
                  {p.invitados&&<div style={{fontSize:10,color:"var(--text-secondary)",marginTop:4}}>{p.invitados} · {p.conTecnica?"Con técnica":"Sin técnica"}{p.numeroDoc?" · "+p.numeroDoc:""}</div>}
                </div>
              ))}
            </div>
          }
        </div>
      )}

      {/* ── TAB: CONFIRMADOS ── */}
      {tab==="confirmados"&&(
        <div style={{display:"grid",gap:10}}>
          {/* Nuevo evento form aquí también */}
          {confirmados.length===0&&!editId&&<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>Sin eventos confirmados.</div>}
          {confirmados.map(e=>(
            <div key={e.id} style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:14,color:"var(--text-primary)"}}>{e.nombre}</span>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 9px",borderRadius:"var(--r-pill)",background:stBg[e.estado]||"rgba(120,120,128,0.1)",color:stColor[e.estado]||"var(--text-secondary)"}}>{e.estado}</span>

                  <div style={{fontSize:11,color:"var(--text-secondary)"}}>{e.fecha}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <select value={e.estado} onChange={ev=>actualizarEstado(e.id,ev.target.value)} style={{fontSize:11,padding:"3px 6px",borderRadius:6,width:"auto"}}>
                    {["Confirmado","Señado","Realizado","Cancelado"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <button onClick={()=>editar(e)} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,padding:"2px 4px"}}>✏️</button>
                  <button onClick={()=>{if(window.confirm("¿Eliminar?"))eliminarEvento(e.id);}} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text-danger)",fontSize:14}}>✕</button>
                </div>
              </div>
              <div style={{display:"flex",gap:12,fontSize:12,flexWrap:"wrap"}}>
                <span style={{color:"var(--text-secondary)"}}>Cobro: <strong style={{color:"var(--text-primary)"}}>{e.monedaCobro==="ARS"?"$"+fmt(e.cobro):fmtUSD(e.cobro||e.cobroUSD||0)}</strong></span>
                {e.costo>0&&<span style={{color:"var(--text-secondary)"}}>Costo: <strong>{e.monedaCosto==="ARS"?"$"+fmt(e.costo):fmtUSD(e.costo)}</strong></span>}
                {e.sena>0&&<span style={{color:"var(--text-success)"}}>Seña: <strong>{e.monedaCobro==="ARS"?"$"+fmt(e.sena):fmtUSD(e.sena)}</strong></span>}
                {e.saldo>0&&<span style={{color:"var(--text-warning)",fontWeight:700}}>Saldo: {fmtUSD(e.saldo)}</span>}
                <span style={{color:(e.gananciaUSD||0)>=0?"var(--text-success)":"var(--text-danger)",fontWeight:600}}>Gan: {fmtUSD(e.gananciaUSD||0)}</span>
              </div>
              {e.notas&&<div style={{fontSize:11,color:"var(--text-secondary)",marginTop:6,fontStyle:"italic"}}>{e.notas}</div>}
            </div>
          ))}
        </div>
      )}

      {/* ── TAB: NUEVO EVENTO (manual) ── */}
      {tab==="nuevo"&&(
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px 18px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:12}}>{editId?"Editar evento":"Nuevo evento manual"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Nombre del evento</label><input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder="Casamiento García — Salón XYZ"/></div>
            <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/></div>
            <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Estado</label><select value={form.estado} onChange={e=>setForm(f=>({...f,estado:e.target.value}))}>{["Confirmado","Señado","Realizado","Cancelado"].map(s=><option key={s}>{s}</option>)}</select></div>
            <MonedaInput labelText="Cobro total" monedaKey="monedaCobro" montoKey="cobro" form={form} setForm={setForm}/>
            <MonedaInput labelText="Costo total" monedaKey="monedaCosto" montoKey="costo" form={form} setForm={setForm}/>
            <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Seña ({form.monedaCobro})</label><input type="number" value={form.sena} onChange={e=>setForm(f=>({...f,sena:e.target.value}))} placeholder="0" inputMode="decimal"/></div>
            <div style={{display:"flex",alignItems:"flex-end"}}>
              {showPreview&&<div style={{width:"100%",padding:"9px 11px",background:previewGanUSD>=0?"var(--bg-tint-green)":"var(--bg-tint-red)",border:"0.5px solid "+(previewGanUSD>=0?"var(--border-success)":"var(--border-danger)"),borderRadius:"var(--r-md)",fontSize:12}}>
                <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:previewGanUSD>=0?"var(--text-success)":"var(--text-danger)",marginBottom:3}}>Ganancia estimada</div>
                <div style={{fontWeight:700,color:previewGanUSD>=0?"var(--text-success)":"var(--text-danger)"}}>{fmtUSD(previewGanUSD)}</div>
                <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:2}}>≈ ${fmt(previewGanUSD*tc)} ARS</div>
              </div>}
            </div>
            <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Notas</label><input value={form.notas} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} placeholder="Rider, detalles..."/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={guardarEvento} style={{fontSize:13,padding:"9px 20px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#185FA5,#2E86C1)",color:"#fff",fontWeight:600,cursor:"pointer",boxShadow:"0 4px 14px rgba(24,95,165,0.35)"}}>{editId?"Actualizar":"Guardar evento"}</button>
            {editId&&<button onClick={()=>{setEditId(null);setForm(initForm);setTab("confirmados");}} style={{fontSize:13,padding:"9px 16px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>}
          </div>
        </div>
      )}

      {/* ── TAB: HISTORIAL ── */}
      {tab==="realizados"&&(
        <div style={{display:"grid",gap:8}}>
          {realizados.length===0&&<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>Sin historial aún.</div>}
          {realizados.map(e=>(
            <div key={e.id} style={{background:"var(--bg-card)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"12px 14px",opacity:e.estado==="Cancelado"?0.6:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontWeight:600,fontSize:13,color:"var(--text-primary)",marginRight:8}}>{e.nombre}</span>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:"var(--r-pill)",background:stBg[e.estado]||"rgba(120,120,128,0.1)",color:stColor[e.estado]||"var(--text-secondary)"}}>{e.estado}</span>
                </div>
                <div style={{fontSize:12,fontWeight:600,color:e.gananciaUSD>=0?"var(--text-success)":"var(--text-danger)"}}>{fmtUSD(e.gananciaUSD||0)}</div>
              </div>
              <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:3}}>{e.fecha} · Cobro: {e.monedaCobro==="ARS"?"$"+fmt(e.cobro):fmtUSD(e.cobro)} · Costo: {e.monedaCosto==="ARS"?"$"+fmt(e.costo):fmtUSD(e.costo)}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════
// FINANZAS PERSONALES
// ══════════════════════════════════════════════════════════════════════════
function FinanzasView({data,save,showToast,blue,totalIngresos,totalGastos,bhTotalAnio,djCobrado,totalRetSCPesos,bhSueldo,pendienteRetiro}){
  const tcBlue=blue||1450;
  const initForm={desc:"",moneda:"ARS",monto:"",cotiz:String(Math.round(tcBlue)),cat:"Alimentación",fecha:hoy(),fuente:"Otros"};
  const [form,setForm]=useState(initForm);
  const [showPresupuesto,setShowPresupuesto]=useState(false);
  const [presupCat,setPresupCat]=useState("");
  const [presupMonto,setPresupMonto]=useState("");
  const gastos=data.fin?.gastos||[];
  const balance=totalIngresos-totalGastos;
  const presupuestos=data.fin?.presupuestos||{};
  const mesActual=new Date().getMonth();
  const gastosMes=gastos.filter(g=>{const d=new Date(g.fecha);return d.getMonth()===mesActual&&d.getFullYear()===new Date().getFullYear();});
  const totalGastosMes=gastosMes.reduce((a,g)=>a+g.monto,0);
  
  const guardarPresupuesto=()=>{
    if(!presupCat||!presupMonto)return;
    save({...data,fin:{...data.fin,presupuestos:{...presupuestos,[presupCat]:Number(presupMonto)}}});
    setPresupCat("");setPresupMonto("");setShowPresupuesto(false);showToast("Presupuesto guardado");
  };

  // monto siempre guardado en ARS
  const montoARS=form.moneda==="USD"
    ? Number(form.monto||0)*Number(form.cotiz||tcBlue)
    : Number(form.monto||0);

  const guardar=()=>{
    if(!form.desc.trim()||!form.monto)return;
    const gasto={
      id:Date.now().toString(),
      desc:form.desc,
      moneda:form.moneda,
      montoOriginal:Number(form.monto),
      cotiz:form.moneda==="USD"?Number(form.cotiz||tcBlue):null,
      monto:montoARS,           // siempre ARS para cálculos
      cat:form.cat,
      fecha:form.fecha,
      fuente:form.fuente,
    };
    save({...data,fin:{...data.fin,gastos:[...gastos,gasto]}});
    setForm({...initForm,cotiz:String(Math.round(tcBlue))});
    showToast("Gasto cargado");
  };
  const eliminar=id=>save({...data,fin:{...data.fin,gastos:gastos.filter(g=>g.id!==id)}});

  // Por categoría
  const porCat={};
  gastos.forEach(g=>{porCat[g.cat]=(porCat[g.cat]||0)+g.monto;});
  const catArr=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(...catArr.map(c=>c[1]),1);
  const catColors=["var(--color-text-info)","var(--color-text-success)","var(--color-text-warning)","var(--color-text-danger)","#533AB7","var(--color-text-success)","var(--color-border-warning)","var(--color-text-secondary)"];

  // Por fuente
  const fuentes=[
    {n:"Super Coating",v:totalRetSCPesos,c:"var(--color-text-success)"},
    {n:"BH Trade",v:bhTotalAnio,c:"var(--color-text-info)"},
    {n:"DJ",v:djCobrado,c:"var(--color-text-warning)"},
  ];
  const maxFuente=Math.max(...fuentes.map(f=>f.v),1);

  const monedaBtn=(mon)=>(
    <button onClick={()=>setForm(f=>({...f,moneda:mon}))}
      style={{flex:1,padding:"7px",fontSize:12,fontWeight:500,border:"0.5px solid "+(form.moneda===mon?"var(--color-text-info)":"var(--color-border-secondary)"),borderRadius:"var(--border-radius-md)",cursor:"pointer",background:form.moneda===mon?"var(--color-background-info)":"var(--color-background-primary)",color:form.moneda===mon?"var(--color-text-info)":"var(--color-text-secondary)"}}>
      {mon==="ARS"?"$ Pesos":"USD Dólares"}
    </button>
  );

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>Finanzas personales</h2>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>Seguimiento de gastos y balance de ingresos</p>
      </div>

      {/* Métricas */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[
          {l:"Ingresos totales",v:"$"+fmt(totalIngresos)},
          {l:"Total gastado",v:"$"+fmt(totalGastos),danger:totalGastos>0},
          {l:"Balance",v:"$"+fmt(balance),green:balance>=0,danger:balance<0},
          {l:"N° de gastos",v:gastos.length},
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--color-background-success)":x.danger&&typeof x.v==="string"?"var(--color-background-danger)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
            <div style={{fontSize:11,color:x.green?"var(--color-text-success)":x.danger&&typeof x.v==="string"?"var(--color-text-danger)":"var(--color-text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:18,fontWeight:500,color:x.green?"var(--color-text-success)":x.danger&&typeof x.v==="string"?"var(--color-text-danger)":"var(--color-text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>

      {/* Formulario */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:12,color:"var(--color-text-primary)"}}>Cargar gasto</div>

        {/* Toggle moneda */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"var(--color-text-secondary)",display:"block",marginBottom:5}}>Moneda</label>
          <div style={{display:"flex",gap:6}}>{monedaBtn("ARS")}{monedaBtn("USD")}</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Descripción</label>
            <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Alquiler, supermercado, nafta..." style={{width:"100%",marginTop:4,boxSizing:"border-box"}}/>
          </div>

          <div>
            <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>
              {form.moneda==="USD"?"Monto (USD)":"Monto ($ARS)"}
            </label>
            <input type="number" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})} placeholder="0" style={{width:"100%",marginTop:4,boxSizing:"border-box"}}/>
          </div>

          {form.moneda==="USD"?(
            <div>
              <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>
                Cotización blue{blue?" · real $"+fmt(blue):""}
              </label>
              <input type="number" value={form.cotiz} onChange={e=>setForm({...form,cotiz:e.target.value})} style={{width:"100%",marginTop:4,boxSizing:"border-box"}}/>
            </div>
          ):<div/>}

          <div>
            <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Categoría</label>
            <select value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})} style={{width:"100%",marginTop:4}}>
              {CATS_GASTO.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>

          <div>
            <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Fecha</label>
            <input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} style={{width:"100%",marginTop:4,boxSizing:"border-box"}}/>
          </div>

          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Fuente de ingreso</label>
            <select value={form.fuente} onChange={e=>setForm({...form,fuente:e.target.value})} style={{width:"100%",marginTop:4}}>
              <option>Super Coating</option><option>BH Trade</option><option>DJ</option><option>Otros</option>
            </select>
          </div>
        </div>

        {/* Preview conversión */}
        {form.monto>0&&form.moneda==="USD"&&(
          <div style={{background:"var(--color-background-info)",borderRadius:"var(--border-radius-md)",padding:"8px 12px",marginBottom:10,fontSize:12,color:"var(--color-text-info)"}}>
            {fmtUSD(form.monto)} × ${fmt(form.cotiz||tcBlue)} = <strong>${fmt(montoARS)}</strong> ARS
          </div>
        )}

        <button onClick={guardar} style={{fontSize:13,padding:"8px 16px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-danger)",color:"var(--color-background-primary)",fontWeight:500,marginTop:2}}>
          Cargar gasto
        </button>
      </div>

      {/* Gráficos */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.5rem"}}>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:500,marginBottom:12,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Por categoría</div>
          {catArr.length===0
            ?<p style={{color:"var(--color-text-secondary)",fontSize:13,margin:0}}>Sin gastos aún.</p>
            :catArr.map(([cat,v],i)=>(
              <div key={cat} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span style={{color:"var(--color-text-primary)"}}>{cat}</span>
                  <span style={{color:"var(--color-text-secondary)",fontWeight:500}}>${fmt(v)}</span>
                </div>
                <div style={{height:5,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:(v/maxCat*100)+"%",background:catColors[i%catColors.length],borderRadius:3,transition:"width .3s"}}/>
                </div>
              </div>
            ))
          }
        </div>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:500,marginBottom:12,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Ingresos por módulo</div>
          {fuentes.map(f=>(
            <div key={f.n} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{color:"var(--color-text-primary)"}}>{f.n}</span>
                <span style={{color:"var(--color-text-secondary)",fontWeight:500}}>${fmt(f.v)}</span>
              </div>
              <div style={{height:5,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:(f.v/maxFuente*100)+"%",background:f.c,borderRadius:3,transition:"width .3s"}}/>
              </div>
            </div>
          ))}
          {totalIngresos>0&&(
            <div style={{marginTop:14,padding:"8px 10px",background:totalGastos/totalIngresos>0.7?"var(--color-background-danger)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",fontSize:12,color:totalGastos/totalIngresos>0.7?"var(--color-text-danger)":"var(--color-text-secondary)"}}>
              Gastado: <strong>{fmtPct(totalGastos/totalIngresos*100)}</strong> de los ingresos
            </div>
          )}
        </div>
      </div>

      {/* ── PRESUPUESTO MENSUAL ── */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)"}}>Presupuesto mensual — {["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][mesActual]}</div>
          <button onClick={()=>setShowPresupuesto(s=>!s)} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>+ Límite</button>
        </div>
        {showPresupuesto&&(
          <div style={{background:"rgba(120,120,128,0.06)",borderRadius:"var(--r-md)",padding:"12px",marginBottom:12,border:"0.5px solid var(--glass-border)"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Categoría</label><select value={presupCat} onChange={e=>setPresupCat(e.target.value)}><option value="">Elegir...</option>{CATS_GASTO.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Límite mensual ($)</label><input type="number" value={presupMonto} onChange={e=>setPresupMonto(e.target.value)} placeholder="0"/></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={guardarPresupuesto} style={{fontSize:12,padding:"6px 14px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#F47920,#5BAD41)",color:"#fff",fontWeight:600,cursor:"pointer"}}>Guardar</button>
              <button onClick={()=>setShowPresupuesto(false)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        )}
        {Object.keys(presupuestos).length===0?<div style={{fontSize:12,color:"var(--text-secondary)",padding:"4px 0"}}>Sin presupuestos definidos. Agregá límites por categoría.</div>:(
          <div style={{display:"grid",gap:8}}>
            {Object.entries(presupuestos).map(([cat,limite])=>{
              const gastado=gastosMes.filter(g=>g.cat===cat).reduce((a,g)=>a+g.monto,0);
              const pct=limite>0?Math.min(100,(gastado/limite)*100):0;
              const over=gastado>limite;
              return(
                <div key={cat}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                    <span style={{color:"var(--text-primary)",fontWeight:500}}>{cat}</span>
                    <span style={{color:over?"var(--text-danger)":"var(--text-secondary)"}}>${fmt(gastado)} / ${fmt(limite)}{over?" ⚠":""}</span>
                  </div>
                  <div style={{height:5,background:"rgba(120,120,128,0.15)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:over?"var(--text-danger)":pct>80?"var(--text-warning)":"var(--text-success)",borderRadius:3,transition:"width .4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{marginTop:12,paddingTop:10,borderTop:"0.5px solid var(--glass-border)",fontSize:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"var(--text-secondary)"}}>Total gastado este mes:</span>
          <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(totalGastosMes)}</span>
        </div>
      </div>

      {/* ── PROYECCIÓN DE INGRESOS ── */}
      <div style={{background:"var(--bg-tint-blue)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:12}}>Proyección de ingresos — próximos 30 días</div>
        {(()=>{
          const djConfirmados=(data.dj?.eventos||[]).filter(e=>(e.estado==="Confirmado"||e.estado==="Señado")&&e.saldo>0).reduce((a,e)=>a+e.saldo,0);
          const djSenas=(data.dj?.eventos||[]).filter(e=>e.estado==="Señado"&&e.sena>0).reduce((a,e)=>a+e.sena,0);
          const bhEstimado=bhSueldo;
          const sc30Pesos=pendienteRetiro*(blue||1450);
          const totalEstimado=djConfirmados+bhEstimado+sc30Pesos;
          const items=[
            {l:"DJ — saldo pendiente (confirmados)",v:djConfirmados,show:djConfirmados>0},
            {l:"BH Trade — sueldo mes actual",v:bhEstimado,show:bhEstimado>0},
            {l:"Mi 30% SC (en pesos)",v:sc30Pesos,show:sc30Pesos>0},
          ].filter(i=>i.show);
          return items.length===0?<div style={{fontSize:12,color:"var(--text-info)"}}>Cargá eventos DJ, despachos BH y ventas SC para ver la proyección.</div>:(
            <div>
              {items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid rgba(46,134,193,0.2)",fontSize:13}}>
                  <span style={{color:"var(--text-info)"}}>{item.l}</span>
                  <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(item.v)}</span>
                </div>
              ))}
              <div style={{marginTop:10,display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700}}>
                <span style={{color:"var(--text-info)"}}>Total estimado</span>
                <span style={{color:"var(--text-primary)"}}>${fmt(totalEstimado)}</span>
              </div>
              <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:6}}>* Estimación basada en datos actuales. No garantiza ingresos reales.</div>
            </div>
          );
        })()}
      </div>

      {/* Lista gastos */}
      {gastos.length>0&&(
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Historial de gastos</div>
          {[...gastos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(g=>(
            <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:"var(--color-text-primary)",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.desc}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>
                  {g.fecha} · {g.cat} · {g.fuente}
                  {g.moneda==="USD"&&g.cotiz&&<span style={{color:"var(--color-text-info)"}}> · {fmtUSD(g.montoOriginal||0)} @ ${fmt(g.cotiz)}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,marginLeft:12}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-danger)"}}>-${fmt(g.monto)}</div>
                  {g.moneda==="USD"&&<div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{fmtUSD(g.montoOriginal||0)}</div>}
                </div>
                <button onClick={()=>eliminar(g.id)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:14,padding:"2px 4px",borderRadius:4,lineHeight:1}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// MODAL PEDIDO (SC)
// ══════════════════════════════════════════════════════════════════════════
function PedidoModal({data,save,blue,onClose,showToast,clienteIdx}){
  const [cliente,setCliente]=useState("");
  const [fecha,setFecha]=useState(hoy());
  const [tc,setTc]=useState(blue?String(Math.round(blue)):"1450");
  const [items,setItems]=useState([{nombre:ARTS[0],cantidad:"",precioUnitario:"",moneda:"ARS"}]);
  const [pagoTotal,setPagoTotal]=useState("");
  const [pagoCompleto,setPagoCompleto]=useState(false);
  const [entrega,setEntrega]=useState("Retira Once");
  const [datosExp,setDatosExp]=useState({nombre:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:""});
  const [preview,setPreview]=useState(null);
  const [errores,setErrores]=useState([]);

  const handleCliente=val=>{
    setCliente(val);
    if(clienteIdx[val]&&clienteIdx[val].direccion){
      setDatosExp({nombre:clienteIdx[val].nombre||val,dni:clienteIdx[val].dni||"",direccion:clienteIdx[val].direccion||"",localidad:clienteIdx[val].localidad||"",provincia:clienteIdx[val].provincia||"",expreso:clienteIdx[val].expreso||""});
    }
  };

  const addItem=()=>setItems([...items,{nombre:ARTS[0],cantidad:"",precioUnitario:"",moneda:"ARS"}]);
  const updItem=(i,f,v)=>{const its=[...items];its[i]={...its[i],[f]:v};setItems(its);};
  const remItem=i=>setItems(items.filter((_,idx)=>idx!==i));
  const calcARS=it=>it.moneda==="USD"?Number(it.precioUnitario||0)*Number(tc):Number(it.precioUnitario||0);
  const totalPedido=items.reduce((a,it)=>a+calcARS(it)*Number(it.cantidad||0),0);

  useEffect(()=>{if(pagoCompleto)setPagoTotal(String(Math.round(totalPedido)));else setPagoTotal("");},[pagoCompleto,totalPedido]);

  const generarPreview=()=>{
    if(!cliente.trim()){showToast("Ingresá el nombre del cliente");return;}
    const itemsN=items.filter(it=>it.cantidad&&it.precioUnitario).map(it=>({nombre:it.nombre,cantidad:Number(it.cantidad),precioUnitario:calcARS(it)}));
    if(!itemsN.length){showToast("Agregá al menos un artículo");return;}
    const res=distribuir(itemsN,data.contenedores,data.ventas);
    setErrores(res.errores);
    if(res.errores.length){setPreview(null);return;}
    setPreview(res);
  };

  const confirmar=()=>{
    if(!preview)return;
    const resultado=preview.resultado;
    const totalG=resultado.reduce((a,r)=>a+r.subtotal,0);
    const pagoN=Number(pagoTotal||0);const tcN=Number(tc)||1450;const pid=Date.now().toString();
    const nuevasVentas=resultado.map(r=>{
      const prop=totalG>0?(r.subtotal/totalG)*pagoN:0;
      const estado=entrega==="Expreso"?"A despachar":entrega.includes("Ezeiza")?"A retirar Ezeiza":"A retirar Once";
      return{id:pid+Math.random().toString(36).slice(2,5),contId:r.contId,fecha,articulo:r.artNombre,cantidad:r.cantidad,cliente,precioVenta:r.precioUnitario,total:r.subtotal,usd:r.subtotal/tcN,pago:prop,tipoCambioUsado:tcN,pedidoId:pid,entrega,estado};
    });
    let newData={...data,ventas:[...(data.ventas||[]),...nuevasVentas]};
    if(entrega==="Expreso"){
      const desp={id:pid,fecha,cliente:datosExp.nombre||cliente,dni:datosExp.dni,direccion:datosExp.direccion,localidad:datosExp.localidad,provincia:datosExp.provincia,expreso:datosExp.expreso,estado:"Pendiente",pedidoId:pid,articulos:resultado.map(r=>r.artNombre+" x"+r.cantidad).join(", ")};
      newData={...newData,despachos:[...(data.despachos||[]),desp]};
    }
    // Persist client data
    if(datosExp.nombre||datosExp.dni||datosExp.direccion){
      newData={...newData,clientes:{...(newData.clientes||{}),[cliente]:{nombre:datosExp.nombre||cliente,dni:datosExp.dni||"",direccion:datosExp.direccion||"",localidad:datosExp.localidad||"",provincia:datosExp.provincia||"",expreso:datosExp.expreso||""}}};
    }
    save(newData);showToast("Pedido cargado ✓");onClose();
  };

  const clienteSuggs=Object.keys(clienteIdx);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"1rem"}}>
      <div style={{background:"var(--color-background-primary)",borderRadius:16,width:"100%",maxWidth:600,padding:"1.75rem",margin:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.35)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem",borderBottom:"1px solid #e8e8e8",paddingBottom:"1rem"}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:600,margin:0,color:"var(--color-text-primary)"}}>Nuevo pedido</h2>
            <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:"3px 0 0"}}>Completá los datos y el sistema distribuye automáticamente</p>
          </div>
          <button onClick={onClose} style={{border:"1px solid #ddd",background:"rgba(120,120,128,0.08)",cursor:"pointer",fontSize:15,color:"var(--color-text-secondary)",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1rem"}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Cliente</label>
            <div style={{marginTop:3}}>
              <Autocomplete value={cliente} onChange={handleCliente} suggestions={clienteSuggs} placeholder="Nombre del cliente"/>
            </div>
          </div>
          <div><label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Fecha</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={{width:"100%",marginTop:3,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,color:"var(--color-text-secondary)"}}>{blue?"Blue · $"+fmt(blue):"Blue ($/USD)"}</label><input type="number" value={tc} onChange={e=>setTc(e.target.value)} style={{width:"100%",marginTop:3,boxSizing:"border-box"}}/></div>
        </div>

        <div style={{background:"rgba(120,120,128,0.08)",borderRadius:10,padding:"12px",marginBottom:"1rem"}}>
          <p style={{fontSize:13,fontWeight:500,margin:"0 0 10px",color:"var(--color-text-primary)"}}>Artículos</p>
          {items.map((it,i)=>(
            <div key={i} style={{background:"var(--color-background-primary)",borderRadius:8,padding:"10px",marginBottom:8,border:"1px solid #eee"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>Artículo {i+1}</span>
                {items.length>1&&<button onClick={()=>remItem(i)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:12}}>✕</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 70px",gap:6}}>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Artículo</label><select value={it.nombre} onChange={e=>updItem(i,"nombre",e.target.value)} style={{width:"100%",marginTop:2,fontSize:12}}>{ARTS.map(a=><option key={a}>{a}</option>)}</select></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cant.</label><input type="number" value={it.cantidad} onChange={e=>updItem(i,"cantidad",e.target.value)} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Precio</label><input type="number" value={it.precioUnitario} onChange={e=>updItem(i,"precioUnitario",e.target.value)} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Moneda</label><select value={it.moneda} onChange={e=>updItem(i,"moneda",e.target.value)} style={{width:"100%",marginTop:2,fontSize:12}}><option value="ARS">$ARS</option><option value="USD">USD</option></select></div>
              </div>
              {it.cantidad&&it.precioUnitario&&<div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:5}}>Subtotal: ${fmt(calcARS(it)*Number(it.cantidad))} · {fmtUSD(calcARS(it)*Number(it.cantidad)/Number(tc||1450))}</div>}
            </div>
          ))}
          <button onClick={addItem} style={{fontSize:12,padding:"5px 10px",borderRadius:6,cursor:"pointer",border:"1px solid #ddd",background:"transparent",color:"var(--color-text-secondary)"}}>+ Artículo</button>
        </div>

        {totalPedido>0&&<div style={{background:"rgba(120,120,128,0.08)",borderRadius:8,padding:"10px 12px",marginBottom:"1rem",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Total del pedido</span>
          <span style={{fontWeight:500,fontSize:15}}>${fmt(totalPedido)} · {fmtUSD(totalPedido/Number(tc||1450))}</span>
        </div>}

        <div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Pago recibido ($ARS)</label>
          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
            <input type="number" value={pagoTotal} onChange={e=>{setPagoTotal(e.target.value);setPagoCompleto(false);}} style={{flex:1,boxSizing:"border-box"}} placeholder="0"/>
            <button onClick={()=>setPagoCompleto(p=>!p)} style={{whiteSpace:"nowrap",fontSize:12,padding:"7px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"1px solid #ddd",background:pagoCompleto?"var(--color-text-success)":"var(--color-background-primary)",color:pagoCompleto?"var(--color-background-primary)":"var(--color-text-secondary)",fontWeight:pagoCompleto?500:400}}>
              {pagoCompleto?"✓ Pago total":"Pago total"}
            </button>
          </div>
        </div>

        <div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:12,color:"var(--color-text-secondary)"}}>Tipo de entrega</label>
          <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
            {["Expreso","Retira Ezeiza","Retira Once"].map(e=>(
              <button key={e} onClick={()=>setEntrega(e)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"1px solid "+(entrega===e?"var(--color-border-info)":"var(--color-border-tertiary)"),background:entrega===e?"var(--color-background-info)":"var(--color-background-primary)",color:entrega===e?"var(--color-text-info)":"var(--color-text-secondary)",fontWeight:entrega===e?500:400}}>
                {e==="Expreso"?"🚚 Expreso":e==="Retira Ezeiza"?"📍 Ezeiza":"📍 Once"}
              </button>
            ))}
          </div>
        </div>

        {entrega==="Expreso"&&(
          <div style={{background:"var(--color-background-info)",borderRadius:10,padding:"12px",marginBottom:"1rem"}}>
            <p style={{fontSize:12,fontWeight:500,margin:"0 0 8px",color:"var(--color-text-info)"}}>Datos para expreso</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{k:"nombre",l:"Nombre completo",full:true},{k:"dni",l:"DNI"},{k:"expreso",l:"Expreso"},{k:"direccion",l:"Dirección",full:true},{k:"localidad",l:"Localidad"},{k:"provincia",l:"Provincia"}].map(f=>(
                <div key={f.k} style={f.full?{gridColumn:"1/-1"}:{}}>
                  <label style={{fontSize:11,color:"var(--color-text-secondary)"}}>{f.l}</label>
                  <input value={datosExp[f.k]} onChange={e=>setDatosExp({...datosExp,[f.k]:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
          </div>
        )}

        {errores.length>0&&(
          <div style={{background:"var(--color-background-danger)",border:"1px solid #f5c6c6",borderRadius:10,padding:"10px 14px",marginBottom:"1rem"}}>
            <p style={{fontSize:13,fontWeight:700,margin:"0 0 4px",color:"var(--color-text-danger)"}}>⚠️ Stock insuficiente</p>
            {errores.map((e,i)=><p key={i} style={{fontSize:12,margin:"2px 0",color:"var(--color-text-danger)"}}>{e}</p>)}
          </div>
        )}

        {preview&&(
          <div style={{background:"var(--color-background-success)",border:"1px solid #9fe0c5",borderRadius:10,padding:"12px 14px",marginBottom:"1rem"}}>
            <p style={{fontSize:13,fontWeight:700,margin:"0 0 10px",color:"var(--color-text-success)"}}>✓ Distribución del pedido</p>
            {preview.resultado.map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #c8f0e0"}}>
                <div><span style={{fontSize:13,color:"var(--color-text-primary)",fontWeight:600}}>{r.artNombre}</span><span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{" × "+r.cantidad}</span></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{r.contNombre}</div><div style={{fontSize:13,color:"var(--color-text-success)",fontWeight:700}}>${fmt(r.subtotal)}</div></div>
              </div>
            ))}
            {pagoTotal&&Number(pagoTotal)>0&&<div style={{marginTop:8,fontSize:12,color:"var(--color-text-success)"}}>💰 Pago ${fmt(pagoTotal)} distribuido proporcionalmente</div>}
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          {!preview?(
            <button onClick={generarPreview} style={{flex:1,fontSize:14,padding:"12px",borderRadius:10,cursor:"pointer",border:"none",background:"var(--color-border-info)",color:"var(--color-background-primary)",fontWeight:700}}>Ver distribución →</button>
          ):(
            <>
              <button onClick={()=>{setPreview(null);setErrores([]);}} style={{fontSize:13,padding:"12px 18px",borderRadius:10,cursor:"pointer",border:"1px solid #ddd",background:"var(--color-background-primary)",color:"var(--color-text-secondary)"}}>← Editar</button>
              <button onClick={confirmar} style={{flex:1,fontSize:14,padding:"12px",borderRadius:10,cursor:"pointer",border:"none",background:"var(--color-text-success)",color:"var(--color-background-primary)",fontWeight:700}}>Confirmar pedido ✓</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// SC — DASHBOARD INTERNO
// ══════════════════════════════════════════════════════════════════════════
function Dashboard({data,stockUni,blue,mi30Total,pendienteRetiro,setView,setContSel,setContTab}){
  const tc=blue||1450;
  const totalFactUSD=(data.ventas||[]).reduce((a,v)=>a+Number(v.usd||0),0);
  const totalCobUSD=(data.ventas||[]).reduce((a,v)=>a+cobradoUSD(v,data.pagos),0);

  const stockPapel={}, stockTinta={};
  let totalPapel=0, totalTinta=0;
  Object.entries(stockUni).forEach(([nombre,cant])=>{
    if(nombre.includes("TINTA")){stockTinta[nombre]=cant;totalTinta+=cant;}
    else{stockPapel[nombre]=cant;totalPapel+=cant;}
  });

  const MC=({l,v,green,info,warn,sub})=>(
    <div style={{background:green?"var(--bg-tint-green)":info?"var(--bg-tint-blue)":warn?"var(--bg-tint-amber)":"rgba(120,120,128,0.10)",border:"0.5px solid "+(green?"var(--border-success)":info?"var(--border-info)":warn?"rgba(244,121,32,.3)":"var(--glass-border)"),borderRadius:"var(--r-lg)",padding:"12px 14px",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",boxShadow:"var(--glass-shadow-sm)"}}>
      <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:green?"var(--text-success)":info?"var(--text-info)":warn?"var(--text-warning)":"var(--text-secondary)",marginBottom:4}}>{l}</div>
      <div style={{fontSize:16,fontWeight:700,letterSpacing:"-.01em",color:green?"var(--text-success)":info?"var(--text-info)":warn?"var(--text-warning)":"var(--text-primary)"}}>{v}</div>
      {sub&&<div style={{fontSize:10,color:green?"var(--text-success)":info?"var(--text-info)":"var(--text-secondary)",marginTop:3,opacity:.8}}>{sub}</div>}
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:0,color:"var(--text-primary)"}}>Super Coating</h2>
        {blue&&<span style={{fontSize:11,fontWeight:600,color:"var(--text-success)",padding:"4px 10px",background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-pill)"}}>💵 ${fmt(blue)}</span>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        <MC l="Mi 30% PENDIENTE"     v={fmtUSD(pendienteRetiro)} green={pendienteRetiro>0} sub={"≈$"+fmt(pendienteRetiro*tc)+" ARS"}/>
        <MC l="30% devengado total"  v={fmtUSD(mi30Total)}/>
        <MC l="Facturado (USD)"      v={fmtUSD(totalFactUSD)} info/>
        <MC l="Cobrado (USD)"        v={fmtUSD(totalCobUSD)}/>

const GRAMAJES_PRESET=["29","30","33","35","42","52","61","80","90","100","120"];
const ANCHOS_PRESET=["1.10","1.60","1.80","2.00","2.50","3.20"];
const LARGOS_PRESET=["100","150","200","300","400","500","600","700","800","1000"];
const PESO_TINTA_KG=1; // cada unidad de tinta pesa 1kg

function ComboInput({value,onChange,options,placeholder,type,storageKey}){
  // Combo: preset dropdown + free text, saves custom values to localStorage
  const [custom,setCustom]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("eliel_custom_"+storageKey)||"[]");}catch{return [];}
  });
  const [showCustom,setShowCustom]=useState(false);
  const [newVal,setNewVal]=useState("");
  const all=[...options,...custom.filter(c=>!options.includes(c))];
  
  const saveCustom=(val)=>{
    if(!val||options.includes(val)||custom.includes(val))return;
    const next=[...custom,val];
    setCustom(next);
    try{localStorage.setItem("eliel_custom_"+storageKey,JSON.stringify(next));}catch{}
  };

  return(
    <div>
      <div style={{display:"flex",gap:4}}>
        <select value={all.includes(value)?value:"custom"}
          onChange={e=>{
            if(e.target.value==="custom"){setShowCustom(true);}
            else{onChange(e.target.value);setShowCustom(false);}
          }}
          style={{flex:1}}>
          {all.map(o=><option key={o} value={o}>{o}</option>)}
          <option value="custom">+ Otro...</option>
        </select>
      </div>
      {(!all.includes(value)&&value)||showCustom?(
        <div style={{display:"flex",gap:4,marginTop:4}}>
          <input type={type||"text"} value={showCustom?newVal:value}
            onChange={e=>showCustom?setNewVal(e.target.value):onChange(e.target.value)}
            placeholder={placeholder}
            style={{flex:1}}
            autoFocus={showCustom}/>
          {showCustom&&<button onClick={()=>{
            if(newVal){onChange(newVal);saveCustom(newVal);}
            setShowCustom(false);setNewVal("");
          }} style={{padding:"0 10px",borderRadius:"var(--r-md)",border:"none",background:"var(--sc-orange)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>OK</button>}
        </div>
      ):null}
    </div>
  );
}

function TabArmado({cont,updateCont,showToast}){

      gramaje:isT?1000:Number(form.gramaje),

      largo:isT?1:Number(form.largo),

    const arts=editId?(cont.articulos||[]).map(a=>a.id===editId?artData:a):[...(cont.articulos||[]),artData];

    updateCont({...cont,articulos:arts,pesoTotal:pt});

            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{x.l}</div>
            <div style={{fontSize:14,fontWeight:500,color:x.w?"var(--color-text-danger)":"var(--color-text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:"1rem"}}>

        <div style={{height:6,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pctPeso+"%",background:pctPeso>95?"var(--color-border-danger)":"var(--color-border-info)",borderRadius:3}}/></div>
      </div>

function TabCostos({cont,updateCont,showToast,blue}){
  const tcDef=blue?String(Math.round(blue)):(cont.costos?.tipoCambio||"1450");
  const [form,setForm]=useState({tipoCambio:tcDef,costoChina:"",costoMoneda:"USD",despacho:"",naviera:"",despachante:"",losPrincipes:"",deposito:"",terminal:"",otros:"",...cont.costos});
  const [tcPesos,setTcPesos]=useState(tcDef);
  const tc=Number(form.tipoCambio)||1450;
  const toUSD=p=>Number(p||0)/tc;
  const chinaUSD=form.costoMoneda==="USD"?Number(form.costoChina||0):toUSD(form.costoChina);
  const totalUSD=chinaUSD+toUSD(form.despacho)+toUSD(form.naviera)+Number(form.despachante||0)+toUSD(form.losPrincipes)+toUSD(form.deposito)+toUSD(form.terminal)+Number(form.otros||0);

    const p=pedidosMap.get(pid);
    p.lineas.push(v);

    // Use most recent state
    if(v.fecha>p.fecha)p.fecha=v.fecha;

function CuentasView({data,save,showToast}){
  const [modal,setModal]=useState(null);
  const [monto,setMonto]=useState("");
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [clienteSel,setClienteSel]=useState(null);
  const [busq,setBusq]=useState("");

  // Build full client profiles
  const perfilClientes={};
  for(const v of(data.ventas||[])){
    const cl=v.cliente||"(sin nombre)";
    if(!perfilClientes[cl])perfilClientes[cl]={nombre:cl,ventas:[],debe:0,favor:0,totalHistorico:0,totalUSD:0};
    const cob=pagadoVenta(v,data.pagos);
    const saldo=Number(v.total||0)-cob;
    perfilClientes[cl].ventas.push({...v,saldo,cob});
    if(saldo>0)perfilClientes[cl].debe+=saldo;
    else if(saldo<0)perfilClientes[cl].favor+=Math.abs(saldo);
    perfilClientes[cl].totalHistorico+=Number(v.total||0);
    perfilClientes[cl].totalUSD+=Number(v.usd||0);
  }

  // Filter for list
  const clientes=Object.values(perfilClientes)
    .filter(c=>!busq||c.nombre.toLowerCase().includes(busq.toLowerCase()))
    .sort((a,b)=>b.debe-a.debe||b.totalHistorico-a.totalHistorico);
  const conDeuda=clientes.filter(c=>c.debe>0);
  const sinDeuda=clientes.filter(c=>c.debe===0);

  const registrarPago=()=>{
    if(!monto||!modal)return;
    save({...data,pagos:[...(data.pagos||[]),{id:Date.now().toString(),ventaId:modal.ventaId,monto:Number(monto),fecha:hoy()}]});
    setMonto("");setModal(null);showToast("Pago registrado");
  };

  // ── Client Profile Modal ──────────────────────────────────────────────
  if(clienteSel){
    const p=perfilClientes[clienteSel]||{nombre:clienteSel,ventas:[],debe:0,favor:0,totalHistorico:0,totalUSD:0};
    const info=data.clientes?.[clienteSel]||{};
    const ventasFilt=p.ventas
      .filter(v=>(!desde||v.fecha>=desde)&&(!hasta||v.fecha<=hasta))
      .sort((a,b)=>b.fecha.localeCompare(a.fecha));
    return(
      <div>
        <button onClick={()=>setClienteSel(null)} style={{fontSize:13,padding:"6px 14px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",color:"var(--text-primary)",cursor:"pointer",marginBottom:"1rem",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>← Volver</button>
        
        {/* Client header */}
        <div style={{background:"linear-gradient(135deg,rgba(244,121,32,0.15),rgba(91,173,65,0.15),rgba(46,134,193,0.15))",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-xl)",padding:"20px 22px",marginBottom:"1rem",boxShadow:"var(--glass-shadow)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:"-.02em",color:"var(--text-primary)",marginBottom:3}}>{p.nombre}</div>
              {info.dni&&<div style={{fontSize:12,color:"var(--text-secondary)"}}>DNI {info.dni}</div>}
              {info.localidad&&<div style={{fontSize:12,color:"var(--text-secondary)"}}>{info.localidad}, {info.provincia}</div>}
              {info.expreso&&<div style={{fontSize:12,color:"var(--text-info)",marginTop:2}}>🚚 {info.expreso}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              {p.debe>0&&<div style={{fontSize:15,fontWeight:700,color:"var(--text-danger)"}}>Debe ${fmt(p.debe)}</div>}
              {p.favor>0&&<div style={{fontSize:13,fontWeight:600,color:"var(--text-info)"}}>A favor ${fmt(p.favor)}</div>}
              {p.debe===0&&p.favor===0&&<div style={{fontSize:13,color:"var(--text-success)",fontWeight:500}}>✓ Al día</div>}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {[
              {l:"Compras totales",v:"$"+fmt(p.totalHistorico)},
              {l:"USD facturado",v:fmtUSD(p.totalUSD)},
              {l:"Operaciones",v:fmt(p.ventas.length)},
            ].map(x=>(
              <div key={x.l} style={{background:"rgba(255,255,255,0.3)",backdropFilter:"blur(8px)",borderRadius:"var(--r-md)",padding:"10px 12px"}}>
                <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:4}}>{x.l}</div>
                <div style={{fontSize:15,fontWeight:600,color:"var(--text-primary)"}}>{x.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Payment modal */}
        {modal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
            <div style={{background:"var(--bg-modal)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",borderRadius:"var(--r-xl)",padding:"22px",width:"100%",maxWidth:320,border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-lg)",animation:"modalIn .25s cubic-bezier(.34,1.2,.64,1)"}}>
              <h3 style={{fontSize:16,fontWeight:600,margin:"0 0 14px",color:"var(--text-primary)"}}>Registrar pago</h3>
              <label style={{fontSize:12,color:"var(--text-secondary)",display:"block",marginBottom:5}}>Monto recibido ($)</label>
              <input type="number" value={monto} onChange={e=>setMonto(e.target.value)} autoFocus style={{marginBottom:14}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={registrarPago} style={{flex:1,fontSize:13,padding:"10px",borderRadius:"var(--r-pill)",cursor:"pointer",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",fontWeight:600}}>Registrar</button>
                <button onClick={()=>{setModal(null);setMonto("");}} style={{fontSize:13,padding:"10px 16px",borderRadius:"var(--r-pill)",cursor:"pointer",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)"}}>Cancelar</button>
              </div>
            </div>
          </div>
        )}

        {/* Filter */}
        <FiltroFechas desde={desde} setDesde={setDesde} hasta={hasta} setHasta={setHasta}/>

        {/* Operations table */}
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",overflow:"hidden",boxShadow:"var(--glass-shadow-sm)"}}>
          {ventasFilt.length===0?<div style={{padding:"2rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin operaciones en el período.</div>:(
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{["Fecha","Artículo","Cant.","Total","Pagado","Saldo",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {ventasFilt.map(v=>(
                    <tr key={v.id}>
                      <td style={{fontSize:11,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{v.fecha}</td>
                      <td style={{fontWeight:500,whiteSpace:"nowrap"}}>{v.articulo} ×{v.cantidad}</td>
                      <td style={{color:"var(--text-secondary)"}}>{fmtUSD(v.usd)}</td>
                      <td style={{color:"var(--text-primary)"}}>${fmt(v.total)}</td>
                      <td style={{color:"var(--text-success)"}}>${fmt(v.cob)}</td>
                      <td style={{fontWeight:v.saldo>0?600:400,color:v.saldo>0?"var(--text-danger)":v.saldo<0?"var(--text-info)":"var(--text-success)",whiteSpace:"nowrap"}}>
                        {v.saldo>0?"Debe $"+fmt(v.saldo):v.saldo<0?"Favor $"+fmt(Math.abs(v.saldo)):"✓"}
                      </td>
                      <td>{v.saldo>0&&<button onClick={()=>setModal({ventaId:v.id,cliente:p.nombre})} style={{fontSize:11,padding:"4px 10px",borderRadius:"var(--r-pill)",cursor:"pointer",border:"0.5px solid var(--border-success)",background:"var(--bg-tint-green)",color:"var(--text-success)"}}>+ Pago</button>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Client List ───────────────────────────────────────────────────────
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:0,color:"var(--text-primary)"}}>Cuentas corrientes</h2>
        <span style={{fontSize:11,color:"var(--text-secondary)"}}>{clientes.length} clientes</span>
      </div>

      {/* Search */}
      <div style={{marginBottom:"1rem",position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"var(--text-tertiary)",pointerEvents:"none"}}>🔍</span>
        <input value={busq} onChange={e=>setBusq(e.target.value)} placeholder="Buscar cliente..." style={{paddingLeft:36}}/>
      </div>

      <FiltroFechas desde={desde} setDesde={setDesde} hasta={hasta} setHasta={setHasta}/>

      {conDeuda.length>0&&(
        <>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-danger)",marginBottom:8}}>Con deuda ({conDeuda.length})</div>
          <div style={{display:"grid",gap:8,marginBottom:"1.5rem"}}>
            {conDeuda.map(c=>(
              <div key={c.nombre} onClick={()=>setClienteSel(c.nombre)}
                style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"13px 16px",cursor:"pointer",boxShadow:"var(--glass-shadow-sm)",transition:"transform .12s"}}

      {clientes.length===0&&<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin clientes aún.</div>}
    </div>
  );
