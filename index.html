// DASHBOARD CENTRAL
// ══════════════════════════════════════════════════════════════════════════
function DashboardCentral({data,blue,mi30Total,pendienteRetiro,totalRetirado,bhTotalAnio,bhSueldo,bhCobradoTotal,djGanancia,djCobrado,djEventos,djGananciaUSD,djCobradoUSD,djRealizados,totalGastos,totalIngresos,totalRetSCPesos,totalVentaUSD,totalCobUSD,stockUni,goModulo}){
  const tcActual=blue||1450;
  const balance=totalIngresos-totalGastos;
  const djSaldoPendiente=(djEventos||[]).filter(e=>e.estado==="Confirmado").reduce((a,e)=>a+Number(e.saldo||0),0);
  const bhPendienteCobro=Math.max(0,bhTotalAnio-bhCobradoTotal);
  const Card=({label,value,sub,color,onClick})=>(
    <div onClick={onClick}
      style={{
        background:"var(--bg-card)",backdropFilter:"blur(20px) saturate(1.8)",WebkitBackdropFilter:"blur(20px) saturate(1.8)",
        border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",
        borderRadius:"var(--r-lg)",padding:"14px 16px",
        cursor:onClick?"pointer":"default",transition:"transform .15s,box-shadow .15s",
      }}
      onMouseEnter={e=>{if(onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--glass-shadow)";}}}
      onMouseLeave={e=>{if(onClick){e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="var(--glass-shadow-sm)";}}}> 
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:6}}>{label}</div>
      <div style={{fontSize:22,fontWeight:600,letterSpacing:"-.02em",color:color||"var(--text-primary)"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"var(--text-secondary)",marginTop:3}}>{sub}</div>}
    </div>
  );

  // movimientos recientes — cada uno en su moneda original
  const recientes=[
    // Cobros BH Trade — en ARS (es como se cobran)
    ...(data.bh?.cobros||[]).map(c=>({
      id:c.id,fecha:c.fecha,
      desc:"Cobro BH Trade"+(c.nota?" — "+c.nota:""),
      monto:Number(c.monto||0),moneda:c.moneda||"ARS",
      modulo:"BH Trade",color:"var(--color-text-info)"
    })),
    // Pagos DJ — cada pago individual en su moneda original
    ...(data.dj?.eventos||[]).flatMap(e=>
      (e.pagos||[]).map(p=>({
        id:p.id,fecha:p.fecha,
        desc:"DJ — "+e.nombre+(p.concepto?" ("+p.concepto+")":""),
        monto:Number(p.monto||0),moneda:p.moneda||"USD",montoUSD:Number(p.montoUSD||0),
        modulo:"DJ",color:"var(--color-text-warning)"
      }))
    ),
    // Retiros 30% SC — en ARS (pesos retirados) o USD si fue en USD
    ...(data.retiros||[]).map(r=>({
      id:r.id,fecha:r.fecha,
      desc:"Retiro 30% SC"+(r.nota?" — "+r.nota:""),
      monto:r.moneda==="USD"?Number(r.montoUSD||0):Number(r.montoPesos||Math.round((r.montoUSD||0)*tcActual)),
      moneda:r.moneda||"ARS",montoUSD:Number(r.montoUSD||0),
      modulo:"Super Coating",color:"var(--color-text-success)"
    })),
    // Gastos personales — ARS
    ...(data.fin?.gastos||[]).map(g=>({
      id:g.id,fecha:g.fecha,desc:g.desc,
      monto:-g.monto,moneda:"ARS",
      modulo:"Gasto",color:"var(--color-text-danger)"
    })),
  ].sort((a,b)=>b.fecha.localeCompare(a.fecha)||(b.id||"").localeCompare(a.id||"")).slice(0,8);

  const tcBar=blue||1450;
  const fuentes=[
    {n:"Super Coating",v:totalRetSCPesos,c:"var(--text-success)"},
    {n:"BH Trade",v:bhCobradoTotal,c:"var(--text-info)"},
  ];
  const maxBar=Math.max(...fuentes.map(f=>f.v),1);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:22,fontWeight:500,margin:"0 0 4px",color:"var(--color-text-primary)"}}>Resumen general</h1>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>{new Date().toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
      </div>

      {/* Dual currency: ARS flow + USD wealth */}
      {(()=>{
        const tc=blue||1450;
        const ingresoARS=totalIngresos;
        const gastoARS=totalGastos;
        const balanceARS=ingresoARS-gastoARS;
        const ahorroUSD=pendienteRetiro+djGananciaUSD+(djCobradoUSD-(djRealizados||[]).reduce((a,e)=>a+Number(e.costoUSD||0),0));
        return(
          <>
            {/* ARS daily flow */}
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:8}}>Flujo mensual (pesos)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.25rem"}}>
              <Card label="Ingresos totales" value={"$"+fmt(ingresoARS)} sub="3 fuentes 2026"/>
              <Card label="Gastos personales" value={"$"+fmt(gastoARS)} color={gastoARS>0?"var(--text-danger)":undefined}/>
              <Card label="Balance ARS" value={"$"+fmt(balanceARS)} color={balanceARS>=0?"var(--text-success)":"var(--text-danger)"}/>
              <Card label="BH Trade pendiente" value={"$"+fmt(bhPendienteCobro)} sub={"Cobrado: $"+fmt(bhCobradoTotal)} color={bhPendienteCobro>0?"var(--text-warning)":undefined} onClick={()=>goModulo("bhtrade")}/>
            </div>
            {/* USD wealth */}
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:8}}>Ahorro / patrimonio (USD)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.5rem"}}>
              <Card label="Mi 30% SC pendiente" value={fmtUSD(pendienteRetiro)} sub={"≈$"+fmt(pendienteRetiro*tc)+" ARS"} color={pendienteRetiro>0?"var(--text-success)":undefined} onClick={()=>goModulo("supercoating")}/>
              <Card label="DJ pendiente cobrar" value={fmtUSD(djSaldoPendiente)} sub={(djEventos||[]).filter(e=>e.estado==="Confirmado").length+" eventos confirmados"} color={djSaldoPendiente>0?"var(--text-warning)":undefined} onClick={()=>goModulo("dj")}/>
              <Card label="SC facturado USD" value={fmtUSD(totalVentaUSD||0)} sub="total ventas"/>
              <Card label="SC cobrado USD" value={fmtUSD(totalCobUSD||0)} sub="efectivamente cobrado"/>
            </div>
          </>
        );
      })()}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1rem"}}>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.05em"}}>Ingresos por módulo</div>
          {fuentes.map(f=>(
            <div key={f.n} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{color:"var(--color-text-primary)"}}>{f.n}</span>
                <div style={{textAlign:"right"}}>
                  <span style={{color:"var(--text-primary)",fontWeight:600}}>${fmt(f.v)}</span>
                  {f.sub&&<div style={{fontSize:10,color:"var(--text-secondary)"}}>{f.sub}</div>}
                </div>
              </div>
              <div style={{height:6,background:"rgba(120,120,128,0.15)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:(f.v/maxBar*100)+"%",background:f.c,borderRadius:3,transition:"width .5s"}}/>
              </div>
            </div>
          ))}
        </div>

        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.05em"}}>Últimos movimientos</div>
          {recientes.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:13}}>Sin movimientos aún.</p>:recientes.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <div>
                <div style={{fontSize:12,color:"var(--color-text-primary)"}}>{m.desc}</div>
                <div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{m.fecha} · <span style={{color:m.color}}>{m.modulo}</span></div>
              </div>
              <div style={{fontSize:13,fontWeight:500,color:m.monto>=0?"var(--color-text-success)":"var(--color-text-danger)"}}>
                {m.monto>=0
                  ?(m.moneda==="USD"?fmtUSD(m.monto):"$"+fmt(m.monto))
                  :(m.moneda==="USD"?"-"+fmtUSD(Math.abs(m.monto)):"-$"+fmt(Math.abs(m.monto)))
                }
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Accesos rápidos */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:8}}>
        {[
          {mod:"supercoating",icon:"📦",title:"Super Coating",desc:"Contenedores, ventas, mi 30%"},
          {mod:"bhtrade",icon:"🚢",title:"BH Trade",desc:"Despachos y cobros"},
          {mod:"dj",icon:"🎵",title:"DJ",desc:"Eventos, señas y ganancias"},
          {mod:"finanzas",icon:"💰",title:"Finanzas",desc:"Gastos, presupuesto y proyección"},
        ].map(x=>(
          <button key={x.mod} onClick={()=>goModulo(x.mod)} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"12px 14px",cursor:"pointer",textAlign:"left",transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--color-border-primary)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--color-border-tertiary)"}>
            <div style={{fontSize:20,marginBottom:6}}>{x.icon}</div>
            <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)",marginBottom:2}}>{x.title}</div>
            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{x.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// BH TRADE
// ══════════════════════════════════════════════════════════════════════════
function BHTradeView({data,save,showToast,blue}){
  const [mesActivo,setMesActivo]=useState(new Date().getMonth());
  const [form,setForm]=useState({exp:"",fecha:hoy(),cotiz:blue?String(Math.round(blue)):"",usd:"300"});
  const [showCobro,setShowCobro]=useState(false);
  const [formCobro,setFormCobro]=useState({monto:"",moneda:"ARS",fecha:hoy(),nota:""});
  const cobros=data.bh?.cobros||[];
  const cobradoTotal=cobros.reduce((a,c)=>a+Number(c.monto||0),0);
  const guardarCobro=()=>{
    if(!formCobro.monto)return;
    const montoNum=Number(formCobro.monto);
    const cobroObj={id:Date.now().toString(),mes:mesActivo,monto:montoNum,moneda:formCobro.moneda||"ARS",fecha:formCobro.fecha,nota:formCobro.nota};
    save({...data,bh:{...data.bh,cobros:[...cobros,cobroObj]}});
    setFormCobro({monto:"",moneda:"ARS",fecha:hoy(),nota:""});setShowCobro(false);showToast("Cobro registrado");
  };
  const eliminarCobro=id=>save({...data,bh:{...data.bh,cobros:cobros.filter(c=>c.id!==id)}});

  const despachos=data.bh?.despachos||[];
  const calcTotal=()=>Number(form.cotiz||0)*Number(form.usd||0);
  const guardar=()=>{
    if(!form.exp.trim()||!form.cotiz)return;
    const mes=new Date(form.fecha).getMonth();
    const nuevo={id:Date.now().toString(),exp:form.exp.trim(),fecha:form.fecha,cotiz:Number(form.cotiz),usd:Number(form.usd||300),total:Number(form.cotiz)*Number(form.usd||300),mes};
    save({...data,bh:{...data.bh,despachos:[...despachos,nuevo]}});
    setForm({exp:"",fecha:hoy(),cotiz:blue?String(Math.round(blue)):"",usd:"300"});
    showToast("Despacho cargado");
  };
  const eliminar=id=>save({...data,bh:{...data.bh,despachos:despachos.filter(d=>d.id!==id)}});

  // Total devengado = sum of sueldo por mes (despachos + base $160k + aguinaldo si aplica)
  const mesesConData=[...new Set(despachos.map(d=>d.mes))];
  const bhTotalAnio=(()=>{
    const meses=[...new Set([...mesesConData,new Date().getMonth()])];
    return meses.reduce((a,mes)=>a+bhSueldoMes(despachos.filter(d=>d.mes===mes),mes).sueldo,0);
  })();
  const mesesMostrar=[...new Set([...mesesConData,new Date().getMonth()])].sort((a,b)=>a-b);
  const despMes=[...despachos.filter(d=>d.mes===mesActivo)].sort((a,b)=>b.id.localeCompare(a.id));
  const s=bhSueldoMes(despMes,mesActivo);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>BH Trade</h2>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>$300 USD por despacho · Base $160.000 + aguinaldo en junio y diciembre</p>
      </div>

      {/* Métricas anuales */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[
          {l:"Total devengado 2026",v:"$"+fmt(bhTotalAnio),sub:despachos.length+" despachos"},
          {l:"Cobrado 2026",v:"$"+fmt(cobradoTotal),sub:cobros.length+" pagos registrados"},
          {l:"Pendiente de cobro",v:"$"+fmt(Math.max(0,bhTotalAnio-cobradoTotal)),sub:"Total − cobrado",green:true},
          {l:"Devengado "+MESES[mesActivo]+(s.aguinaldo?" ✦":""),v:"$"+fmt(s.sueldo),sub:s.aguinaldo?"Incl. aguinaldo $"+fmt(s.aguinaldoMonto||0):"Despachos + base $160k"},
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--color-background-success)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
            <div style={{fontSize:11,color:x.green?"var(--color-text-success)":"var(--color-text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:18,fontWeight:500,color:x.green?"var(--color-text-success)":"var(--color-text-primary)"}}>{x.v}</div>
            {x.sub&&<div style={{fontSize:11,color:x.green?"var(--color-text-success)":"var(--color-text-secondary)",marginTop:2}}>{x.sub}</div>}
          </div>
        ))}
      </div>

      {/* Selector de mes */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"1rem"}}>
        {mesesMostrar.map(m=>(
          <button key={m} onClick={()=>setMesActivo(m)} style={{padding:"5px 12px",fontSize:12,fontWeight:m===mesActivo?500:400,border:"0.5px solid var(--color-border-secondary)",borderRadius:20,cursor:"pointer",background:m===mesActivo?"var(--color-text-primary)":"none",color:m===mesActivo?"var(--color-background-primary)":"var(--color-text-secondary)"}}>
            {MESES[m]}
          </button>
        ))}
      </div>

      {/* Formulario */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Cargar despacho — {MESES[mesActivo]}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:8}}>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Expediente</label><input value={form.exp} onChange={e=>setForm({...form,exp:e.target.value})} placeholder="SKY-INTR-260" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cotización ($)</label><input type="number" value={form.cotiz} onChange={e=>setForm({...form,cotiz:e.target.value})} placeholder={blue?String(Math.round(blue)):"1400"} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>USD</label><input type="number" value={form.usd} onChange={e=>setForm({...form,usd:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        </div>
        {form.cotiz&&<div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:8}}>Total: <strong style={{color:"var(--color-text-primary)"}}>{"$"+fmt(calcTotal())}</strong></div>}
        <button onClick={guardar} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-info)",color:"var(--color-background-primary)",fontWeight:500}}>Guardar despacho</button>
      </div>

      {/* Tabla */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:500}}>Despachos — {MESES[mesActivo]}</div>
        {despMes.length>0&&<button onClick={()=>{if(confirm("¿Borrar todos los despachos de "+MESES[mesActivo]+"?"))save({...data,bh:{...data.bh,despachos:despachos.filter(d=>d.mes!==mesActivo)}});}} style={{fontSize:11,padding:"4px 10px",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-danger)",background:"var(--color-background-danger)",color:"var(--color-text-danger)"}}>Borrar mes</button>}
      </div>
        {despMes.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:13}}>Sin despachos en {MESES[mesActivo]}.</p>:(
          <>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["Expediente","Fecha","Cotización","USD","Total $",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",fontWeight:500,fontSize:11,color:"var(--color-text-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>{h}</th>)}</tr></thead>
                <tbody>{despMes.map(d=>(
                  <tr key={d.id}>
                    <td style={{padding:"7px 8px",fontWeight:500}}>{d.exp}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>{d.fecha}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>${fmt(d.cotiz)}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>{fmtUSD(d.usd)}</td>
                    <td style={{padding:"7px 8px",fontWeight:500}}>${fmt(d.total)}</td>

function fechaEspToISO(fechaEsp){
  if(!fechaEsp) return '';
  // Already ISO format
  if(/^\d{4}-\d{2}-\d{2}$/.test(fechaEsp)) return fechaEsp;
  const meses={enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',
    julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
  const m=fechaEsp.match(/(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/i);
  if(m){
    const dia=m[1].padStart(2,'0');
    const mes=meses[m[2].toLowerCase()]||'01';
    return m[3]+'-'+mes+'-'+dia;
  }
  return fechaEsp;
}


// ── EditPagoInline: add a payment from within the event editor ───────────
function EditPagoInline({eventoId,eventos,data,save,showToast,blue}){
  const [open,setOpen]=useState(false);
  const [fp,setFp]=useState({monto:"",moneda:"USD",concepto:"Cuota",fecha:new Date().toISOString().split("T")[0],nota:""});
  const tc=blue||1450;
  if(!open) return(
    <button onClick={()=>setOpen(true)} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--border-info)",background:"var(--bg-tint-blue)",color:"var(--text-info)",cursor:"pointer",fontWeight:500}}>
      + Agregar pago
    </button>
  );
  const guardar=()=>{
    if(!fp.monto)return;
    const evento=eventos.find(e=>e.id===eventoId);
    if(!evento)return;
    const montoN=Number(fp.monto);
    const montoUSD=fp.moneda==="ARS"?montoN/tc:montoN;
    const nuevoPago={id:Date.now().toString(),fecha:fp.fecha,concepto:fp.concepto,monto:montoN,moneda:fp.moneda,montoUSD,nota:fp.nota};
    const pagos=[...(evento.pagos||[]),nuevoPago];
    const totalPagadoUSD=pagos.reduce((a,p)=>a+p.montoUSD,0);

    const updEvento={...evento,pagos,saldo:nuevoSaldo,senaUSD:totalPagadoUSD};
    save({...data,dj:{...data.dj,eventos:eventos.map(e=>e.id===eventoId?updEvento:e)}});
    setFp({monto:"",moneda:"USD",concepto:"Cuota",fecha:new Date().toISOString().split("T")[0],nota:""});
    setOpen(false);
    showToast("✓ Pago agregado");
  };
  return(
    <div style={{background:"var(--bg-tint-blue)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-md)",padding:"12px",marginTop:6}}>
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:8}}>Agregar pago</div>

              <option value="USD">USD</option><option value="ARS">ARS</option>
            </select>
            <input type="number" value={fp.monto} onChange={e=>setFp(f=>({...f,monto:e.target.value}))} placeholder="0" inputMode="decimal" autoFocus/>
          </div>
        </div>
        <div>
          <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:3}}>Concepto</label>
          <select value={fp.concepto} onChange={e=>setFp(f=>({...f,concepto:e.target.value}))}>
            {["Seña","1ra cuota","2da cuota","Anticipo","Pago total","Pago parcial","Saldo"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:3}}>Fecha</label>
          <input type="date" value={fp.fecha} onChange={e=>setFp(f=>({...f,fecha:e.target.value}))}/>
        </div>
        <div>
          <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:3}}>Nota</label>
          <input value={fp.nota} onChange={e=>setFp(f=>({...f,nota:e.target.value}))} placeholder="Opcional"/>
        </div>
      </div>
      {fp.monto&&Number(fp.monto)>0&&(
        <div style={{fontSize:11,color:"var(--text-info)",marginBottom:8}}>
          = {fp.moneda==="ARS"?fmtUSD(Number(fp.monto)/tc)+" al TC $"+fmt(tc):"$"+fmt(Number(fp.monto)*tc)+" ARS"}
        </div>
      )}
      <div style={{display:"flex",gap:6}}>

      </div>
    </div>
  );
}


function DJView({data,save,showToast,blue,onGenerarDoc}){
  const tc=blue||1450;
  const initForm={nombre:"",fecha:hoy(),estado:"Confirmado",
    monedaCobro:"USD",cobro:"",monedaCosto:"ARS",costo:"",sena:"",notas:""};
  const [form,setForm]=useState(initForm);
  const [editId,setEditId]=useState(null);
  const [tab,setTab]=useState("presupuestos"); // presupuestos | confirmados | realizados

  const eventos=data.dj?.eventos||[];
  const presupuestos=[...(data.dj?.presupuestos||[])].filter(p=>p.estado==="Pendiente"||p.estado==="Rechazado").sort((a,b)=>b.id.localeCompare(a.id));
  const hoy2=hoy();
  // Confirmados: futuros + pasados con saldo pendiente
  const confirmados=[...eventos.filter(e=>{
    if(e.estado!=="Confirmado") return false;
    const cobrado=(e.pagos||[]).reduce((a,p)=>a+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
    const saldo=Math.max(0,Number(e.cobroUSD||0)-cobrado);
    // Si la fecha pasó pero aún debe → sigue en Confirmados
    if(e.fecha<hoy2 && saldo>0) return true;
    return e.fecha>=hoy2;
  })].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  // Historial: Realizado, o Confirmado con fecha pasada Y saldo=0
  const realizados=[...eventos.filter(e=>{
    if(e.estado==="Realizado") return true;
    if(e.estado==="Señado") return true;
    if(e.estado==="Confirmado"&&e.fecha<hoy2){
      const cobrado=(e.pagos||[]).reduce((a,p)=>a+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
      const saldo=Math.max(0,Number(e.cobroUSD||0)-cobrado);
      return saldo===0; // solo pasa a historial si está saldado
    }
    return false;
  })].sort((a,b)=>b.fecha.localeCompare(a.fecha)||(b.id||"").localeCompare(a.id||""));


  // Totales historial
  const cobroTotal=eventos.reduce((a,e)=>{
    if(e.estado==="Pendiente") return a;
    const cobrado=(e.pagos||[]).reduce((s,p)=>s+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
    return a+cobrado;
  },0);
  // Ganancia = lo cobrado que supera el costo, en todos los eventos no-Pendiente
  const ganTotal=eventos.reduce((a,e)=>{
    if(e.estado==="Pendiente") return a;
    const cobrado=(e.pagos||[]).reduce((s,p)=>s+Number(p.montoUSD||0),0)||Number(e.senaUSD||0);
    return a+Math.max(0,cobrado-Number(e.costoUSD||0));
  },0);
  const saldoTotal=confirmados.filter(e=>e.saldo>0).reduce((a,e)=>a+Number(e.saldo||0),0);

  const guardarEvento=()=>{
    if(!form.nombre.trim())return;
    const cobroRaw=Number(form.cobro||0),costoRaw=Number(form.costo||0);
    const cobroUSD=form.monedaCobro==="ARS"?cobroRaw/tc:cobroRaw;
    const costoUSD=form.monedaCosto==="ARS"?costoRaw/tc:costoRaw;
    const gananciaUSD=cobroUSD-costoUSD;
    // Preserve existing pagos when editing
    const eventoExistente=editId?eventos.find(e=>e.id===editId):null;
    const pagosExistentes=eventoExistente?.pagos||[];
    const totalPagadoUSD=pagosExistentes.reduce((a,p)=>a+Number(p.montoUSD||0),0);
    // For new events, seña from form; for edits, saldo calculated from real pagos
    let pagos=pagosExistentes;
    let senaUSD=totalPagadoUSD;
    if(!editId){
      // New event: if seña specified, create first pago
      const senaRaw=Number(form.sena||0);

      pagos=senaRaw>0?[{id:Date.now().toString(),fecha:new Date().toISOString().split("T")[0],concepto:"Seña",monto:senaRaw,moneda:form.monedaCobro,montoUSD:senaUSD,nota:"Al confirmar"}]:[];
    }

    const evento={
      ...(eventoExistente||{}),
      id:editId||Date.now().toString(),nombre:form.nombre,fecha:form.fecha,estado:form.estado,

    const nuevos=editId?eventos.map(e=>e.id===editId?evento:e):[...eventos,evento];

      precio:Number(formPres.precio), precio_str:String(formPres.precio),
      opcionales:[], recepcionistas:"sin", formaPago:"cuotas",
      numeroDoc:numDoc, estado:"Pendiente", notas:formPres.notas,
      creadoEn:new Date().toISOString()
    };
    const nuevosPresupuestos=[...(data.dj?.presupuestos||[]),nuevoPres];
    save({...data,dj:{...data.dj,presupuestos:nuevosPresupuestos}});
    showToast("✓ Presupuesto guardado");
    setShowFormPres(false);
    setFormPres({cliente:"",tipoEvento:"Casamiento",fecha:"",salon:"",invitados:"",precio:"",notas:""});
  };
  const rechazarPresupuesto=(id)=>{
    const nuevos=(data.dj?.presupuestos||[]).map(x=>x.id===id?{...x,estado:"Rechazado"}:x);
    save({...data,dj:{...data.dj,presupuestos:nuevos}});showToast("Presupuesto cancelado");
  };

  const eliminarPresupuesto=(id)=>{
    if(!window.confirm("¿Eliminar este presupuesto?"))return;
    save({...data,dj:{...data.dj,presupuestos:(data.dj?.presupuestos||[]).filter(p=>p.id!==id)}});
    showToast("Presupuesto eliminado");
  };

  const stColor={Realizado:"var(--text-success)",Confirmado:"var(--text-info)",Señado:"var(--text-warning)",Cancelado:"var(--text-danger)",Rechazado:"var(--text-danger)",Pendiente:"var(--text-secondary)"};
  const stBg={Realizado:"var(--bg-tint-green)",Confirmado:"var(--bg-tint-blue)",Señado:"var(--bg-tint-amber)",Cancelado:"var(--bg-tint-red)",Rechazado:"var(--bg-tint-red)",Pendiente:"rgba(120,120,128,0.1)"};

  // Tab nav style
  const TabBtn=({id,label,count})=>(
    <button onClick={()=>setTab(id)} style={{
      flex:1,padding:"8px 4px",border:"none",borderRadius:"var(--r-md)",cursor:"pointer",
      fontSize:11,fontWeight:tab===id?700:400,
      background:tab===id?"var(--bg-card)":"transparent",
      color:tab===id?"var(--text-primary)":"var(--text-secondary)",
      boxShadow:tab===id?"var(--glass-shadow-sm)":"none",transition:"all .15s",
    }}>
      {label}{count>0&&<span style={{marginLeft:5,fontSize:10,background:tab===id?"var(--bg-tint-blue)":"rgba(120,120,128,0.15)",color:tab===id?"var(--text-info)":"var(--text-secondary)",padding:"1px 5px",borderRadius:"var(--r-pill)"}}>{count}</span>}
    </button>

  return(
    <div>
      <div style={{marginBottom:"1.25rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 4px",color:"var(--text-primary)"}}>DJ</h2>
        <p style={{fontSize:13,color:"var(--text-secondary)",margin:0}}>Gestión bimonetaria de eventos</p>
      </div>

      {/* Métricas */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        {[
          {l:"Presupuestados",v:presupuestos.filter(p=>p.estado==="Pendiente").length},
          {l:"Confirmados",v:confirmados.length,info:true},
          {l:"Cobrado USD",v:fmtUSD(cobroTotal),green:cobroTotal>0},
          {l:"Ganancia USD",v:fmtUSD(ganTotal),green:ganTotal>0},
          ...(saldoTotal>0?[{l:"Saldo pendiente",v:fmtUSD(saldoTotal),warn:true}]:[]),
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--bg-tint-green)":x.warn?"var(--bg-tint-amber)":x.info?"var(--bg-tint-blue)":"rgba(120,120,128,0.10)",border:"0.5px solid "+(x.green?"var(--border-success)":x.warn?"rgba(244,121,32,.3)":x.info?"var(--border-info)":"var(--glass-border)"),borderRadius:"var(--r-lg)",padding:"12px 14px",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>

      {modalPago&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>

            <p style={{fontSize:12,color:"var(--text-secondary)",margin:"0 0 14px"}}>{modalPago.nombre}</p>
            <div style={{background:"var(--bg-tint-blue)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-md)",padding:"8px 12px",marginBottom:14,fontSize:12}}>

              <strong style={{color:"var(--text-info)"}}>{fmtUSD(modalPago.cobroUSD||0)}</strong>
              <span style={{color:"var(--text-secondary)",marginLeft:12}}>Saldo: </span>
              <strong style={{color:"var(--text-warning)"}}>{fmtUSD(modalPago.saldo||modalPago.cobroUSD||0)}</strong>

                    <span style={{color:"var(--text-secondary)"}}>{p.concepto} · {p.fecha}</span>
                    <span style={{fontWeight:600,color:"var(--text-success)"}}>{p.moneda==="ARS"?"$"+fmt(p.monto):"USD "+fmt(p.montoUSD)}</span>
                  </div>

              </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Monto</label>
                <div style={{display:"flex",gap:4}}>
                  <select value={formPago.moneda} onChange={e=>setFormPago(f=>({...f,moneda:e.target.value}))} style={{width:60,flexShrink:0}}>
                    <option value="USD">USD</option><option value="ARS">ARS</option>
                  </select>
                  <input type="number" value={formPago.monto} onChange={e=>setFormPago(f=>({...f,monto:e.target.value}))} placeholder="0" inputMode="decimal" autoFocus/>
                </div>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Concepto</label>
                <select value={formPago.concepto} onChange={e=>setFormPago(f=>({...f,concepto:e.target.value}))}>

              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Fecha</label>
                <input type="date" value={formPago.fecha} onChange={e=>setFormPago(f=>({...f,fecha:e.target.value}))}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Nota</label>
                <input value={formPago.nota} onChange={e=>setFormPago(f=>({...f,nota:e.target.value}))} placeholder="Opcional"/>
              </div>
            </div>
            {formPago.monto&&Number(formPago.monto)>0&&(
              <div style={{padding:"8px 12px",background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-md)"}}>
                {formPago.moneda==="ARS"
                  ?<>= <strong>{fmtUSD(Number(formPago.monto)/(blue||1450))}</strong> al TC ${fmt(blue||1450)}</>
                  :<>= <strong>${fmt(Number(formPago.monto)*(blue||1450))}</strong> ARS</>

              </div>

            <div style={{display:"flex",gap:8}}>

            </div>
          </div>
        </div>
      )}

      {/* Confirm presupuesto modal */}
      {modalConfirmar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{background:"var(--bg-modal,#13132A)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-xl)",padding:"24px",width:"100%",maxWidth:400,boxShadow:"0 24px 60px rgba(0,0,0,0.5)",maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{fontSize:15,fontWeight:700,margin:"0 0 2px",color:"var(--text-primary)"}}>Confirmar evento</h3>
            <p style={{fontSize:12,color:"var(--text-secondary)",margin:"0 0 14px"}}>{modalConfirmar.cliente} — {modalConfirmar.tipoEvento}{modalConfirmar.salon?" · "+modalConfirmar.salon:""}<br/><span style={{color:"var(--text-secondary)"}}>{modalConfirmar.fecha}</span></p>

            {/* Cobro original */}
            <div style={{background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-md)",padding:"10px 14px",marginBottom:14,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"var(--text-secondary)"}}>Precio presupuestado</span>
              <strong style={{color:"var(--text-success)",fontSize:14}}>USD {modalConfirmar.precio}</strong>
            </div>

            {/* Forma de pago */}
            <label style={{fontSize:11,fontWeight:600,color:"var(--text-secondary)",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:".04em"}}>Forma de pago elegida</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              <button onClick={()=>setFormaPagoConf("cuotas")} style={{padding:"10px 8px",borderRadius:"var(--r-md)",border:"0.5px solid "+(formaPagoConf==="cuotas"?"var(--border-info)":"var(--glass-border)"),background:formaPagoConf==="cuotas"?"var(--bg-tint-blue)":"none",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:18,marginBottom:2}}>📅</div>
                <div style={{fontSize:11,fontWeight:700,color:formaPagoConf==="cuotas"?"var(--text-info)":"var(--text-primary)"}}>Cuotas 50/50</div>
                <div style={{fontSize:9,color:"var(--text-secondary)"}}>Seña + saldo</div>
              </button>
              <button onClick={()=>setFormaPagoConf("total")} style={{padding:"10px 8px",borderRadius:"var(--r-md)",border:"0.5px solid "+(formaPagoConf==="total"?"var(--border-success)":"var(--glass-border)"),background:formaPagoConf==="total"?"var(--bg-tint-green)":"none",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:18,marginBottom:2}}>💰</div>
                <div style={{fontSize:11,fontWeight:700,color:formaPagoConf==="total"?"var(--text-success)":"var(--text-primary)"}}>Pago total</div>
                <div style={{fontSize:9,color:"var(--text-secondary)"}}>Pago completo</div>
              </button>
            </div>

            {/* Si cuotas: campo seña */}
            {formaPagoConf==="cuotas"&&(
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:6}}>Seña cobrada (USD)</label>
                <input type="number" value={senaConf} onChange={e=>setSenaConf(e.target.value)}
                  placeholder={"Ej: "+(Math.round(Number(modalConfirmar.precio)/2))} inputMode="decimal"
                  style={{width:"100%"}}/>
                {senaConf&&Number(senaConf)>0&&(
                  <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:4}}>
                    Saldo pendiente: <strong style={{color:"var(--text-warning)"}}>USD {fmt(Number(modalConfirmar.precio)-Number(senaConf))}</strong>
                  </div>
                )}
              </div>
            )}

            {/* Si total: opción descuento 10% */}
            {formaPagoConf==="total"&&(
              <div style={{marginBottom:14,padding:"10px 14px",background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-md)"}}>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                  <input type="checkbox" checked={descuentoConf} onChange={e=>setDescuentoConf(e.target.checked)}
                    style={{width:18,height:18,cursor:"pointer"}}/>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"var(--text-primary)"}}>Aplicar 10% de descuento por pago total</div>
                    {descuentoConf&&<div style={{fontSize:11,color:"var(--text-success)",marginTop:2}}>
                      Precio final: <strong>USD {fmt(Math.round(Number(modalConfirmar.precio)*0.9*100)/100)}</strong>
                      <span style={{color:"var(--text-secondary)",marginLeft:6}}>(-USD {fmt(Math.round(Number(modalConfirmar.precio)*0.1*100)/100)})</span>
                    </div>}
                  </div>
                </label>
              </div>
            )}

            {/* Costo */}
            <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:6}}>Tu costo para este evento</label>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              <select value={monedaCostoConf} onChange={e=>setMonedaCostoConf(e.target.value)} style={{width:72,flexShrink:0}}>
                <option value="ARS">$ ARS</option>
                <option value="USD">USD</option>
              </select>
              <input type="number" value={costoConfirmar} onChange={e=>setCostoConfirmar(e.target.value)} placeholder="0" inputMode="decimal"/>
            </div>

            {/* Preview ganancia */}
            {(costoConfirmar||formaPagoConf==="total")&&(()=>{
              const cobro=formaPagoConf==="total"&&descuentoConf?Math.round(Number(modalConfirmar.precio)*0.9*100)/100:Number(modalConfirmar.precio);
              const costoU=monedaCostoConf==="ARS"?Number(costoConfirmar||0)/tc:Number(costoConfirmar||0);
              const gan=cobro-costoU;
              return(
                <div style={{padding:"8px 12px",background:"rgba(120,120,128,0.08)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-md)",marginBottom:14,fontSize:12}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{color:"var(--text-secondary)"}}>Cobro final:</span>
                    <strong style={{color:"var(--text-primary)"}}>USD {fmt(cobro)}</strong>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                    <span style={{color:"var(--text-secondary)"}}>Ganancia estimada:</span>
                    <strong style={{color:gan>=0?"var(--text-success)":"var(--text-danger)"}}>USD {fmt(Math.round(gan*100)/100)}</strong>
                  </div>
                </div>
              );
            })()}

            <div style={{display:"flex",gap:8}}>
              <button onClick={ejecutarConfirmacion} style={{flex:1,padding:"11px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>✓ Confirmar</button>
              <button onClick={()=>{setModalConfirmar(null);setFormaPagoConf("cuotas");setSenaConf("");setDescuentoConf(false);setCostoConfirmar("");}} style={{padding:"11px 16px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* IA hint */}
      <div style={{background:"linear-gradient(135deg,rgba(244,121,32,0.1),rgba(91,173,65,0.1))",border:"0.5px solid rgba(244,121,32,0.25)",borderRadius:"var(--r-lg)",padding:"10px 14px",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>🤖</span>
        <div style={{fontSize:12,color:"var(--text-secondary)"}}>Usá el asistente IA para generar presupuestos PDF, confirmar eventos y registrar pagos con lenguaje natural.</div>
      </div>

      {/* Tabs + add button */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:"1.25rem"}}>
        <div style={{display:"flex",flex:1,gap:4,background:"rgba(120,120,128,0.1)",borderRadius:"var(--r-lg)",padding:4}}>
          <TabBtn id="presupuestos" label="Presupuestos" count={presupuestos.filter(p=>p.estado==="Pendiente").length}/>
          <TabBtn id="confirmados"  label="Confirmados"  count={confirmados.length}/>
          <TabBtn id="realizados"   label="Historial"    count={realizados.length}/>
        </div>
        <button onClick={()=>setTab(tab==="nuevo"?"confirmados":"nuevo")} style={{
          flexShrink:0,padding:"8px 14px",borderRadius:"var(--r-lg)",border:"none",cursor:"pointer",
          background:tab==="nuevo"?"var(--bg-tint-blue)":"linear-gradient(135deg,#185FA5,#2E86C1)",
          color:"#fff",fontWeight:700,fontSize:13,
          boxShadow:tab==="nuevo"?"none":"0 4px 14px rgba(24,95,165,0.35)",
        }}>{tab==="nuevo"?"✕":"+ Evento"}</button>
      </div>

      {tab==="presupuestos"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          <button onClick={()=>setShowFormPres(f=>!f)} style={{alignSelf:"flex-start",fontSize:12,padding:"7px 14px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,var(--accent-primary),var(--accent-secondary))",color:"#fff",cursor:"pointer",fontWeight:600}}>
            {showFormPres?"✕ Cancelar":"+ Nuevo presupuesto"}
          </button>
          {/* Form nuevo presupuesto manual */}
          {showFormPres&&(
            <div style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px"}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:"var(--text-primary)"}}>Nuevo presupuesto</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                {[["Cliente","cliente","text"],["Tipo de evento","tipoEvento","text"],["Fecha (YYYY-MM-DD)","fecha","date"],["Salón","salon","text"],["Invitados","invitados","text"],["Precio (USD)","precio","number"]].map(([label,key,type])=>(
                  <div key={key}>
                    <div style={{fontSize:10,color:"var(--text-secondary)",marginBottom:3}}>{label}</div>
                    <input type={type} value={formPres[key]} onChange={e=>setFormPres(f=>({...f,[key]:e.target.value}))}
                      style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"0.5px solid var(--glass-border)",background:"var(--bg-input)",color:"var(--text-primary)",fontSize:12,boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>

              </button>
            </div>
          )}
          {/* Lista presupuestos */}
          {presupuestos.length===0&&!showFormPres
            ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>

            </div>
