<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#F47920"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="light-content"/>
  <meta name="apple-mobile-web-app-title" content="Eliel"/>
  <title>Sistema Eliel</title>
  <style>
    /* ── LIQUID GLASS DESIGN SYSTEM ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    
    body{
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:var(--bg-base);color:var(--text-primary);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      transition:background .3s,color .3s;
    }

    /* ── LIGHT MODE ─────────────────────────────────────────────────── */
    :root{
      /* SC Brand colors from logo */
      --sc-orange:#F47920;
      --sc-green:#5BAD41;
      --sc-blue:#2E86C1;
      --sc-gradient:linear-gradient(135deg,#F47920 0%,#5BAD41 50%,#2E86C1 100%);
      --sc-gradient-soft:linear-gradient(135deg,rgba(244,121,32,0.12) 0%,rgba(91,173,65,0.12) 50%,rgba(46,134,193,0.12) 100%);

      /* Backgrounds */
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);
      --bg-modal:rgba(255,255,255,0.92);
      --bg-tint-green:rgba(91,173,65,0.12);
      --bg-tint-orange:rgba(244,121,32,0.12);
      --bg-tint-blue:rgba(46,134,193,0.12);
      --bg-tint-red:rgba(220,53,69,0.10);
      --bg-tint-amber:rgba(255,149,0,0.12);
      --bg-overlay:rgba(0,0,0,0.45);

      /* Glass effect */
      --glass-blur:blur(20px) saturate(1.8);
      --glass-border:rgba(255,255,255,0.55);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.7) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.07),0 1px 0 rgba(255,255,255,0.6) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 1.5px 0 rgba(255,255,255,0.65) inset;

      /* Text */
      --text-primary:#1C1C1E;
      --text-secondary:#636366;
      --text-tertiary:#AEAEB2;
      --text-success:#1A7F3C;
      --text-warning:#B25000;
      --text-danger:#C0392B;
      --text-info:#1A5FA5;
      --text-on-color:#fff;

      /* Borders */
      --border-sm:0.5px solid rgba(0,0,0,0.10);
      --border-md:0.5px solid rgba(0,0,0,0.16);
      --border-card:0.5px solid rgba(255,255,255,0.8);
      --border-input:0.5px solid rgba(0,0,0,0.18);
      --border-focus:rgba(46,134,193,0.6);
      --border-success:rgba(91,173,65,0.4);
      --border-danger:rgba(192,57,43,0.3);

      /* Radius */
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-pill:100px;

      /* Semantic aliases (keep old names working) */
      --font-sans:"Inter",-apple-system,sans-serif;
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(240,242,245,0.8);
      --color-background-tertiary:var(--bg-base);
      --color-background-success:var(--bg-tint-green);
      --color-background-warning:var(--bg-tint-amber);
      --color-background-danger:var(--bg-tint-red);
      --color-background-info:var(--bg-tint-blue);
      --color-text-primary:var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-tertiary:var(--text-tertiary);
      --color-text-success:var(--text-success);
      --color-text-warning:var(--text-warning);
      --color-text-danger:var(--text-danger);
      --color-text-info:var(--text-info);
      --color-border-tertiary:rgba(0,0,0,0.08);
      --color-border-secondary:rgba(0,0,0,0.14);
      --color-border-primary:rgba(0,0,0,0.28);
      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);
      --color-border-info:rgba(46,134,193,0.4);
      --color-border-warning:rgba(178,80,0,0.3);
      --border-radius-md:var(--r-md);
      --border-radius-lg:var(--r-lg);
      --border-radius-xl:var(--r-xl);
    }

    /* ── DARK MODE ───────────────────────────────────────────────────── */
    @media(prefers-color-scheme:dark){:root{
      --bg-base:#0E0E10;
      --bg-elevated:rgba(28,28,30,0.85);
      --bg-card:rgba(28,28,30,0.72);
      --bg-card-hover:rgba(44,44,46,0.85);
      --bg-input:rgba(44,44,46,0.8);
      --bg-nav:rgba(18,18,20,0.85);
      --bg-modal:rgba(28,28,30,0.95);
      --bg-tint-green:rgba(91,173,65,0.18);
      --bg-tint-orange:rgba(244,121,32,0.18);
      --bg-tint-blue:rgba(46,134,193,0.18);
      --bg-tint-red:rgba(220,53,69,0.16);
      --bg-tint-amber:rgba(255,149,0,0.16);
      --glass-border:rgba(255,255,255,0.12);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.45),0 1px 0 rgba(255,255,255,0.08) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.08) inset;
      --text-primary:#F2F2F7;
      --text-secondary:#AEAEB2;
      --text-tertiary:#636366;
      --text-success:#5BAD41;
      --text-warning:#F47920;
      --text-danger:#FF6B6B;
      --text-info:#5B9BD5;
      --border-sm:0.5px solid rgba(255,255,255,0.10);
      --border-md:0.5px solid rgba(255,255,255,0.14);
      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
    }}
    html[data-theme="dark"]{
      --bg-base:#0E0E10;
      --bg-elevated:rgba(28,28,30,0.85);
      --bg-card:rgba(28,28,30,0.72);
      --bg-card-hover:rgba(44,44,46,0.85);
      --bg-input:rgba(44,44,46,0.8);
      --bg-nav:rgba(18,18,20,0.85);
      --bg-modal:rgba(28,28,30,0.95);
      --bg-tint-green:rgba(91,173,65,0.18);
      --bg-tint-orange:rgba(244,121,32,0.18);
      --bg-tint-blue:rgba(46,134,193,0.18);
      --bg-tint-red:rgba(220,53,69,0.16);
      --bg-tint-amber:rgba(255,149,0,0.16);
      --glass-border:rgba(255,255,255,0.12);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.45),0 1px 0 rgba(255,255,255,0.08) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.08) inset;
      --text-primary:#F2F2F7;
      --text-secondary:#AEAEB2;
      --text-tertiary:#636366;
      --text-success:#5BAD41;
      --text-warning:#F47920;
      --text-danger:#FF6B6B;
      --text-info:#5B9BD5;
      --border-sm:0.5px solid rgba(255,255,255,0.10);
      --border-md:0.5px solid rgba(255,255,255,0.14);
      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(28,28,30,0.6);
      --color-background-tertiary:var(--bg-base);
      --color-background-success:var(--bg-tint-green);
      --color-background-warning:var(--bg-tint-amber);
      --color-background-danger:var(--bg-tint-red);
      --color-background-info:var(--bg-tint-blue);
      --color-text-primary:var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-tertiary:var(--text-tertiary);
      --color-text-success:var(--text-success);
      --color-text-warning:var(--text-warning);
      --color-text-danger:var(--text-danger);
      --color-text-info:var(--text-info);
      --color-border-tertiary:rgba(255,255,255,0.08);
      --color-border-secondary:rgba(255,255,255,0.14);
    }
    html[data-theme="light"]{
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);
      --bg-modal:rgba(255,255,255,0.92);
      --bg-tint-green:rgba(91,173,65,0.12);
      --bg-tint-orange:rgba(244,121,32,0.12);
      --bg-tint-blue:rgba(46,134,193,0.12);
      --bg-tint-red:rgba(220,53,69,0.10);
      --bg-tint-amber:rgba(255,149,0,0.12);
      --glass-border:rgba(255,255,255,0.55);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.7) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.07),0 1px 0 rgba(255,255,255,0.6) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 1.5px 0 rgba(255,255,255,0.65) inset;
      --text-primary:#1C1C1E;
      --text-secondary:#636366;
      --text-tertiary:#AEAEB2;
      --text-success:#1A7F3C;
      --text-warning:#B25000;
      --text-danger:#C0392B;
      --text-info:#1A5FA5;
      --border-sm:0.5px solid rgba(0,0,0,0.10);
      --border-md:0.5px solid rgba(0,0,0,0.16);
      --border-card:0.5px solid rgba(255,255,255,0.8);
      --border-input:0.5px solid rgba(0,0,0,0.18);
      --border-focus:rgba(46,134,193,0.6);
      --border-success:rgba(91,173,65,0.4);
      --border-danger:rgba(192,57,43,0.3);
      --color-background-primary:rgba(255,255,255,0.65);
      --color-background-secondary:rgba(240,242,245,0.8);
      --color-background-tertiary:#F0F2F5;
      --color-background-success:rgba(91,173,65,0.12);
      --color-background-warning:rgba(255,149,0,0.12);
      --color-background-danger:rgba(220,53,69,0.10);
      --color-background-info:rgba(46,134,193,0.12);
      --color-text-primary:#1C1C1E;
      --color-text-secondary:#636366;
      --color-text-tertiary:#AEAEB2;
      --color-text-success:#1A7F3C;
      --color-text-warning:#B25000;
      --color-text-danger:#C0392B;
      --color-text-info:#1A5FA5;
      --color-border-tertiary:rgba(0,0,0,0.08);
      --color-border-secondary:rgba(0,0,0,0.14);
      --color-border-primary:rgba(0,0,0,0.28);
      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);
      --color-border-info:rgba(46,134,193,0.4);
      --color-border-warning:rgba(178,80,0,0.3);
    }

    /* ── GLOBAL AMBIENT BACKGROUND ──────────────────────────────────── */
    body::before{
      content:"";position:fixed;inset:0;z-index:-1;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%,rgba(244,121,32,0.18) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 20%,rgba(91,173,65,0.14) 0%,transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 90%,rgba(46,134,193,0.16) 0%,transparent 70%),
        var(--bg-base);
      pointer-events:none;
    }

    /* ── GLASS CARD ─────────────────────────────────────────────────── */
    .glass{
      background:var(--bg-card);
      backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
    }
    .glass-sm{
      background:var(--bg-card);
      backdrop-filter:blur(12px) saturate(1.6);
      -webkit-backdrop-filter:blur(12px) saturate(1.6);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow-sm);
    }
    .glass-nav{
      background:var(--bg-nav);
      backdrop-filter:blur(24px) saturate(2);
      -webkit-backdrop-filter:blur(24px) saturate(2);
      border-bottom:0.5px solid var(--glass-border);
    }

    /* ── INPUTS ─────────────────────────────────────────────────────── */
    input,select,textarea{
      font-family:inherit;font-size:14px;padding:9px 12px;
      border:var(--border-input);border-radius:var(--r-sm);
      background:var(--bg-input);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      color:var(--text-primary);outline:none;
      transition:border-color .15s,box-shadow .15s;width:100%;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--border-focus);
      box-shadow:0 0 0 3px rgba(46,134,193,0.15);
    }
    input::placeholder{color:var(--text-tertiary)}

    /* ── BUTTONS ─────────────────────────────────────────────────────── */
    button{font-family:inherit;cursor:pointer;}
    .btn-primary{
      background:var(--sc-gradient);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(244,121,32,0.3);
      transition:transform .12s,box-shadow .12s,opacity .12s;
      letter-spacing:0.01em;
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,121,32,0.4);}
    .btn-primary:active{transform:translateY(0);opacity:.9;}
    .btn-glass{
      background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:var(--border-card);color:var(--text-primary);
      padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;
      box-shadow:var(--glass-shadow-sm);transition:transform .12s,box-shadow .12s;
    }
    .btn-glass:hover{transform:translateY(-1px);box-shadow:var(--glass-shadow);}
    .btn-danger{
      background:var(--bg-tint-red);color:var(--text-danger);
      border:0.5px solid var(--border-danger);
      padding:6px 12px;border-radius:var(--r-pill);font-size:12px;font-weight:500;
    }
    .btn-success{
      background:linear-gradient(135deg,#5BAD41,#3D8B2A);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(91,173,65,0.35);
      transition:transform .12s,box-shadow .12s;
    }
    .btn-success:hover{transform:translateY(-1px);}

    /* ── PILLS / BADGES ─────────────────────────────────────────────── */
    .pill{display:inline-flex;align-items:center;padding:3px 10px;font-size:11px;font-weight:500;border-radius:var(--r-pill);}
    .pill-green{background:var(--bg-tint-green);color:var(--text-success);}
    .pill-orange{background:var(--bg-tint-orange);color:var(--text-warning);}
    .pill-blue{background:var(--bg-tint-blue);color:var(--text-info);}
    .pill-red{background:var(--bg-tint-red);color:var(--text-danger);}
    .pill-gray{background:rgba(120,120,128,0.12);color:var(--text-secondary);}

    /* ── PROGRESS BAR ───────────────────────────────────────────────── */
    .progress-track{height:5px;background:rgba(120,120,128,0.15);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

    /* ── TABLE ──────────────────────────────────────────────────────── */
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;
      color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;
      border-bottom:var(--border-sm);}
    td{padding:9px 10px;border-bottom:var(--border-sm);color:var(--text-primary);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(120,120,128,0.05);}

    /* ── LOADING ─────────────────────────────────────────────────────── */
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;z-index:9999;
      background:var(--bg-base);
    }
    #loading::before{
      content:"";position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%,rgba(244,121,32,0.2) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%,rgba(91,173,65,0.16) 0%,transparent 70%);
    }
    .spin{
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid rgba(120,120,128,0.15);
      border-top-color:var(--sc-orange);
      animation:sp .7s linear infinite;z-index:1;
    }
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading p{font-size:13px;color:var(--text-secondary);z-index:1;font-weight:500;}
    #loading .brand{
      font-size:22px;font-weight:700;letter-spacing:-.02em;z-index:1;
      background:var(--sc-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* ── ERROR ───────────────────────────────────────────────────────── */
    #err{display:none;position:fixed;inset:0;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;background:var(--bg-base);padding:2rem;text-align:center;z-index:9999}
    #err h3{color:var(--text-danger);font-size:15px;margin-bottom:8px}
    #err pre{font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-width:500px;
      background:var(--bg-card);padding:12px;border-radius:var(--r-md);max-height:300px;overflow:auto;text-align:left;border:var(--border-sm)}
    #err button{margin-top:8px;padding:9px 20px;border:none;background:var(--sc-gradient);color:#fff;border-radius:var(--r-pill);font-size:13px;font-weight:600;cursor:pointer}

    /* ── SCROLLBAR ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(120,120,128,0.3);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(120,120,128,0.5)}

    /* ── TOAST ───────────────────────────────────────────────────────── */
    .toast{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:var(--border-card);box-shadow:var(--glass-shadow-lg);
      padding:10px 20px;border-radius:var(--r-pill);
      font-size:13px;font-weight:500;color:var(--text-primary);
      animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
    }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

    /* ── MODAL ───────────────────────────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;z-index:1000;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:flex-start;justify-content:center;
      overflow-y:auto;padding:1rem;
    }
    .modal-box{
      background:var(--bg-modal);backdrop-filter:blur(40px) saturate(2);-webkit-backdrop-filter:blur(40px) saturate(2);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-lg);
      border-radius:var(--r-xl);width:100%;max-width:560px;padding:24px;
      margin:auto;animation:modalIn .3s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* ── SC HEADER GRADIENT ──────────────────────────────────────────── */
    .sc-header{
      background:var(--sc-gradient);
      padding:3px 12px 3px 4px;border-radius:var(--r-pill);
      display:inline-flex;align-items:center;gap:6px;
    }
    .sc-header span{color:#fff;font-weight:700;font-size:12px;letter-spacing:.02em;}

    /* ── METRIC CARD ─────────────────────────────────────────────────── */
    .metric-card{
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-sm);
      border-radius:var(--r-lg);padding:14px 16px;
    }
    .metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:6px;}

async function fetchBlue(){
  try{const r=await fetch("https://dolarapi.com/v1/dolares/blue");const d=await r.json();return d.venta||d.compra||null;}catch{return null;}
}
function pagadoVenta(v,pagos){
  return Number(v.pago||0)+(pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
}
function cobradoUSD(v,pagos){
  const total=Number(v.total||0);if(total===0)return 0;
  return Number(v.usd||0)*Math.min(1,pagadoVenta(v,pagos)/total);
}
function stockDisp(contId,artNombre,ventas){
  return(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre).reduce((a,v)=>a+Number(v.cantidad),0);
}
function distribuir(items,contenedores,ventas){
  const resultado=[];const errores=[];
  for(const item of items){
    let rest=Number(item.cantidad);
    const cs=contenedores.filter(c=>{
      const art=(c.articulos||[]).find(a=>a.nombre===item.nombre);
      if(!art)return false;
      return(Number(art.cantidad)-stockDisp(c.id,item.nombre,ventas))>0;
    }).map(c=>{
      const art=(c.articulos||[]).find(a=>a.nombre===item.nombre);
      const sd=Number(art.cantidad)-stockDisp(c.id,item.nombre,ventas);
      const vUSD=(ventas||[]).filter(v=>v.contId===c.id).reduce((a,v)=>a+Number(v.usd||0),0);
      const costo=c.costoTotal||0;const enG=costo>0&&vUSD>costo;const pct=costo>0?vUSD/costo:0;
      return{c,sd,enG,pct};
    }).sort((a,b)=>{
      if(a.enG!==b.enG)return b.enG-a.enG;
      if(a.enG&&b.enG)return a.c.id.localeCompare(b.c.id);
      return b.pct-a.pct;
    });
    const total=cs.reduce((a,x)=>a+x.sd,0);
    if(total<rest){errores.push('"'+item.nombre+'": necesitás '+item.cantidad+', hay '+total);continue;}
    for(const x of cs){
      if(rest<=0)break;
      const bajar=Math.min(rest,x.sd);
      resultado.push({artNombre:item.nombre,contId:x.c.id,contNombre:x.c.nombre,cantidad:bajar,precioUnitario:item.precioUnitario,subtotal:bajar*item.precioUnitario});
      rest-=bajar;
    }
  }
  return{resultado,errores};
}
function precioPromedioUltimoMes(contId,artNombre,ventas){
  const desde=haceUnMes();
  const vs=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&v.fecha>=desde&&Number(v.precioVenta||0)>0);
  if(!vs.length){const all=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&Number(v.precioVenta||0)>0);if(!all.length)return 0;return all.reduce((a,v)=>a+Number(v.precioVenta),0)/all.length;}
  return vs.reduce((a,v)=>a+Number(v.precioVenta),0)/vs.length;
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────
function Autocomplete({value,onChange,suggestions,placeholder,style}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const filtered=suggestions.filter(s=>s.toLowerCase().includes((value||"").toLowerCase())&&s!==value).slice(0,7);
  useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);
  },[]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} placeholder={placeholder} style={style||{width:"100%",boxSizing:"border-box"}}/>
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--color-background-primary)",border:"1px solid var(--color-border-secondary)",borderRadius:"0 0 var(--border-radius-md) var(--border-radius-md)",zIndex:9999,maxHeight:200,overflowY:"auto",boxShadow:"0 6px 20px rgba(0,0,0,0.18)"}}>
          {filtered.map(s=>(
            <div key={s} onMouseDown={e=>{e.preventDefault();onChange(s);setOpen(false);}}
              style={{padding:"9px 12px",fontSize:13,cursor:"pointer",color:"var(--color-text-primary)",background:"var(--color-background-primary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"}
              onMouseLeave={e=>e.currentTarget.style.background="var(--color-background-primary)"}>{s}</div>
          ))}
        </div>
      )}
    </div>
  );
}

      <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{fontSize:12,padding:"4px 8px"}}/>
      <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>Hasta</span>
      <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{fontSize:12,padding:"4px 8px"}}/>
      <button onClick={()=>{setDesde("");setHasta("");}} style={{fontSize:11,padding:"4px 8px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:"var(--color-text-secondary)"}}>Limpiar</button>
    </div>
  );
}

// ── BH TRADE HELPERS ──────────────────────────────────────────────────────
function bhSueldoMes(despachosMes, mes){
  const total=despachosMes.reduce((a,d)=>a+d.total,0);
  const base=160000;
  const esAguinaldo=mes===5||mes===11;
  return{total,base,aguinaldo:esAguinaldo,sueldo:(total+base)*(esAguinaldo?1.5:1)};
}

// APP PRINCIPAL
// ══════════════════════════════════════════════════════════════════════════
function App(){
  const [data,setData]=useState(null);
  const [modulo,setModulo]=useState("dashboard");
  const [view,setView]=useState("dashboard");
  const [contSel,setContSel]=useState(null);
  const [contTab,setContTab]=useState("armado");
  const [toastMsg,setToastMsg]=useState(null);
  const [blue,setBlue]=useState(null);
  const [showPedido,setShowPedido]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [theme,setTheme]=useState(()=>localStorage.getItem("eliel_theme")||"light");
  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";localStorage.setItem("eliel_theme",n);document.documentElement.setAttribute("data-theme",n);return n;});
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
  },[theme]);
  useEffect(()=>{
    const handler=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(s=>!s);}};
    document.addEventListener("keydown",handler);
    return()=>document.removeEventListener("keydown",handler);
  },[]);

  const [fbReady, setFbReady] = useState(false);
  const dbRef = useRef(null);

  useEffect(()=>{
    let unsub = null;
    (async()=>{
      setBlue(await fetchBlue());
      try{
        const db = window._fbDB;
        if(!db) throw new Error("Firebase no cargado");
        const docRef = window.firebase.firestore().doc("eliel/datos");
        dbRef.current = docRef;
        const snap = await docRef.get();
        if(snap.exists){
          const remote = snap.data().payload;
          // migrate v9 to v10
          const migrated = remote && (remote._v===9||remote._v===10) ? {
            ...EMPTY,...remote,
            clientes: remote.clientes||{},
            bh: {...(remote.bh||{}), cobros:(remote.bh?.cobros||[])},
            fin: {...(remote.fin||{}), presupuestos:(remote.fin?.presupuestos||{})},
            _v:10
          } : EMPTY;
          setData(migrated);
        } else {
          setData(EMPTY);
        }
        unsub = docRef.onSnapshot(snap=>{
          if(snap.exists){
            const remote = snap.data().payload;
            if(remote&&(remote._v===9||remote._v===10)){
              const migrated={...EMPTY,...remote,clientes:remote.clientes||{},bh:{...( remote.bh||{}),cobros:(remote.bh?.cobros||[])},fin:{...(remote.fin||{}),presupuestos:(remote.fin?.presupuestos||{})},_v:10};
              setData(migrated);
            }
          }
        });
        setFbReady(true);
      } catch(e){
        console.error("Firebase error:",e);
        const raw=localStorage.getItem("eliel_v10")||localStorage.getItem("eliel_v9");
        setData(raw?JSON.parse(raw):EMPTY);
      }
    })();
    return ()=>{ if(unsub) unsub(); };
  },[]);

  const save=async nd=>{
    setData(nd);
    try{localStorage.setItem("eliel_v10",JSON.stringify(nd));}catch{}
    if(dbRef.current){
      try{
        await dbRef.current.set({payload:nd,ts:Date.now()});
      }catch(e){console.error("Firebase save error:",e);}
    }
  };
  const showToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(null),2800);};

  if(!data)return <div style={{padding:"2rem",color:"var(--color-text-secondary)"}}>Cargando...</div>;

  // Calculos SC globales
  const stockUni={};
  for(const c of data.contenedores){
    for(const art of(c.articulos||[])){
      if(!stockUni[art.nombre])stockUni[art.nombre]=0;
      stockUni[art.nombre]+=Math.max(0,Number(art.cantidad)-stockDisp(c.id,art.nombre,data.ventas));
    }
  }
  let totalCobUSD=0,totalCostoUSD=0;
  for(const c of data.contenedores){
    totalCostoUSD+=c.costoTotal||0;
    totalCobUSD+=(data.ventas||[]).filter(v=>v.contId===c.id).reduce((a,v)=>a+cobradoUSD(v,data.pagos),0);
  }
  const gananciaTotal=Math.max(0,totalCobUSD-totalCostoUSD);
  const mi30Total=gananciaTotal*0.3;
  const totalRetirado=(data.retiros||[]).reduce((a,r)=>a+Number(r.montoUSD||0),0);
  const pendienteRetiro=Math.max(0,mi30Total-totalRetirado);
  const clienteIdx=buildClienteIndex(data.ventas,data.despachos,data.clientes);

// BÚSQUEDA GLOBAL
// ══════════════════════════════════════════════════════════════════════════
function SearchModal({data,onClose,goModulo,setView}){
  const [q,setQ]=useState("");
  const inputRef=useRef();
  useEffect(()=>{if(inputRef.current)inputRef.current.focus();},[]);

  const results=[];
  if(q.trim().length<2){
    // Sin query: mostrar accesos rápidos
  } else {
    const ql=q.toLowerCase();
    // Clientes (ventas)
    const clientes=new Map();
    for(const v of(data.ventas||[])){
      if(v.cliente?.toLowerCase().includes(ql)){
        if(!clientes.has(v.cliente)){
          const vCliente=(data.ventas||[]).filter(x=>x.cliente===v.cliente);
          const debe=vCliente.reduce((a,x)=>{const cob=Number(x.pago||0)+(data.pagos||[]).filter(p=>p.ventaId===x.id).reduce((a2,p)=>a2+Number(p.monto),0);return a+(Math.max(0,Number(x.total||0)-cob));},0);
          clientes.set(v.cliente,{nombre:v.cliente,ventas:vCliente.length,debe});
        }
      }
    }
    for(const [,c] of clientes){
      results.push({type:"cliente",icon:"👤",title:c.nombre,sub:c.ventas+" ventas"+( c.debe>0?" · Debe $"+Number(c.debe).toLocaleString("es-AR"):""),action:()=>{goModulo("supercoating");setView("cuentas");onClose();}});
    }
    // Despachos
    for(const d of(data.despachos||[])){
      if(d.cliente?.toLowerCase().includes(ql)||d.provincia?.toLowerCase().includes(ql)||d.expreso?.toLowerCase().includes(ql)){
        results.push({type:"despacho",icon:"📦",title:d.cliente,sub:d.localidad+", "+d.provincia+" · "+( d.expreso||""),action:()=>{goModulo("supercoating");setView("despachos");onClose();}});
      }
    }
    // Ventas por artículo
    const arts=new Set();
    for(const v of(data.ventas||[])){
      if(v.articulo?.toLowerCase().includes(ql)&&!arts.has(v.articulo)){
        arts.add(v.articulo);
        const vs=(data.ventas||[]).filter(x=>x.articulo===v.articulo);
        const totalU=vs.reduce((a,x)=>a+Number(x.cantidad),0);
        results.push({type:"articulo",icon:"📄",title:v.articulo,sub:totalU+" unidades vendidas en "+vs.length+" ops",action:()=>{goModulo("supercoating");setView("ventas");onClose();}});
      }
    }
    // Contenedores
    for(const c of(data.contenedores||[])){
      if(c.nombre?.toLowerCase().includes(ql)){
        results.push({type:"contenedor",icon:"🗃️",title:c.nombre,sub:(c.articulos||[]).length+" artículos",action:()=>{goModulo("supercoating");setView("contenedores");onClose();}});
      }
    }
    // Eventos DJ
    for(const e of(data.dj?.eventos||[])){
      if(e.nombre?.toLowerCase().includes(ql)){
        results.push({type:"evento",icon:"🎵",title:e.nombre,sub:e.fecha+" · "+e.estado,action:()=>{goModulo("dj");onClose();}});
      }
    }
    // Clientes BH
    for(const d of(data.bh?.despachos||[])){
      if(d.exp?.toLowerCase().includes(ql)){
        results.push({type:"bh",icon:"🚢",title:"Despacho "+d.exp,sub:d.fecha+" · $"+Number(d.total||0).toLocaleString("es-AR"),action:()=>{goModulo("bhtrade");onClose();}});
      }
    }
  }

  const QUICK=[
    {icon:"📦",label:"Super Coating",action:()=>{goModulo("supercoating");onClose();}},
    {icon:"🚢",label:"BH Trade",action:()=>{goModulo("bhtrade");onClose();}},
    {icon:"🎵",label:"DJ",action:()=>{goModulo("dj");onClose();}},
    {icon:"💰",label:"Finanzas",action:()=>{goModulo("finanzas");onClose();}},
    {icon:"💾",label:"Backup JSON",action:()=>{
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="backup_eliel_"+new Date().toISOString().split("T")[0]+".json";
      a.click();onClose();
    }},
  ];

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"10vh 1rem 1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:520,background:"var(--bg-modal)",backdropFilter:"blur(40px) saturate(2)",WebkitBackdropFilter:"blur(40px) saturate(2)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-xl)",boxShadow:"var(--glass-shadow-lg)",overflow:"hidden",animation:"modalIn .25s cubic-bezier(.34,1.2,.64,1)"}}>
        {/* Search input */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"0.5px solid var(--glass-border)"}}>
          <span style={{fontSize:18,flexShrink:0}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Buscar clientes, artículos, eventos, despachos…"
            style={{flex:1,border:"none",background:"transparent",fontSize:15,fontWeight:400,color:"var(--text-primary)",outline:"none",width:"auto"}}/>
          {q&&<button onClick={()=>setQ("")} style={{border:"none",background:"none",fontSize:16,cursor:"pointer",color:"var(--text-secondary)",padding:"0 4px"}}>✕</button>}
          <kbd style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"rgba(120,120,128,0.15)",color:"var(--text-secondary)",border:"0.5px solid var(--glass-border)",whiteSpace:"nowrap"}}>ESC</kbd>
        </div>

        {/* Results */}
        <div style={{maxHeight:"55vh",overflowY:"auto"}}>
          {q.trim().length<2?(
            <div style={{padding:"10px 8px"}}>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",padding:"4px 8px",marginBottom:4}}>Acceso rápido</div>
              {QUICK.map((item,i)=>(
                <button key={i} onClick={item.action} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderRadius:"var(--r-md)",border:"none",background:"none",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(120,120,128,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                  <span style={{fontSize:14,fontWeight:500,color:"var(--text-primary)"}}>{item.label}</span>
                </button>
              ))}
            </div>
          ):results.length===0?(
            <div style={{padding:"2rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin resultados para "{q}"</div>
          ):(
            <div style={{padding:"8px"}}>
              {results.map((r,i)=>(
                <button key={i} onClick={r.action} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderRadius:"var(--r-md)",border:"none",background:"none",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(120,120,128,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:18,width:28,textAlign:"center",flexShrink:0}}>{r.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.title}</div>
                    <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.sub}</div>
                  </div>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:"var(--r-pill)",background:"rgba(120,120,128,0.1)",color:"var(--text-secondary)",flexShrink:0}}>{r.type}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// DASHBOARD CENTRAL
// ══════════════════════════════════════════════════════════════════════════
function DashboardCentral({data,blue,mi30Total,pendienteRetiro,totalRetirado,bhTotalAnio,bhSueldo,djGanancia,djCobrado,djEventos,totalGastos,totalIngresos,stockUni,goModulo}){
  const tcActual=blue||1450;
  const balance=totalIngresos-totalGastos;
  const Card=({label,value,sub,color,onClick})=>(
    <div onClick={onClick}
      style={{
        background:"var(--bg-card)",backdropFilter:"blur(20px) saturate(1.8)",WebkitBackdropFilter:"blur(20px) saturate(1.8)",
        border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",
        borderRadius:"var(--r-lg)",padding:"14px 16px",
        cursor:onClick?"pointer":"default",transition:"transform .15s,box-shadow .15s",
      }}
      onMouseEnter={e=>{if(onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--glass-shadow)";}}}
      onMouseLeave={e=>{if(onClick){e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="var(--glass-shadow-sm)";}}}> 
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:6}}>{label}</div>
      <div style={{fontSize:22,fontWeight:600,letterSpacing:"-.02em",color:color||"var(--text-primary)"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"var(--text-secondary)",marginTop:3}}>{sub}</div>}
    </div>
  );

  // movimientos recientes de los 3 módulos
  const recientes=[
    ...(data.bh?.despachos||[]).map(d=>({fecha:d.fecha,desc:"Despacho "+d.exp,monto:d.total,modulo:"BH Trade",color:"var(--color-text-info)"})),
    ...(data.dj?.eventos||[]).filter(e=>e.estado==="Realizado").map(e=>({fecha:e.fecha,desc:e.nombre,monto:e.cobro,modulo:"DJ",color:"var(--color-text-warning)"})),
    ...(data.retiros||[]).map(r=>({fecha:r.fecha,desc:"Retiro SC",monto:r.montoPesos||r.montoUSD*tcActual,modulo:"Super Coating",color:"var(--color-text-success)"})),
    ...(data.fin?.gastos||[]).map(g=>({fecha:g.fecha,desc:g.desc,monto:-g.monto,modulo:"Gasto",color:"var(--color-text-danger)"})),
  ].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8);

  const fuentes=[
    {n:"Super Coating",v:totalRetirado*(blue||1450),c:"var(--color-text-success)"},
    {n:"BH Trade",v:bhTotalAnio,c:"var(--color-text-info)"},
    {n:"DJ",v:djCobrado,c:"var(--color-text-warning)"},
  ];
  const maxBar=Math.max(...fuentes.map(f=>f.v),1);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:22,fontWeight:500,margin:"0 0 4px",color:"var(--color-text-primary)"}}>Resumen general</h1>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>{new Date().toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        <Card label="Ingresos totales" value={"$"+fmt(totalIngresos)} sub="3 fuentes 2026"/>
        <Card label="Gastos personales" value={"$"+fmt(totalGastos)} color={totalGastos>0?"var(--color-text-danger)":undefined}/>
        <Card label="Balance" value={"$"+fmt(balance)} color={balance>=0?"var(--color-text-success)":"var(--color-text-danger)"}/>
        <Card label="BH Trade — mes" value={"$"+fmt(bhSueldo)} sub="a cobrar este mes" onClick={()=>goModulo("bhtrade")}/>
        <Card label="Mi 30% SC pendiente" value={fmtUSD(pendienteRetiro)} sub={"~$"+fmt(pendienteRetiro*(blue||1450))} onClick={()=>goModulo("supercoating")} color={pendienteRetiro>0?"var(--color-text-success)":undefined}/>
        <Card label="DJ — ganancia neta" value={"$"+fmt(djGanancia)} sub={djEventos.filter(e=>e.estado==="Realizado").length+" eventos realizados"} onClick={()=>goModulo("dj")}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1rem"}}>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.05em"}}>Ingresos por módulo</div>
          {fuentes.map(f=>(
            <div key={f.n} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{color:"var(--color-text-primary)"}}>{f.n}</span>
                <span style={{color:"var(--color-text-secondary)"}}>${fmt(f.v)}</span>
              </div>
              <div style={{height:6,background:"rgba(120,120,128,0.08)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:(f.v/maxBar*100)+"%",background:f.c,borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>

        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.05em"}}>Últimos movimientos</div>
          {recientes.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:13}}>Sin movimientos aún.</p>:recientes.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <div>
                <div style={{fontSize:12,color:"var(--color-text-primary)"}}>{m.desc}</div>
                <div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{m.fecha} · <span style={{color:m.color}}>{m.modulo}</span></div>
              </div>
              <div style={{fontSize:13,fontWeight:500,color:m.monto>=0?"var(--color-text-success)":"var(--color-text-danger)"}}>
                {m.monto>=0?"$"+fmt(m.monto):"-$"+fmt(Math.abs(m.monto))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Accesos rápidos */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:8}}>
        {[
          {mod:"supercoating",icon:"📦",title:"Super Coating",desc:"Contenedores, ventas, mi 30%"},
          {mod:"bhtrade",icon:"🚢",title:"BH Trade",desc:"Despachos y cobros"},
          {mod:"dj",icon:"🎵",title:"DJ",desc:"Eventos, señas y ganancias"},
          {mod:"finanzas",icon:"💰",title:"Finanzas",desc:"Gastos, presupuesto y proyección"},
        ].map(x=>(
          <button key={x.mod} onClick={()=>goModulo(x.mod)} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"12px 14px",cursor:"pointer",textAlign:"left",transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--color-border-primary)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--color-border-tertiary)"}>
            <div style={{fontSize:20,marginBottom:6}}>{x.icon}</div>
            <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)",marginBottom:2}}>{x.title}</div>
            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{x.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// BH TRADE
// ══════════════════════════════════════════════════════════════════════════
function BHTradeView({data,save,showToast,blue}){
  const [mesActivo,setMesActivo]=useState(new Date().getMonth());
  const [form,setForm]=useState({exp:"",fecha:hoy(),cotiz:blue?String(Math.round(blue)):"",usd:"300"});
  const [showCobro,setShowCobro]=useState(false);
  const [formCobro,setFormCobro]=useState({monto:"",fecha:hoy(),nota:""});
  const cobros=data.bh?.cobros||[];
  const cobradoTotal=cobros.reduce((a,c)=>a+Number(c.monto||0),0);
  const guardarCobro=()=>{
    if(!formCobro.monto)return;
    save({...data,bh:{...data.bh,cobros:[...cobros,{id:Date.now().toString(),mes:mesActivo,...formCobro,monto:Number(formCobro.monto)}]}});
    setFormCobro({monto:"",fecha:hoy(),nota:""});setShowCobro(false);showToast("Cobro registrado");
  };
  const eliminarCobro=id=>save({...data,bh:{...data.bh,cobros:cobros.filter(c=>c.id!==id)}});

  const despachos=data.bh?.despachos||[];
  const calcTotal=()=>Number(form.cotiz||0)*Number(form.usd||0);
  const guardar=()=>{
    if(!form.exp.trim()||!form.cotiz)return;
    const mes=new Date(form.fecha).getMonth();
    const nuevo={id:Date.now().toString(),exp:form.exp.trim(),fecha:form.fecha,cotiz:Number(form.cotiz),usd:Number(form.usd||300),total:Number(form.cotiz)*Number(form.usd||300),mes};
    save({...data,bh:{...data.bh,despachos:[...despachos,nuevo]}});
    setForm({exp:"",fecha:hoy(),cotiz:blue?String(Math.round(blue)):"",usd:"300"});
    showToast("Despacho cargado");
  };
  const eliminar=id=>save({...data,bh:{...data.bh,despachos:despachos.filter(d=>d.id!==id)}});

  const bhTotalAnio=despachos.reduce((a,d)=>a+d.total,0);
  const mesesConData=[...new Set(despachos.map(d=>d.mes))];
  const mesesMostrar=[...new Set([...mesesConData,new Date().getMonth()])].sort((a,b)=>a-b);
  const despMes=despachos.filter(d=>d.mes===mesActivo);
  const s=bhSueldoMes(despMes,mesActivo);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>BH Trade</h2>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>$300 USD por despacho · Base $160.000 + aguinaldo en junio y diciembre</p>
      </div>

      {/* Métricas anuales */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[
          {l:"Total acumulado 2026",v:"$"+fmt(bhTotalAnio),sub:despachos.length+" despachos"},
          {l:"Cobrado 2026",v:"$"+fmt(cobradoTotal),sub:"de lo devengado"},
          {l:"A cobrar "+MESES[mesActivo]+(s.aguinaldo?" ✦":""),v:"$"+fmt(s.sueldo),sub:s.aguinaldo?"Con aguinaldo ×1.5":"Total + $"+fmt(s.base),green:true},
          {l:"Despachos "+MESES[mesActivo],v:despMes.length,sub:"$"+fmt(s.total)+" en despachos"},
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--color-background-success)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
            <div style={{fontSize:11,color:x.green?"var(--color-text-success)":"var(--color-text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:18,fontWeight:500,color:x.green?"var(--color-text-success)":"var(--color-text-primary)"}}>{x.v}</div>
            {x.sub&&<div style={{fontSize:11,color:x.green?"var(--color-text-success)":"var(--color-text-secondary)",marginTop:2}}>{x.sub}</div>}
          </div>
        ))}
      </div>

      {/* Selector de mes */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"1rem"}}>
        {mesesMostrar.map(m=>(
          <button key={m} onClick={()=>setMesActivo(m)} style={{padding:"5px 12px",fontSize:12,fontWeight:m===mesActivo?500:400,border:"0.5px solid var(--color-border-secondary)",borderRadius:20,cursor:"pointer",background:m===mesActivo?"var(--color-text-primary)":"none",color:m===mesActivo?"var(--color-background-primary)":"var(--color-text-secondary)"}}>
            {MESES[m]}
          </button>
        ))}
      </div>

      {/* Formulario */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Cargar despacho — {MESES[mesActivo]}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:8}}>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Expediente</label><input value={form.exp} onChange={e=>setForm({...form,exp:e.target.value})} placeholder="SKY-INTR-260" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cotización ($)</label><input type="number" value={form.cotiz} onChange={e=>setForm({...form,cotiz:e.target.value})} placeholder={blue?String(Math.round(blue)):"1400"} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>USD</label><input type="number" value={form.usd} onChange={e=>setForm({...form,usd:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        </div>
        {form.cotiz&&<div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:8}}>Total: <strong style={{color:"var(--color-text-primary)"}}>{"$"+fmt(calcTotal())}</strong></div>}
        <button onClick={guardar} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-info)",color:"var(--color-background-primary)",fontWeight:500}}>Guardar despacho</button>
      </div>

      {/* Tabla */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:500}}>Despachos — {MESES[mesActivo]}</div>
        {despMes.length>0&&<button onClick={()=>{if(confirm("¿Borrar todos los despachos de "+MESES[mesActivo]+"?"))save({...data,bh:{...data.bh,despachos:despachos.filter(d=>d.mes!==mesActivo)}});}} style={{fontSize:11,padding:"4px 10px",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-danger)",background:"var(--color-background-danger)",color:"var(--color-text-danger)"}}>Borrar mes</button>}
      </div>
        {despMes.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:13}}>Sin despachos en {MESES[mesActivo]}.</p>:(
          <>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["Expediente","Fecha","Cotización","USD","Total $",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",fontWeight:500,fontSize:11,color:"var(--color-text-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>{h}</th>)}</tr></thead>
                <tbody>{despMes.map(d=>(
                  <tr key={d.id}>
                    <td style={{padding:"7px 8px",fontWeight:500}}>{d.exp}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>{d.fecha}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>${fmt(d.cotiz)}</td>
                    <td style={{padding:"7px 8px",color:"var(--color-text-secondary)"}}>{fmtUSD(d.usd)}</td>
                    <td style={{padding:"7px 8px",fontWeight:500}}>${fmt(d.total)}</td>
                    <td style={{padding:"7px 8px"}}><button onClick={()=>eliminar(d.id)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:13}}>✕</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{marginTop:12,padding:"10px 12px",background:"rgba(120,120,128,0.08)",borderRadius:"var(--border-radius-md)",fontSize:13}}>
              <span>Subtotal despachos: <strong>${fmt(s.total)}</strong></span>
              <span style={{marginLeft:16}}>+ Base fija: <strong>${fmt(s.base)}</strong></span>
              {s.aguinaldo&&<span style={{marginLeft:16,color:"var(--color-text-warning)"}}>× 1.5 aguinaldo ✦</span>}
              <span style={{marginLeft:16,color:"var(--color-text-success)",fontWeight:600}}> = A cobrar: ${fmt(s.sueldo)}</span>
            </div>
          </>
        )}
      </div>

      {/* ── COBROS BH ── */}
      <div style={{marginTop:16,background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px 18px",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)"}}>Cobros registrados</div>
            <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:2}}>Registrá cada vez que cobrás, sea parcial o total</div>
          </div>
          <button onClick={()=>setShowCobro(s=>!s)} style={{fontSize:12,padding:"6px 14px",borderRadius:"var(--r-pill)",border:"none",background:"linear-gradient(135deg,#5BAD41,#3D8B2A)",color:"#fff",cursor:"pointer",fontWeight:600,boxShadow:"0 3px 10px rgba(91,173,65,0.3)"}}>+ Cobro</button>
        </div>
        {showCobro&&(
          <div style={{background:"rgba(120,120,128,0.06)",borderRadius:"var(--r-md)",padding:"12px",marginBottom:12,border:"0.5px solid var(--glass-border)"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Monto cobrado ($)</label><input type="number" value={formCobro.monto} onChange={e=>setFormCobro({...formCobro,monto:e.target.value})} placeholder="0"/></div>
              <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Fecha</label><input type="date" value={formCobro.fecha} onChange={e=>setFormCobro({...formCobro,fecha:e.target.value})}/></div>

              <button onClick={()=>setShowCobro(false)} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        )}
        {cobros.length===0
          ?<div style={{padding:"1rem 0",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin cobros aún. Registrá cuando cobrás.</div>
          :<div>
            {[...cobros].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(c=>(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--glass-border)"}}>
                <div>

            ))}
            <div style={{marginTop:10,fontSize:12,fontWeight:600,color:"var(--text-success)"}}>Total cobrado 2026: ${fmt(cobradoTotal)}</div>
          </div>
        }
      </div>

    </div>
  );
}

// DJ
// ══════════════════════════════════════════════════════════════════════════
function DJView({data,save,showToast}){
  const [form,setForm]=useState({nombre:"",fecha:hoy(),estado:"Confirmado",costo:"",cobro:"",notas:""});
  const [editId,setEditId]=useState(null);

  const eventos=data.dj?.eventos||[];
  const realizados=eventos.filter(e=>e.estado==="Realizado");
  const ganTotal=realizados.reduce((a,e)=>a+e.ganancia,0);
  const cobroTotal=realizados.reduce((a,e)=>a+e.cobro,0);
  const proximos=eventos.filter(e=>e.estado==="Confirmado"||e.estado==="Señado");

  const guardar=()=>{
    if(!form.nombre.trim())return;
    const cobro=Number(form.cobro||0),costo=Number(form.costo||0),sena=Number(form.sena||0);
    const evento={id:editId||Date.now().toString(),nombre:form.nombre,fecha:form.fecha,estado:form.estado,costo,cobro,sena,saldo:Math.max(0,cobro-sena),ganancia:cobro-costo,margen:cobro>0?((cobro-costo)/cobro*100):0,notas:form.notas};
    const nuevos=editId?eventos.map(e=>e.id===editId?evento:e):[...eventos,evento];
    save({...data,dj:{...data.dj,eventos:nuevos}});
    setForm({nombre:"",fecha:hoy(),estado:"Confirmado",costo:"",cobro:"",sena:"",notas:""});
    setEditId(null);showToast(editId?"Evento actualizado":"Evento cargado");
  };
  const editar=e=>{setEditId(e.id);setForm({nombre:e.nombre,fecha:e.fecha,estado:e.estado,costo:String(e.costo),cobro:String(e.cobro),sena:String(e.sena||0),notas:e.notas||""});};
  const eliminar=id=>save({...data,dj:{...data.dj,eventos:eventos.filter(e=>e.id!==id)}});
  const actualizarEstado=(id,estado)=>{
    const e=eventos.find(x=>x.id===id);if(!e)return;
    save({...data,dj:{...data.dj,eventos:eventos.map(x=>x.id===id?{...x,estado}:x)}});
  };

  const stColor={Realizado:"var(--color-text-success)",Confirmado:"var(--color-text-info)",Señado:"var(--color-text-warning)",Cancelado:"var(--color-text-danger)"};
  const stBg={Realizado:"var(--color-background-success)",Confirmado:"var(--color-background-info)",Señado:"var(--color-background-warning)",Cancelado:"var(--color-background-danger)"};
  const ganARS=Number(form.cobro||0)-Number(form.costo||0);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>Eliel Mizrahi DJ</h2>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>Gestión de eventos y rentabilidad</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[
          {l:"Eventos realizados",v:realizados.length},
          {l:"Próximos eventos",v:proximos.length},
          {l:"Facturación total",v:"$"+fmt(cobroTotal)},
          {l:"Ganancia neta",v:"$"+fmt(ganTotal),green:ganTotal>0},
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--color-background-success)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
            <div style={{fontSize:11,color:x.green?"var(--color-text-success)":"var(--color-text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:20,fontWeight:500,color:x.green?"var(--color-text-success)":"var(--color-text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>

      {/* Formulario */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>{editId?"Editar evento":"Nuevo evento"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Nombre del evento</label><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Casamiento García — Salón XYZ" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Estado</label>
            <select value={form.estado} onChange={e=>setForm({...form,estado:e.target.value})} style={{width:"100%",marginTop:2}}>
              {["Confirmado","Señado","Realizado","Cancelado"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Costo total ($)</label><input type="number" value={form.costo} onChange={e=>setForm({...form,costo:e.target.value})} placeholder="0" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Cobro total ($)</label><input type="number" value={form.cobro} onChange={e=>setForm({...form,cobro:e.target.value})} placeholder="0" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        </div>
        {(form.costo||form.cobro)&&(
          <div style={{background:"rgba(120,120,128,0.08)",borderRadius:"var(--border-radius-md)",padding:"8px 12px",marginBottom:8,fontSize:12,display:"flex",gap:16}}>
            <span>Ganancia: <strong style={{color:ganARS>=0?"var(--color-text-success)":"var(--color-text-danger)"}}>${fmt(ganARS)}</strong></span>
            {Number(form.cobro)>0&&<span>Margen: <strong>{fmtPct(ganARS/Number(form.cobro)*100)}</strong></span>}
          </div>
        )}
        <div style={{marginBottom:8}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Notas (opcional)</label><input value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} placeholder="Detalles, rider, observaciones..." style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={guardar} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-info)",color:"var(--color-background-primary)",fontWeight:500}}>{editId?"Actualizar":"Guardar evento"}</button>
          {editId&&<button onClick={()=>{setEditId(null);setForm({nombre:"",fecha:hoy(),estado:"Confirmado",costo:"",cobro:"",sena:"",notas:""}); }} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:"var(--color-text-secondary)"}}>Cancelar</button>}
        </div>
      </div>

      {/* Lista de eventos */}
      {eventos.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:14}}>Sin eventos todavía.</p>:(
        <div style={{display:"grid",gap:8}}>
          {[...eventos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(e=>(
            <div key={e.id} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontWeight:500,fontSize:14}}>{e.nombre}</span>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:stBg[e.estado]||"var(--color-background-secondary)",color:stColor[e.estado]||"var(--color-text-secondary)"}}>{e.estado}</span>
                  </div>
                  <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{e.fecha}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <select value={e.estado} onChange={ev=>actualizarEstado(e.id,ev.target.value)} style={{fontSize:11,padding:"3px 6px",borderRadius:4}}>
                    {["Confirmado","Señado","Realizado","Cancelado"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <button onClick={()=>editar(e)} style={{border:"none",background:"none",cursor:"pointer",fontSize:13}}>✏️</button>
                  <button onClick={()=>eliminar(e.id)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--color-text-danger)",fontSize:13}}>✕</button>
                </div>
              </div>
              <div style={{display:"flex",gap:16,fontSize:13,flexWrap:"wrap"}}>
                <span>Costo: <strong>${fmt(e.costo)}</strong></span>
                <span>Cobro: <strong>${fmt(e.cobro)}</strong></span>
                {e.sena>0&&<span style={{color:"var(--text-success)"}}>Seña: <strong>${fmt(e.sena)}</strong></span>}
                {e.saldo>0&&<span style={{color:"var(--text-warning)",fontWeight:600}}>Saldo: ${fmt(e.saldo)}</span>}
                <span style={{color:e.ganancia>=0?"var(--text-success)":"var(--text-danger)",fontWeight:500}}>Ganancia: ${fmt(e.ganancia)}</span>
                {e.cobro>0&&<span style={{color:"var(--text-secondary)"}}>Margen: {fmtPct(e.margen||0)}</span>}
              </div>
              {e.notas&&<div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:6}}>{e.notas}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function FinanzasView({data,save,showToast,blue,totalIngresos,totalGastos,bhTotalAnio,djCobrado,totalRetSCPesos,bhSueldo,pendienteRetiro}){
  const tcBlue=blue||1450;
  const initForm={desc:"",moneda:"ARS",monto:"",cotiz:String(Math.round(tcBlue)),cat:"Alimentación",fecha:hoy(),fuente:"Otros"};
  const [form,setForm]=useState(initForm);
  const [showPresupuesto,setShowPresupuesto]=useState(false);
  const [presupCat,setPresupCat]=useState("");
  const [presupMonto,setPresupMonto]=useState("");
  const gastos=data.fin?.gastos||[];
  const balance=totalIngresos-totalGastos;
  const presupuestos=data.fin?.presupuestos||{};
  const mesActual=new Date().getMonth();
  const gastosMes=gastos.filter(g=>{const d=new Date(g.fecha);return d.getMonth()===mesActual&&d.getFullYear()===new Date().getFullYear();});
  const totalGastosMes=gastosMes.reduce((a,g)=>a+g.monto,0);
  
  const guardarPresupuesto=()=>{
    if(!presupCat||!presupMonto)return;
    save({...data,fin:{...data.fin,presupuestos:{...presupuestos,[presupCat]:Number(presupMonto)}}});
    setPresupCat("");setPresupMonto("");setShowPresupuesto(false);showToast("Presupuesto guardado");
  };

  // monto siempre guardado en ARS
  const montoARS=form.moneda==="USD"
    ? Number(form.monto||0)*Number(form.cotiz||tcBlue)
    : Number(form.monto||0);

  const guardar=()=>{
    if(!form.desc.trim()||!form.monto)return;
    const gasto={
      id:Date.now().toString(),
      desc:form.desc,
      moneda:form.moneda,
      montoOriginal:Number(form.monto),
      cotiz:form.moneda==="USD"?Number(form.cotiz||tcBlue):null,
      monto:montoARS,           // siempre ARS para cálculos
      cat:form.cat,
      fecha:form.fecha,
      fuente:form.fuente,
    };
    save({...data,fin:{...data.fin,gastos:[...gastos,gasto]}});
    setForm({...initForm,cotiz:String(Math.round(tcBlue))});
    showToast("Gasto cargado");
  };
  const eliminar=id=>save({...data,fin:{...data.fin,gastos:gastos.filter(g=>g.id!==id)}});

  // Por categoría
  const porCat={};
  gastos.forEach(g=>{porCat[g.cat]=(porCat[g.cat]||0)+g.monto;});
  const catArr=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(...catArr.map(c=>c[1]),1);
  const catColors=["var(--color-text-info)","var(--color-text-success)","var(--color-text-warning)","var(--color-text-danger)","#533AB7","var(--color-text-success)","var(--color-border-warning)","var(--color-text-secondary)"];

  // Por fuente
  const fuentes=[
    {n:"Super Coating",v:totalRetSCPesos,c:"var(--color-text-success)"},
    {n:"BH Trade",v:bhTotalAnio,c:"var(--color-text-info)"},
    {n:"DJ",v:djCobrado,c:"var(--color-text-warning)"},
  ];
  const maxFuente=Math.max(...fuentes.map(f=>f.v),1);

  const monedaBtn=(mon)=>(
    <button onClick={()=>setForm(f=>({...f,moneda:mon}))}
      style={{flex:1,padding:"7px",fontSize:12,fontWeight:500,border:"0.5px solid "+(form.moneda===mon?"var(--color-text-info)":"var(--color-border-secondary)"),borderRadius:"var(--border-radius-md)",cursor:"pointer",background:form.moneda===mon?"var(--color-background-info)":"var(--color-background-primary)",color:form.moneda===mon?"var(--color-text-info)":"var(--color-text-secondary)"}}>
      {mon==="ARS"?"$ Pesos":"USD Dólares"}
    </button>
  );

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>Finanzas personales</h2>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:0}}>Seguimiento de gastos y balance de ingresos</p>
      </div>

      {/* Métricas */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[
          {l:"Ingresos totales",v:"$"+fmt(totalIngresos)},
          {l:"Total gastado",v:"$"+fmt(totalGastos),danger:totalGastos>0},
          {l:"Balance",v:"$"+fmt(balance),green:balance>=0,danger:balance<0},
          {l:"N° de gastos",v:gastos.length},
        ].map(x=>(
          <div key={x.l} style={{background:x.green?"var(--color-background-success)":x.danger&&typeof x.v==="string"?"var(--color-background-danger)":"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
            <div style={{fontSize:11,color:x.green?"var(--color-text-success)":x.danger&&typeof x.v==="string"?"var(--color-text-danger)":"var(--color-text-secondary)",marginBottom:4}}>{x.l}</div>
            <div style={{fontSize:18,fontWeight:500,color:x.green?"var(--color-text-success)":x.danger&&typeof x.v==="string"?"var(--color-text-danger)":"var(--color-text-primary)"}}>{x.v}</div>
          </div>
        ))}
      </div>

      {/* Formulario */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:12,color:"var(--color-text-primary)"}}>Cargar gasto</div>

        {/* Toggle moneda */}

          <label style={{fontSize:11,color:"var(--color-text-secondary)",display:"block",marginBottom:5}}>Moneda</label>
