function ExtractoView({data}){
  const [desde,setDesde]=useState("");const[hasta,setHasta]=useState("");
  const movs=[];
  for(const v of(data.ventas||[])){if(Number(v.pago||0)>0)movs.push({id:v.id,fecha:v.fecha,tipo:"Pago inicial",cliente:v.cliente,monto:Number(v.pago),detalle:v.articulo+" ×"+v.cantidad,contId:v.contId});}
  for(const p of(data.pagos||[])){const v=(data.ventas||[]).find(v=>v.id===p.ventaId);if(v)movs.push({id:p.id,fecha:p.fecha,tipo:"Pago posterior",cliente:v.cliente,monto:Number(p.monto),detalle:v.articulo+" ×"+v.cantidad,contId:v.contId});}
  for(const r of(data.retiros||[])){movs.push({id:r.id,fecha:r.fecha,tipo:"Retiro 30%",cliente:"—",monto:0,montoUSD:Number(r.montoUSD),detalle:r.nota||"",contId:null});}
  const filtrados=movs.filter(m=>(!desde||m.fecha>=desde)&&(!hasta||m.fecha<=hasta)).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)||(b.id||"").localeCompare(a.id||""));
  const totalCob=filtrados.filter(m=>m.tipo!=="Retiro 30%").reduce((a,m)=>a+m.monto,0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
      <h2 style={{fontSize:18,fontWeight:500,margin:0}}>Extracto</h2>
      <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>Total cobrado: ${fmt(totalCob)}</span>
    </div>
    <FiltroFechas desde={desde} setDesde={setDesde} hasta={hasta} setHasta={setHasta}/>
    {filtrados.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:14}}>Sin movimientos.</p>:(
      <div style={{display:"grid",gap:6}}>
        {filtrados.map((m,i)=>{
          const cont=m.contId?(data.contenedores||[]).find(c=>c.id===m.contId):null;
          const color=m.tipo==="Retiro 30%"?"var(--color-text-warning)":m.tipo==="Pago posterior"?"var(--color-text-info)":"var(--color-text-success)";
          return(<div key={i} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"10px 1rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:11,fontWeight:500,color,padding:"1px 6px",borderRadius:4,background:color+"22"}}>{m.tipo}</span>
                <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{m.fecha}</span>
              </div>
              <div style={{fontSize:13,fontWeight:500}}>{m.cliente}</div>
              <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{m.detalle+(cont?" · "+cont.nombre:"")}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {m.monto>0&&<div style={{fontSize:15,fontWeight:500,color:"var(--color-text-success)"}}>${fmt(m.monto)}</div>}
              {m.montoUSD>0&&<div style={{fontSize:13,color:"var(--color-text-warning)",fontWeight:500}}>{fmtUSD(m.montoUSD)}</div>}
            </div>
          </div>);
        })}
      </div>
    )}
  </div>);
}

          </div>
          <div>
            <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>
              Monto ({form.moneda})
            </label>
            <input type="number" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})} placeholder="0"/>
          </div>
          {form.moneda==="ARS"&&(
            <div>
              <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>
                Cotización blue {blue?"· $"+fmt(blue):""}
              </label>
              <input type="number" value={form.tcRetiro} onChange={e=>setForm({...form,tcRetiro:e.target.value})}/>
            </div>
          )}
          <div>
            <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Fecha</label>
            <input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Nota (opcional)</label>
            <input value={form.nota} onChange={e=>setForm({...form,nota:e.target.value})} placeholder="Ej: retiro parcial enero"/>
          </div>
        </div>

        {form.monto>0&&(
          <div style={{padding:"9px 12px",background:"var(--bg-tint-green)",border:"0.5px solid var(--border-success)",
            borderRadius:"var(--r-md)",marginBottom:12,fontSize:12,color:"var(--text-success)",fontWeight:500}}>
            {form.moneda==="ARS"
              ?<>Equivale a <strong>{fmtUSD(montoEnUSD)}</strong> al TC ${fmt(form.tcRetiro||tcActual)}</>
              :<>Equivale a <strong>${fmt(montoEnUSD*tcActual)}</strong> ARS al blue ${fmt(tcActual)}</>
            }
          </div>
        )}

        <button onClick={registrar} style={{
          fontSize:13,padding:"9px 20px",borderRadius:"var(--r-pill)",border:"none",
          background:"linear-gradient(135deg,#F47920,#5BAD41)",color:"#fff",
          fontWeight:600,cursor:"pointer",boxShadow:"0 4px 14px rgba(244,121,32,0.35)",
        }}>Registrar retiro</button>
      </div>

      {/* Por contenedor */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"16px 18px",marginBottom:"1.5rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:12}}>Detalle por contenedor</div>
        {[...(data.contenedores||[])].sort((a,b)=>b.id.localeCompare(a.id)).map(c=>{
          const ventasCont=(data.ventas||[]).filter(v=>v.contId===c.id);
          const facturadoUSD=ventasCont.reduce((a,v)=>a+ventaUSD(v,tcActual),0);
          const cobUSD=ventasCont.reduce((a,v)=>a+cobradoUSD(v,data.pagos),0);
          const costo=c.costoTotal||0;
          const enG=costo>0&&cobUSD>=costo;
          const ganancia=Math.max(0,cobUSD-costo);
          const ganPct=costo>0?(cobUSD-costo)/costo*100:0;
          const mi30c=ganancia*0.3;
          const pct=costo>0?Math.min(100,cobUSD/costo*100):0;
          return(
            <div key={c.id} style={{marginBottom:12,paddingBottom:12,borderBottom:"0.5px solid var(--glass-border)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{c.nombre}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,fontWeight:600,color:enG?"var(--text-success)":"var(--text-warning)"}}>Mi 30%: {fmtUSD(mi30c)}</div>
                  {enG&&<div style={{fontSize:11,color:"var(--text-success)"}}>+{ganPct.toFixed(1)}% ganancia</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:12,fontSize:11,color:"var(--text-secondary)",flexWrap:"wrap",marginBottom:6}}>
                <span>Facturado: <strong style={{color:"var(--text-primary)"}}>{fmtUSD(facturadoUSD)}</strong></span>
                <span>Costo: <strong style={{color:"var(--text-primary)"}}>{fmtUSD(costo)}</strong></span>
                <span style={{color:ganancia>0?"var(--text-success)":"var(--text-warning)"}}>
                  {ganancia>0?"Ganancia: "+fmtUSD(ganancia):"Faltan: "+fmtUSD(costo-facturadoUSD)+" para recuperar"}
                </span>
              </div>
              <div style={{height:4,background:"rgba(120,120,128,0.15)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:pct>=100?"var(--text-success)":"#F47920",borderRadius:2,transition:"width .5s"}}/>
              </div>
              <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:3}}>{fmtPct(pct)} de la inversión recuperado</div>
            </div>
          );
        })}
        {(data.contenedores||[]).length===0&&<div style={{fontSize:12,color:"var(--text-secondary)"}}>Sin contenedores.</div>}
      </div>

      {/* Historial */}
      {retiros.length>0&&(
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
          border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",
          padding:"16px 18px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",
            color:"var(--text-secondary)",marginBottom:12}}>Historial de retiros</div>
          {retiros.map(r=>(
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"9px 0",borderBottom:"0.5px solid var(--glass-border)"}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text-primary)"}}>
                  {fmtUSD(r.montoUSD)}{r.montoPesos?" · $"+fmt(r.montoPesos)+" ARS":""}
                </div>
                <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:2}}>
                  {r.fecha}{r.nota?" · "+r.nota:""}{r.tcRetiro?" · TC $"+fmt(r.tcRetiro):""}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,color:"var(--text-secondary)"}}>
                  ≈ ${fmt(r.montoUSD*tcActual)} ARS
                </div>
                <button onClick={()=>{if(window.confirm("¿Borrar este retiro?"))save({...data,retiros:data.retiros.filter(x=>x.id!==r.id)});}}
                  style={{fontSize:11,border:"none",background:"none",color:"var(--text-danger)",cursor:"pointer",marginTop:2}}>✕ borrar</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DespachosView({data,save,showToast}){
  const [manual,setManual]=useState(false);
  const [form,setForm]=useState({cliente:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:"",articulos:""});
  // Pendientes primero (newest first), luego despachados (newest first)
  const _allDesp=[...(data.despachos||[])].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)||(b.id||"").localeCompare(a.id||""));
  const _pendDesp=_allDesp.filter(d=>d.estado==="Pendiente");
  const _restDesp=_allDesp.filter(d=>d.estado!=="Pendiente");
  const despachos=[..._pendDesp,..._restDesp];
  const pendientes=_pendDesp;
  const agregarManual=()=>{
    if(!form.cliente)return;
    save({...data,despachos:[...(data.despachos||[]),{id:Date.now().toString(),fecha:hoy(),...form,estado:"Pendiente"}]});
    setForm({cliente:"",dni:"",direccion:"",localidad:"",provincia:"",expreso:"",articulos:""});
    setManual(false);showToast("Despacho agregado");
  };
  const actualizarEstado=(id,estado)=>save({...data,despachos:data.despachos.map(d=>d.id===id?{...d,estado}:d)});
  const calcularBultos=d=>{
    // Parsea "30GR x5, TINTA NEGRO x3" -> [{nombre,cantidad,esTinta}]
    if(!d.articulos)return[{...d,bultoLabel:"",bultoNum:1,bultoTotal:1}];
    const items=d.articulos.split(/,\s+(?=[A-Z0-9\d])/i).map(s=>{
      // Greedy: match nombre up to last " x N" at end
      const m=s.trim().match(/^(.+)\s+[xX×]\s*(\d+)$/);
      if(!m)return null;
      const nombre=m[1].trim();const cantidad=parseInt(m[2]);
      const esTinta=nombre.includes("TINTA");
      return{nombre,cantidad,esTinta};
    }).filter(Boolean);
    const rollos=items.filter(i=>!i.esTinta);
    const tintas=items.filter(i=>i.esTinta);
    const bultos=[];
    // 1 etiqueta por cada rollo individual
    rollos.forEach(r=>{
      for(let i=0;i<r.cantidad;i++){
        bultos.push({tipo:"rollo",desc:r.nombre});
      }
    });
    // Tintas: hasta 20 unidades por bulto
    const totalTintas=tintas.reduce((a,t)=>a+t.cantidad,0);
    const descTintas=tintas.map(t=>t.nombre.replace("TINTA ","")+" x"+t.cantidad).join(", ");
    if(totalTintas>0){
      const numBultosTinta=Math.ceil(totalTintas/20);
      for(let i=0;i<numBultosTinta;i++){
        const desde=i*20+1;const hasta=Math.min((i+1)*20,totalTintas);
        const label=numBultosTinta>1?"Tintas "+desde+"-"+hasta+" de "+totalTintas+" ("+descTintas+")":"Tintas ("+descTintas+")";
        bultos.push({tipo:"tinta",desc:label});
      }
    }
    // Si no hay artículos reconocibles, 1 bulto genérico
    if(bultos.length===0)return[{...d,bultoLabel:"",bultoNum:1,bultoTotal:1}];
    return bultos.map((b,i)=>({...d,bultoLabel:b.desc,bultoNum:i+1,bultoTotal:bultos.length}));
  };
  const CSS_ETIQUETA="*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:11px}"+
    ".page{display:flex;flex-wrap:wrap;gap:4mm;padding:5mm}"+
    ".r{border:1.5px solid #000;padding:4mm 5mm;width:95mm;page-break-inside:avoid;break-inside:avoid}"+
    ".dest{font-size:13px;font-weight:bold;margin-bottom:2mm}"+
    ".row{display:flex;gap:3mm;margin-bottom:1mm;line-height:1.3}"+
    ".t{color:#444;min-width:18mm;font-size:9px;text-transform:uppercase;padding-top:1px}"+
    ".v{font-weight:600;font-size:11px;flex:1}"+
    ".bulto{margin-top:3mm;padding-top:2mm;border-top:1px dashed #999;font-size:9px;color:#444;display:flex;justify-content:space-between}"+
    ".bnum{font-size:14px;font-weight:bold;color:#000}"+
    "@media print{body{margin:0}.page{padding:3mm;gap:3mm}}";
  const htmlEtiqueta=(b)=>{
    const total=b.bultoTotal||1;const num=b.bultoNum||1;
    return "<div class='r'>"+
      "<div class='dest'>"+(b.cliente||"")+"</div>"+
      "<div class='row'><div class='t'>DNI</div><div class='v'>"+(b.dni||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Dirección</div><div class='v'>"+(b.direccion||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Localidad</div><div class='v'>"+(b.localidad||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Provincia</div><div class='v'>"+(b.provincia||"—")+"</div></div>"+
      "<div class='row'><div class='t'>Expreso</div><div class='v'>"+(b.expreso||"—")+"</div></div>"+
      (b.bultoLabel?"<div class='bulto'><span>"+b.bultoLabel+"</span><span class='bnum'>"+num+"/"+total+"</span></div>":"")+
      "</div>";
  };
  const abrirPDF=(etiquetas,titulo)=>{
    const w=window.open("","_blank");
    if(!w)return;
    const body="<div class='page'>"+etiquetas.map(htmlEtiqueta).join("")+"</div>";
    w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><title>"+titulo+"</title><style>"+CSS_ETIQUETA+"</style></head><body>"+body+"<script>window.onload=()=>{setTimeout(()=>window.print(),300);}<\/script></body></html>");
    w.document.close();
  };
  const imprimirUno=desp=>{
    const bultos=calcularBultos(desp);
    abrirPDF(bultos,"Rótulo — "+desp.cliente);
  };
  const imprimirTodosPendientes=()=>{
    if(!pendientes.length){showToast("No hay pendientes");return;}
    const todasEtiquetas=pendientes.flatMap(d=>calcularBultos(d));
    const totalBultos=todasEtiquetas.length;
    abrirPDF(todasEtiquetas,"Rótulos — "+pendientes.length+" despachos");
    const nuevosDespachos=data.despachos.map(d=>pendientes.some(p=>p.id===d.id)?{...d,estado:"Despachado"}:d);
    save({...data,despachos:nuevosDespachos});
    showToast(pendientes.length+" despachos · "+totalBultos+" etiquetas generadas");
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
      <h2 style={{fontSize:18,fontWeight:500,margin:0}}>Despachos</h2>
      <div style={{display:"flex",gap:6}}>
        {pendientes.length>0&&<button onClick={imprimirTodosPendientes} style={{fontSize:11,padding:"6px 10px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-border-info)",color:"var(--color-background-primary)",fontWeight:500}}>🖨️ Imprimir {pendientes.length} pendientes</button>}
        <button onClick={()=>setManual(true)} style={{fontSize:12,padding:"6px 12px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>+ Manual</button>
      </div>
    </div>
    {manual&&(<div style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"1rem",marginBottom:"1rem"}}>
      <p style={{fontSize:13,fontWeight:500,margin:"0 0 8px"}}>Nuevo despacho manual</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Nombre completo</label><input value={form.cliente} onChange={e=>setForm({...form,cliente:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>DNI</label><input value={form.dni} onChange={e=>setForm({...form,dni:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Expreso</label><input value={form.expreso} onChange={e=>setForm({...form,expreso:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Dirección</label><input value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Localidad</label><input value={form.localidad} onChange={e=>setForm({...form,localidad:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Provincia</label><input value={form.provincia} onChange={e=>setForm({...form,provincia:e.target.value})} style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"var(--color-text-secondary)"}}>Artículos</label><input value={form.articulos} onChange={e=>setForm({...form,articulos:e.target.value})} placeholder="Ej: 30GR x5, 61GR x2" style={{width:"100%",marginTop:2,boxSizing:"border-box"}}/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={agregarManual} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"none",background:"var(--color-text-success)",color:"var(--color-background-primary)",fontWeight:500}}>Agregar</button>
        <button onClick={()=>setManual(false)} style={{fontSize:13,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:"var(--color-text-secondary)"}}>Cancelar</button>
      </div>
    </div>)}
    {despachos.length===0?<p style={{color:"var(--color-text-secondary)",fontSize:14}}>Sin despachos.</p>:(
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {despachos.map((d,i)=>(
          <React.Fragment key={d.id}>
          {i===_pendDesp.length&&_pendDesp.length>0&&_restDesp.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"4px 0"}}>
              <div style={{flex:1,height:"0.5px",background:"var(--glass-border)"}}/>
              <span style={{fontSize:10,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>Despachados / Retirados</span>
              <div style={{flex:1,height:"0.5px",background:"var(--glass-border)"}}/>
            </div>
          )}
          <div style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",
            border:d.estado==="Pendiente"?"1px solid #378ADD88":"0.5px solid var(--glass-border)",
            boxShadow:d.estado==="Pendiente"?"0 0 12px #378ADD44":"none",
            borderRadius:"var(--r-lg)",padding:"12px 1rem",
            opacity:d.estado==="Pendiente"?1:0.75}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <div style={{fontWeight:500,fontSize:14}}>{d.cliente}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:1}}>{d.fecha+" · "+(d.expreso||"Sin expreso")}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={d.estado||"Pendiente"} onChange={e=>actualizarEstado(d.id,e.target.value)} style={{fontSize:11,padding:"3px 6px",borderRadius:4}}><option>Pendiente</option><option>Despachado</option></select>
                <button onClick={()=>imprimirUno(d)} style={{fontSize:11,padding:"4px 10px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",whiteSpace:"nowrap"}}>🖨️</button>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{[d.direccion,d.localidad,d.provincia].filter(Boolean).join(" · ")+(d.dni?" · DNI "+d.dni:"")}</div>
            {d.articulos&&<div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>{d.articulos}</div>}
          </div>
          </React.Fragment>
        ))}
      </div>
    )}
  </div>);
}

  </script>

  <script>
    function runApp() {
      if(typeof Babel==="undefined"){showErr("Babel no cargó. Recargá la página.");return;}
      try{
        setMsg("Compilando…");
        var src=document.getElementById("src").textContent;
        var result=Babel.transform(src,{
          presets:[["react",{"runtime":"classic","pragma":"React.createElement"}]],
          filename:"app.jsx"
        });
        setMsg("Iniciando…");
        var {useState,useEffect,useRef}=React;
        var run=new Function("React","useState","useEffect","useRef",result.code+"\nreturn App;");
        var AppComp=run(React,useState,useEffect,useRef);
        var root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(AppComp));
        document.getElementById("loading").style.display="none";
        console.log("\u2713 App lista");
      }catch(e){console.error("Error:",e);showErr(e);}
    }
    if(document.readyState==="complete"){runApp();}
    else{window.addEventListener("load",runApp);}
  </script>
</body>
</html>
