  <script id="src" type="text/raw">
const {useState,useEffect,useRef}=React;

const fmt = n => Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtUSD = n => "USD "+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => Number(n||0).toFixed(1)+"%";
const pesoRollo = a => (Number(a.gramaje||0)/1000)*Number(a.ancho||0)*Number(a.largo||0);
const haceUnMes = () => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; };

function sortConts(conts,orden){
  if(!orden||orden.length===0)return[...conts].sort((a,b)=>b.id.localeCompare(a.id));
  const map=Object.fromEntries(conts.map(c=>[c.id,c]));
  const sorted=orden.map(id=>map[id]).filter(Boolean);
  const inOrden=new Set(orden);
  const nuevos=conts.filter(c=>!inOrden.has(c.id)).sort((a,b)=>b.id.localeCompare(a.id));
  return[...nuevos,...sorted];
}

async function fetchBlue(){
  try{const r=await fetch("https://dolarapi.com/v1/dolares/blue");const d=await r.json();return d.venta||d.compra||null;}catch{return null;}
}
function pagadoVenta(v,pagos){
  return Number(v.pago||0)+(pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
}
function cobradoUSD(v,pagos){
  const total=Number(v.total||0);if(total===0)return 0;
  return Number(v.usd||0)*Math.min(1,pagadoVenta(v,pagos)/total);
}
function stockDisp(contId,artNombre,ventas){
  return(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre).reduce((a,v)=>a+Number(v.cantidad),0);
}
function precioPromedioUltimoMes(contId,artNombre,ventas){
  const desde=haceUnMes();
  const vs=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&v.fecha>=desde&&Number(v.precioVenta||0)>0);
  if(!vs.length){const all=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&Number(v.precioVenta||0)>0);if(!all.length)return 0;return all.reduce((a,v)=>a+Number(v.precioVenta),0)/all.length;}
  return vs.reduce((a,v)=>a+Number(v.precioVenta),0)/vs.length;
}

function App(){
  const [data,setData]=useState(null);
  const [blue,setBlue]=useState(null);
  const [view,setView]=useState("dashboard");
  const [contSel,setContSel]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem("sc_status_theme")||"light");
  const [syncStatus,setSyncStatus]=useState("conectando");
  const [lastUpdate,setLastUpdate]=useState(null);

  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";localStorage.setItem("sc_status_theme",n);document.documentElement.setAttribute("data-theme",n);return n;});
  const logout=()=>{localStorage.removeItem("eliel_session");localStorage.removeItem("eliel_status_session");window.location.replace("login.html");};

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  useEffect(()=>{
    let unsub=null;
    (async()=>{
      setBlue(await fetchBlue());
      try{
        const db=window._fbDB;
        if(!db)throw new Error("Sin Firebase");
        const docRef=db.doc("eliel/datos");
        const snap=await docRef.get();
        if(snap.exists){
          const d=snap.data().payload;
          setData(d||{contenedores:[],ventas:[],pagos:[],retiros:[]});
        } else {
          setData({contenedores:[],ventas:[],pagos:[],retiros:[]});
        }
        setSyncStatus("ok");
        unsub=docRef.onSnapshot(snap=>{
          if(snap.exists){
            const d=snap.data().payload;
            if(d){setData(d);setLastUpdate(new Date());setSyncStatus("ok");}
          }
        });
      }catch(e){

}

// ── helpers stock clasificados ─────────────────────────────────────────────
const TINTA_NAMES=["NEGRO","CYAN","MAGENTA","AMARILLO"];
const TINTA_PRO_NAMES=["NEGRO PRO","CYAN PRO","MAGENTA PRO","AMARILLO PRO"];
function clasificarStock(stockUni){
  const papel={},cmyk={},cmykPro={};
  Object.entries(stockUni).filter(([,v])=>v>0).forEach(([n,c])=>{
    if(TINTA_PRO_NAMES.includes(n))cmykPro[n]=c;
    else if(TINTA_NAMES.includes(n))cmyk[n]=c;
    else papel[n]=c;
  });
  return{papel,cmyk,cmykPro};
}

                <div style={{fontSize:10,fontWeight:600,color:"var(--text-warning)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:8,paddingLeft:2}}>CMYK Pro</div>

                  {TINTA_PRO_NAMES.filter(n=>cmykPro[n]!==undefined).map(n=><TintaCard key={n} nombre={n} cant={cmykPro[n]||0} isPro={true}/>)}
                </div>
              </div>
            )}
          </div>
        </>
      )}

    </div>
  );
}

function ViewStock({stockUni,data}){
  const {papel,cmyk,cmykPro}=clasificarStock(stockUni);
  const totalPapel=Object.values(papel).reduce((a,v)=>a+v,0);
  const totalCMYK=Object.values(cmyk).reduce((a,v)=>a+v,0);
  const totalCMYKPro=Object.values(cmykPro).reduce((a,v)=>a+v,0);

  const tintaColor={NEGRO:"#636366",CYAN:"#2E86C1",MAGENTA:"#C2185B",AMARILLO:"#B8860B"};
  const tintaProColor={"NEGRO PRO":"#4A4A6A","CYAN PRO":"#1565C0","MAGENTA PRO":"#880E4F","AMARILLO PRO":"#6D4C00"};
  const tintaBg={NEGRO:"rgba(99,99,102,0.1)",CYAN:"rgba(46,134,193,0.12)",MAGENTA:"rgba(194,24,91,0.1)",AMARILLO:"rgba(184,134,11,0.1)"};
  const tintaProBg={"NEGRO PRO":"rgba(74,74,106,0.12)","CYAN PRO":"rgba(21,101,192,0.12)","MAGENTA PRO":"rgba(136,14,79,0.1)","AMARILLO PRO":"rgba(109,76,0,0.1)"};
  const tintaBorder={NEGRO:"rgba(99,99,102,0.22)",CYAN:"rgba(46,134,193,0.3)",MAGENTA:"rgba(194,24,91,0.25)",AMARILLO:"rgba(184,134,11,0.28)"};
  const tintaProBorder={"NEGRO PRO":"rgba(74,74,106,0.25)","CYAN PRO":"rgba(21,101,192,0.3)","MAGENTA PRO":"rgba(136,14,79,0.28)","AMARILLO PRO":"rgba(109,76,0,0.28)"};

  const SectionLabel=({children,color})=>(
    <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:color||"var(--text-secondary)",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:16,height:1,background:color||"var(--text-tertiary)",opacity:.5}}/>
      {children}
      <div style={{flex:1,height:1,background:color||"var(--text-tertiary)",opacity:.15}}/>
    </div>
  );

  const getDetalleConts=(art)=>(data.contenedores||[]).map(c=>{
    const enCont=(c.articulos||[]).find(a=>a.nombre===art);
    const disp=enCont?Math.max(0,Number(enCont.cantidad)-stockDisp(c.id,art,data.ventas)):0;
    return disp>0?{nombre:c.nombre,disp}:null;
  }).filter(Boolean);

  const PapelRow=([art,cant])=>{
    const detalle=getDetalleConts(art);
    const pctBar=totalPapel>0?Math.round((cant/totalPapel)*100):0;
    const alerta=pctBar<15?"danger":pctBar<30?"warning":"ok";
    const alertaColor=alerta==="danger"?"var(--text-danger)":alerta==="warning"?"var(--text-warning)":"var(--text-success)";
    const alertaBg=alerta==="danger"?"var(--bg-tint-red)":alerta==="warning"?"var(--bg-tint-amber)":"var(--bg-tint-green)";
    const alertaBorder=alerta==="danger"?"var(--color-border-danger)":alerta==="warning"?"var(--color-border-warning)":"var(--border-success)";
    return(
      <div key={art} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-xl)",padding:"18px 20px",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:15,color:"var(--text-primary)",letterSpacing:"-.01em",marginBottom:5}}>{art}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {detalle.map(d=>(
                <span key={d.nombre} style={{fontSize:10,padding:"2px 9px",borderRadius:"var(--r-pill)",background:"rgba(120,120,128,0.08)",border:"0.5px solid rgba(120,120,128,0.15)",color:"var(--text-secondary)"}}>
                  {d.nombre} · <strong style={{color:"var(--text-primary)"}}>{fmt(d.disp)}</strong>
                </span>
              ))}
            </div>
          </div>
          <div style={{textAlign:"right",marginLeft:16,flexShrink:0}}>
            <div style={{fontSize:36,fontWeight:700,letterSpacing:"-.04em",color:"var(--text-primary)",lineHeight:1}}>{fmt(cant)}</div>
            <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:3}}>rollos</div>
          </div>
        </div>
        <div style={{height:4,background:"rgba(120,120,128,0.1)",borderRadius:4,overflow:"hidden",marginBottom:8}}>
          <div style={{height:"100%",width:pctBar+"%",background:alertaColor,borderRadius:4,opacity:.75,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:10,color:"var(--text-tertiary)"}}>{pctBar}% del stock total de papel</div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:"var(--r-pill)",background:alertaBg,color:alertaColor,border:"0.5px solid "+alertaBorder}}>
            {alerta==="danger"?"⚠ STOCK BAJO":alerta==="warning"?"● Nivel medio":"● Nivel OK"}
          </span>
        </div>
      </div>
    );
  };

  const TintaRow=([art,cant],isPro)=>{
    const col=isPro?(tintaProColor[art]||"var(--text-info)"):(tintaColor[art]||"var(--text-info)");
    const bg=isPro?(tintaProBg[art]||"var(--bg-tint-blue)"):(tintaBg[art]||"var(--bg-tint-blue)");
    const brd=isPro?(tintaProBorder[art]||"var(--border-info)"):(tintaBorder[art]||"var(--border-info)");
    const detalle=getDetalleConts(art);
    const nombreCorto=art.replace(" PRO","");
    const totalRef=isPro?totalCMYKPro:totalCMYK;
    const pctBar=totalRef>0?Math.round((cant/totalRef)*100):0;
    return(
      <div key={art} style={{background:bg,backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",border:"0.5px solid "+brd,borderRadius:"var(--r-xl)",padding:"18px 20px",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:col,letterSpacing:".05em",textTransform:"uppercase",marginBottom:6}}>{nombreCorto}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {detalle.map(d=>(
                <span key={d.nombre} style={{fontSize:10,padding:"2px 9px",borderRadius:"var(--r-pill)",background:"rgba(120,120,128,0.08)",border:"0.5px solid rgba(120,120,128,0.12)",color:"var(--text-secondary)"}}>
                  {d.nombre} · <strong style={{color:"var(--text-primary)"}}>{fmt(d.disp)}</strong>
                </span>
              ))}
            </div>
          </div>
          <div style={{textAlign:"right",marginLeft:16,flexShrink:0}}>
            <div style={{fontSize:36,fontWeight:700,letterSpacing:"-.04em",color:col,lineHeight:1}}>{fmt(cant)}</div>
            <div style={{fontSize:10,color:col,opacity:.6,marginTop:3}}>unidades</div>
          </div>
        </div>
        <div style={{height:3,background:"rgba(120,120,128,0.1)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:pctBar+"%",background:col,borderRadius:3,opacity:.5,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
        </div>
      </div>
    );
  };

  const sinStock=totalPapel===0&&totalCMYK===0&&totalCMYKPro===0;

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:24,fontWeight:700,letterSpacing:"-.03em",margin:"0 0 3px",color:"var(--text-primary)"}}>Stock disponible</h2>
        <div style={{fontSize:12,color:"var(--text-secondary)"}}>Calculado en tiempo real desde Firebase</div>
      </div>

      {/* Totales */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:"2rem"}}>
        <div style={{background:"var(--bg-tint-green)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-xl)",padding:"18px 20px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--text-success)",marginBottom:8}}>📄 Total Papel</div>
          <div style={{fontSize:38,fontWeight:700,letterSpacing:"-.04em",color:"var(--text-success)",lineHeight:1}}>{fmt(totalPapel)}</div>
          <div style={{fontSize:10,color:"var(--text-success)",opacity:.7,marginTop:5}}>rollos disponibles</div>
        </div>
        <div style={{background:"var(--bg-tint-blue)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-xl)",padding:"18px 20px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--text-info)",marginBottom:8}}>🖨 CMYK Estándar</div>
          <div style={{fontSize:38,fontWeight:700,letterSpacing:"-.04em",color:"var(--text-info)",lineHeight:1}}>{fmt(totalCMYK)}</div>
          <div style={{fontSize:10,color:"var(--text-info)",opacity:.7,marginTop:5}}>unidades disponibles</div>
        </div>
        <div style={{background:"var(--bg-tint-amber)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--color-border-warning)",borderRadius:"var(--r-xl)",padding:"18px 20px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--text-warning)",marginBottom:8}}>✦ CMYK Pro</div>
          <div style={{fontSize:38,fontWeight:700,letterSpacing:"-.04em",color:"var(--text-warning)",lineHeight:1}}>{fmt(totalCMYKPro)}</div>
          <div style={{fontSize:10,color:"var(--text-warning)",opacity:.7,marginTop:5}}>unidades disponibles</div>
        </div>
      </div>

      {sinStock
        ?<div style={{padding:"4rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",borderRadius:"var(--r-xl)",border:"0.5px solid var(--glass-border)"}}>Sin stock disponible.</div>
        :<>
          {Object.keys(papel).length>0&&(
            <div style={{marginBottom:"2rem"}}>
              <SectionLabel color="var(--text-success)">Papel · por gramaje</SectionLabel>
              <div style={{display:"grid",gap:10}}>
                {Object.entries(papel).sort((a,b)=>b[1]-a[1]).map(e=>PapelRow(e))}
              </div>
            </div>
          )}
          {Object.keys(cmyk).length>0&&(
            <div style={{marginBottom:"2rem"}}>
              <SectionLabel color="var(--text-info)">Tinta CMYK Estándar</SectionLabel>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {TINTA_NAMES.filter(n=>cmyk[n]!==undefined).map(n=>TintaRow([n,cmyk[n]],false))}
              </div>
            </div>
          )}
          {Object.keys(cmykPro).length>0&&(
            <div style={{marginBottom:"2rem"}}>
              <SectionLabel color="var(--text-warning)">Tinta CMYK Pro</SectionLabel>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {TINTA_PRO_NAMES.filter(n=>cmykPro[n]!==undefined).map(n=>TintaRow([n,cmykPro[n]],true))}
              </div>
            </div>
          )}
        </>
      }
    </div>
  );
}

// ── COSTOS: contenedores ordenados más nuevo → más viejo ──────────────────

              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>

                      <th key={h} style={{padding:"5px 8px",textAlign:"left",fontWeight:500,fontSize:10,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {c.artsCostoDetalle.map(a=>(
                    <tr key={a.id||a.nombre} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>

                      <td style={{padding:"6px 8px",color:"var(--text-secondary)"}}>{fmtPct(a.pct)}</td>
                      <td style={{padding:"6px 8px",color:"var(--text-secondary)"}}>{fmtUSD(a.costoUnitario)}</td>
                      <td style={{padding:"6px 8px",fontWeight:500,color:"var(--text-primary)"}}>{"$"+fmt(a.costoUnitario*tc)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── VENTAS: ordenadas más nuevo → más viejo ───────────────────────────────
function ViewVentas({data}){
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [filtroArt,setFiltroArt]=useState("");
  const [filtroCont,setFiltroCont]=useState("");

  const ARTS_UNICOS=[...new Set((data.ventas||[]).map(v=>v.articulo))].filter(Boolean).sort();
  const CONTS_UNICOS=sortConts(data.contenedores||[],data.contenedoresOrden).map(c=>({id:c.id,nombre:c.nombre}));
  const stBg={"Retirado":"var(--bg-tint-green)","A despachar":"var(--bg-tint-blue)","Despachado":"var(--bg-tint-blue)","A retirar Ezeiza":"var(--bg-tint-amber)","A retirar Once":"var(--bg-tint-amber)"};
  const stCol={"Retirado":"var(--text-success)","A despachar":"var(--text-info)","Despachado":"var(--text-info)","A retirar Ezeiza":"var(--text-warning)","A retirar Once":"var(--text-warning)"};

  const ventas=[...(data.ventas||[])]
    .filter(v=>{
      if(desde&&v.fecha<desde)return false;
      if(hasta&&v.fecha>hasta)return false;
      if(filtroArt&&v.articulo!==filtroArt)return false;
      if(filtroCont&&v.contId!==filtroCont)return false;
      return true;
    })
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)||(b.id||"").localeCompare(a.id||""));

  const totalUSD=ventas.reduce((a,v)=>a+Number(v.usd||0),0);
  const totalU=ventas.reduce((a,v)=>a+Number(v.cantidad||0),0);
  const hayFiltros=desde||hasta||filtroArt||filtroCont;

  const Card=({l,v,info})=>(
    <div style={{background:info?"var(--bg-tint-blue)":"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:info?"0.5px solid var(--border-info)":"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"13px 15px",boxShadow:"var(--glass-shadow-sm)"}}>
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:info?"var(--text-info)":"var(--text-secondary)",marginBottom:6}}>{l}</div>
      <div style={{fontSize:20,fontWeight:600,letterSpacing:"-.02em",color:info?"var(--text-info)":"var(--text-primary)"}}>{v}</div>
    </div>
  );

  return(
    <div>
      <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 1rem",color:"var(--text-primary)"}}>Ventas</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        <Card l="Operaciones" v={fmt(ventas.length)}/>
        <Card l="Unidades" v={fmt(totalU)+" u"}/>
        <Card l="USD facturado" v={fmtUSD(totalUSD)} info/>
      </div>
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:10}}>Filtros</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:hayFiltros?10:0}}>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Artículo</label><select value={filtroArt} onChange={e=>setFiltroArt(e.target.value)}><option value="">Todos</option>{ARTS_UNICOS.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Contenedor</label><select value={filtroCont} onChange={e=>setFiltroCont(e.target.value)}><option value="">Todos</option>{CONTS_UNICOS.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></div>
        </div>
        {hayFiltros&&<button onClick={()=>{setDesde("");setHasta("");setFiltroArt("");setFiltroCont("");}} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>✕ Limpiar filtros</button>}
      </div>
      {ventas.length===0
        ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>Sin ventas para los filtros seleccionados.</div>
        :(()=>{
          // Group by pedidoId
          const pedMap=new Map();
          for(const v of ventas){
            const pid=v.pedidoId||v.id;
            if(!pedMap.has(pid))pedMap.set(pid,{pid,fecha:v.fecha,cliente:v.cliente,contId:v.contId,estado:v.estado,lineas:[],totalARS:0,totalUSD:0});
            const p=pedMap.get(pid);
            p.lineas.push(v);
            p.totalARS+=Number(v.total||0);
            p.totalUSD+=Number(v.usd||0);
            if(v.fecha>p.fecha)p.fecha=v.fecha;
          }
          const pedidos=[...pedMap.values()];
          return(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {pedidos.map(p=>{
                const cont=(data.contenedores||[]).find(c=>c.id===p.contId);
                const est=p.estado||"Retirado";
                return(
                  <div key={p.pid} style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",overflow:"hidden",boxShadow:"var(--glass-shadow-sm)"}}>
                    {/* Header del pedido */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"0.5px solid var(--glass-border)"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{p.cliente}</div>
                        <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:1}}>
                          {p.fecha}
                          {cont&&<span style={{marginLeft:6}}>· {cont.nombre.split(" ")[0]}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:"var(--text-primary)"}}>${fmt(p.totalARS)}</div>
                          <div style={{fontSize:11,color:"var(--text-info)",fontWeight:500}}>{fmtUSD(p.totalUSD)}</div>
                        </div>
                        <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:"var(--r-pill)",background:stBg[est]||"rgba(120,120,128,0.1)",color:stCol[est]||"var(--text-secondary)",whiteSpace:"nowrap"}}>{est}</span>
                      </div>
                    </div>
                    {/* Líneas del pedido */}
                    {p.lineas.map((v,i)=>(
                      <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 14px",borderBottom:i<p.lineas.length-1?"0.5px solid rgba(120,120,128,0.08)":"none",fontSize:12}}>
                        <div style={{flex:1,minWidth:0}}>
                          <span style={{color:"var(--text-primary)",fontWeight:500}}>{v.articulo}</span>
                          <span style={{color:"var(--text-secondary)",marginLeft:6}}>×{fmt(v.cantidad)}</span>
                        </div>
                        <div style={{display:"flex",gap:12,alignItems:"center",flexShrink:0}}>
                          {v.precioVenta>0&&(
                            <span style={{color:"var(--text-secondary)",fontSize:11}}>${fmt(v.precioVenta)}/u</span>
                          )}
                          {v.total>0&&(
                            <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(v.total)}</span>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          );
        })()
      }
    </div>
  );
}

  </script>

  <script>
    function runApp(){
      if(typeof Babel==="undefined"){showErr("Babel no cargó.");return;}
      try{
        setMsg("Iniciando…");
        var src=document.getElementById("src").textContent;
        var compiled=Babel.transform(src,{
          presets:[["react",{"runtime":"classic","pragma":"React.createElement"}]],
          filename:"status.jsx"
        }).code;
        var run=new Function("React","ReactDOM",compiled+"\nreturn App;");
        var AppComp=run(React,ReactDOM);
        var root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(AppComp));
        document.getElementById("loading").style.display="none";
      }catch(e){console.error(e);showErr(e);}
    }
    if(document.readyState==="complete"){runApp();}
    else{window.addEventListener("load",runApp);}
  </script>
</body>
</html>
