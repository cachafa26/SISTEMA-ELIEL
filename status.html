  <script id="src" type="text/raw">
const {useState,useEffect,useRef}=React;


const fmt = n => Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtUSD = n => "USD "+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => Number(n||0).toFixed(1)+"%";
const pesoRollo = a => (Number(a.gramaje||0)/1000)*Number(a.ancho||0)*Number(a.largo||0);
const haceUnMes = () => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; };

function sortConts(conts,orden){
  if(!orden||orden.length===0)return[...conts].sort((a,b)=>b.id.localeCompare(a.id));
  const map=Object.fromEntries(conts.map(c=>[c.id,c]));
  const sorted=orden.map(id=>map[id]).filter(Boolean);
  const inOrden=new Set(orden);
  const nuevos=conts.filter(c=>!inOrden.has(c.id)).sort((a,b)=>b.id.localeCompare(a.id));
  return[...nuevos,...sorted];
}

async function fetchBlue(){
  try{const r=await fetch("https://dolarapi.com/v1/dolares/blue");const d=await r.json();return d.venta||d.compra||null;}catch{return null;}
}
function pagadoVenta(v,pagos){
  return Number(v.pago||0)+(pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
}
function cobradoUSD(v,pagos){
  const total=Number(v.total||0);if(total===0)return 0;
  return Number(v.usd||0)*Math.min(1,pagadoVenta(v,pagos)/total);
}
function stockDisp(contId,artNombre,ventas){
  return(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre).reduce((a,v)=>a+Number(v.cantidad),0);
}
function precioPromedioUltimoMes(contId,artNombre,ventas){
  const desde=haceUnMes();
  const vs=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&v.fecha>=desde&&Number(v.precioVenta||0)>0);
  if(!vs.length){const all=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&Number(v.precioVenta||0)>0);if(!all.length)return 0;return all.reduce((a,v)=>a+Number(v.precioVenta),0)/all.length;}
  return vs.reduce((a,v)=>a+Number(v.precioVenta),0)/vs.length;
}

function App(){
  const [data,setData]=useState(null);
  const [blue,setBlue]=useState(null);
  const [view,setView]=useState("dashboard");
  const [contSel,setContSel]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem("sc_status_theme")||"light");
  const [syncStatus,setSyncStatus]=useState("conectando");
  const [lastUpdate,setLastUpdate]=useState(null);

  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";localStorage.setItem("sc_status_theme",n);document.documentElement.setAttribute("data-theme",n);return n;});
  const logout=()=>{localStorage.removeItem("eliel_session");localStorage.removeItem("eliel_status_session");window.location.replace("login.html");};

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  useEffect(()=>{
    let unsub=null;
    (async()=>{
      setBlue(await fetchBlue());
      try{
        const db=window._fbDB;
        if(!db)throw new Error("Sin Firebase");
        const docRef=db.doc("eliel/datos");
        const snap=await docRef.get();
        if(snap.exists){
          const d=snap.data().payload;
          setData(d||{contenedores:[],ventas:[],pagos:[],retiros:[]});
        } else {
          setData({contenedores:[],ventas:[],pagos:[],retiros:[]});
        }
        setSyncStatus("ok");
        unsub=docRef.onSnapshot(snap=>{
          if(snap.exists){

// ── Proyección de agotamiento ─────────────────────────────────────
function proyeccionAgot(artNombre,ventasAll,dispActual){
  const hoy=new Date();
  const hace60=new Date(hoy);hace60.setDate(hace60.getDate()-60);
  const h60=hace60.toISOString().split("T")[0];
  const v60=(ventasAll||[]).filter(v=>v.articulo===artNombre&&(v.fecha||"")>=h60).reduce((a,v)=>a+Number(v.cantidad||0),0);
  const vel=v60/60;
  if(dispActual<=0)return{tipo:"agotado"};
  if(vel<0.01)return{tipo:"sin_mov"};
  const dias=Math.round(dispActual/vel);
  const f=new Date(hoy);f.setDate(f.getDate()+dias);
  const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const label=dias>365?"> 1 año":`${f.getDate()} ${ms[f.getMonth()]} ${f.getFullYear()}`;
  return{tipo:"ok",dias,label,vel:vel.toFixed(2)};
}
function ProyTag({art,ventas,disp}){
  const p=proyeccionAgot(art,ventas,disp);
  if(p.tipo==="agotado"){
    const ventas_art=(ventas||[]).filter(v=>v.articulo===art&&Number(v.cantidad||0)>0);
    const ultima=ventas_art.length>0?[...ventas_art].sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""))[0].fecha:"";
    return <span style={{fontSize:10,color:"var(--text-danger)",fontWeight:600}}>Sin stock{ultima?" desde "+ultima:""}</span>;
  }
  if(p.tipo==="sin_mov")return <span style={{fontSize:10,color:"var(--text-secondary)"}}>Sin movimiento reciente</span>;
  const color=p.dias<30?"var(--text-danger)":p.dias<90?"var(--text-warning)":"var(--text-success)";
  return(
    <span style={{fontSize:10,color}}>
      Se agota ~{p.label} · {p.vel}u/día
    </span>
  );
}


// ── Gráfico de Facturación ────────────────────────────────────────
function GraficoFacturacion({ventas,ventasHistoricas}){
  const [modo,setModo]=React.useState("semanal");
  const [tooltip,setTooltip]=React.useState(null);
  const MODOS=[
    {id:"semanal",l:"Semanal"},
    {id:"6meses",l:"6 meses"},
    {id:"mensual",l:"Mensual"},
    {id:"anual",l:"Anual"},
    {id:"interanual",l:"Interanual"},
  ];
  const todasVentas=React.useMemo(()=>{
    const hist=(ventasHistoricas||[]).map(v=>{
      // Convert DD/MM/YYYY to YYYY-MM-DD if needed
      let f=v.fecha||"";
      if(f.includes("/")&&f.length===10){const[d,m,y]=f.split("/");f=`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;}
      return{...v,fecha:f,total:Number(v.total||0)};
    });
    const sys=(ventas||[]).map(v=>({...v,total:Number(v.total||0)}));
    return [...hist,...sys].filter(v=>v.fecha&&v.total>0);
  },[ventas,ventasHistoricas]);

  const puntos=React.useMemo(()=>{
    const hoy=new Date();
    const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    if(modo==="semanal"){
      const pts=[];
      for(let i=11;i>=0;i--){
        const d1=new Date(hoy);d1.setDate(d1.getDate()-i*7-6);
        const d2=new Date(hoy);d2.setDate(d2.getDate()-i*7);
        const s1=d1.toISOString().split("T")[0];const s2=d2.toISOString().split("T")[0];
        const tot=todasVentas.filter(v=>v.fecha>=s1&&v.fecha<=s2).reduce((a,v)=>a+v.total,0);
        const lbl=`${d1.getDate()}/${d1.getMonth()+1}–${d2.getDate()}/${d2.getMonth()+1}`;
        pts.push({lbl,tot,s1,s2});
      }
      return pts;
    }
    if(modo==="6meses"){
      const pts=[];
      for(let i=5;i>=0;i--){
        const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
        const y=d.getFullYear(),m=d.getMonth();
        const s1=`${y}-${String(m+1).padStart(2,"0")}-01`;
        const last=new Date(y,m+1,0);const s2=`${y}-${String(m+1).padStart(2,"0")}-${String(last.getDate()).padStart(2,"0")}`;
        const tot=todasVentas.filter(v=>v.fecha>=s1&&v.fecha<=s2).reduce((a,v)=>a+v.total,0);
        pts.push({lbl:`${ms[m]} ${y}`,tot,s1,s2});
      }
      return pts;
    }
    if(modo==="mensual"){
      const pts=[];
      for(let i=11;i>=0;i--){
        const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
        const y=d.getFullYear(),m=d.getMonth();
        const s1=`${y}-${String(m+1).padStart(2,"0")}-01`;
        const last=new Date(y,m+1,0);const s2=`${y}-${String(m+1).padStart(2,"0")}-${String(last.getDate()).padStart(2,"0")}`;
        const tot=todasVentas.filter(v=>v.fecha>=s1&&v.fecha<=s2).reduce((a,v)=>a+v.total,0);
        pts.push({lbl:`${ms[m]} ${String(y).slice(2)}`,tot,s1,s2});
      }
      return pts;
    }
    if(modo==="anual"){
      const años=[...new Set(todasVentas.map(v=>v.fecha.slice(0,4)))].sort();
      return años.map(y=>{
        const tot=todasVentas.filter(v=>v.fecha.startsWith(y)).reduce((a,v)=>a+v.total,0);
        return{lbl:y,tot,s1:`${y}-01-01`,s2:`${y}-12-31`};
      });
    }
    if(modo==="interanual"){
      // Same month each year
      const pts=[];
      const años=[...new Set(todasVentas.map(v=>v.fecha.slice(0,4)))].sort();
      const mesActual=hoy.getMonth();
      años.forEach(y=>{
        const m=mesActual;
        const s1=`${y}-${String(m+1).padStart(2,"0")}-01`;
        const last=new Date(Number(y),m+1,0);
        const s2=`${y}-${String(m+1).padStart(2,"0")}-${String(last.getDate()).padStart(2,"0")}`;
        const tot=todasVentas.filter(v=>v.fecha>=s1&&v.fecha<=s2).reduce((a,v)=>a+v.total,0);
        pts.push({lbl:`${ms[m]} ${y}`,tot,s1,s2});
      });
      return pts;
    }
    return[];
  },[modo,todasVentas]);

  const fmtM=v=>{
    if(v>=1000000)return "$"+(v/1000000).toFixed(1)+"M";
    if(v>=1000)return "$"+(v/1000).toFixed(0)+"K";
    return "$"+v;
  };
  const fmtFull=v=>"$"+Number(v).toLocaleString("es-AR",{maximumFractionDigits:0});

  const W=600,H=200,PAD={t:20,r:20,b:36,l:52};
  const gW=W-PAD.l-PAD.r,gH=H-PAD.t-PAD.b;
  const maxV=Math.max(...puntos.map(p=>p.tot),1);
  const pts=puntos.map((p,i)=>({
    x:PAD.l+i/(Math.max(puntos.length-1,1))*gW,
    y:PAD.t+gH-(p.tot/maxV)*gH,
    ...p
  }));

  const pathD=pts.length<2?"":pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD=pts.length<2?"":
    `M${pts[0].x.toFixed(1)},${(PAD.t+gH).toFixed(1)} `+
    pts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")+
    ` L${pts[pts.length-1].x.toFixed(1)},${(PAD.t+gH).toFixed(1)} Z`;

  const handleMove=(e,svgEl)=>{
    const rect=svgEl.getBoundingClientRect();
    const scaleX=W/rect.width;
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const cxS=cx*scaleX;
    let best=null,bestD=Infinity;
    pts.forEach(p=>{const d=Math.abs(p.x-cxS);if(d<bestD){bestD=d;best=p;}});
    if(best)setTooltip(best);
  };

  const gradId="gf"+modo;
  return(

        <div style={{background:"rgba(30,30,40,0.92)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 12px",marginBottom:10,display:"inline-block"}}>

        </div>
      )}
      {/* SVG Chart */}
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block",overflow:"visible"}}
        onMouseMove={e=>handleMove(e,e.currentTarget)}
        onMouseLeave={()=>setTooltip(null)}
        onTouchMove={e=>{e.preventDefault();handleMove(e,e.currentTarget);}} style={{touchAction:"none"}}
        onTouchEnd={()=>setTooltip(null)}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4a9eff" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#4a9eff" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {[0.25,0.5,0.75,1].map(f=>{
          const y=PAD.t+gH*(1-f);
          return(
            <g key={f}>
              <line x1={PAD.l} y1={y} x2={PAD.l+gW} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>

        {/* Area */}
        {areaD&&<path d={areaD} fill={`url(#${gradId})`}/>}
        {/* Line */}
        {pathD&&<path d={pathD} fill="none" stroke="#4a9eff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
        {/* X labels — show every Nth */}
        {pts.map((p,i)=>{
          const step=Math.ceil(pts.length/6);
          if(i%step!==0&&i!==pts.length-1)return null;
          return <text key={i} x={p.x} y={H-6} textAnchor="middle" fill="rgba(255,255,255,0.35)" fontSize="9">{p.lbl}</text>;
        })}
        {/* Dots + hover highlight */}
        {pts.map((p,i)=>{
          const active=tooltip&&tooltip.lbl===p.lbl;
          return(
            <g key={i}>
              {active&&<line x1={p.x} y1={PAD.t} x2={p.x} y2={PAD.t+gH} stroke="rgba(255,255,255,0.15)" strokeWidth="1" strokeDasharray="3,3"/>}

                strokeWidth={active?2:1}
                style={{transition:"r .1s,fill .1s"}}/>
            </g>
          );
        })}
      </svg>
      {!tooltip&&<div style={{fontSize:10,color:"rgba(255,255,255,0.25)",textAlign:"center",marginTop:4}}>Pasá el cursor o tocá el gráfico para ver el detalle</div>}
    </div>
  );
}

function ViewStock({stockUni,data}){
  const stockPapel={}, stockTinta={};
  let totalPapel=0, totalTinta=0;
  Object.entries(stockUni).filter(([,v])=>v>0).forEach(([nombre,cant])=>{
    if(nombre.includes("TINTA")){stockTinta[nombre]=cant;totalTinta+=cant;}
    else{stockPapel[nombre]=cant;totalPapel+=cant;}
  });
  const Row=([art,cant],esTinta)=>{
    const conts=(data.contenedores||[]).filter(c=>(c.articulos||[]).some(a=>a.nombre===art));
    const detalle=conts.map(c=>{
      const enCont=(c.articulos||[]).find(a=>a.nombre===art);
      const disp=enCont?Math.max(0,Number(enCont.cantidad)-stockDisp(c.id,art,data.ventas)):0;
      return disp>0?c.nombre+" ("+fmt(disp)+")":null;
    }).filter(Boolean).join(" · ");
    return(
      <div key={art} style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{art}</div>
          <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:2}}>{detalle}</div>
          <div style={{marginTop:4}}><ProyTag art={art} ventas={data.ventas} disp={cant}/></div>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:esTinta?"var(--text-info)":"var(--text-success)",marginLeft:12,flexShrink:0}}>{fmt(cant)}</div>
      </div>
    );
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:0,color:"var(--text-primary)"}}>Stock disponible</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.5rem"}}>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:6}}>📄 Total Papel</div>
          <div style={{fontSize:28,fontWeight:700,color:"var(--text-primary)"}}>{fmt(totalPapel)}</div>
          <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:2}}>rollos disponibles</div>
        </div>
        <div style={{background:"var(--bg-tint-blue)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:6}}>🖨️ Total Tinta</div>
          <div style={{fontSize:28,fontWeight:700,color:"var(--text-info)"}}>{fmt(totalTinta)}</div>
          <div style={{fontSize:11,color:"var(--text-info)",marginTop:2,opacity:.8}}>unidades disponibles</div>
        </div>
      </div>
      {totalPapel===0&&totalTinta===0
        ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin stock.</div>
        :<>
          {Object.keys(stockPapel).length>0&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:8}}>📄 Papeles</div>
              <div style={{display:"grid",gap:6}}>{Object.entries(stockPapel).sort((a,b)=>b[1]-a[1]).map(e=>Row(e,false))}</div>
            </div>
          )}
          {Object.keys(stockTinta).length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:8}}>🖨️ Tintas</div>
              <div style={{display:"grid",gap:6}}>{Object.entries(stockTinta).sort((a,b)=>b[1]-a[1]).map(e=>Row(e,true))}</div>
            </div>
          )}
        </>
      }
    </div>
  );
}

// ── VENTAS: ordenadas más nuevo → más viejo ───────────────────────────────
function ViewVentas({data}){
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [filtroArt,setFiltroArt]=useState("");
  const [filtroCont,setFiltroCont]=useState("");

  const ARTS_UNICOS=[...new Set((data.ventas||[]).map(v=>v.articulo))].filter(Boolean).sort();
  const CONTS_UNICOS=sortConts(data.contenedores||[],data.contenedoresOrden).map(c=>({id:c.id,nombre:c.nombre}));
  const stBg={"Retirado":"var(--bg-tint-green)","A despachar":"var(--bg-tint-blue)","Despachado":"var(--bg-tint-blue)","A retirar Ezeiza":"var(--bg-tint-amber)","A retirar Once":"var(--bg-tint-amber)"};
  const stCol={"Retirado":"var(--text-success)","A despachar":"var(--text-info)","Despachado":"var(--text-info)","A retirar Ezeiza":"var(--text-warning)","A retirar Once":"var(--text-warning)"};

  const ventas=[...(data.ventas||[])]
    .filter(v=>{
      if(desde&&v.fecha<desde)return false;
      if(hasta&&v.fecha>hasta)return false;
      if(filtroArt&&v.articulo!==filtroArt)return false;
      if(filtroCont&&v.contId!==filtroCont)return false;
      return true;
    })
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)||(b.id||"").localeCompare(a.id||""));

  const totalUSD=ventas.reduce((a,v)=>a+Number(v.usd||0),0);
  const totalU=ventas.reduce((a,v)=>a+Number(v.cantidad||0),0);
  const hayFiltros=desde||hasta||filtroArt||filtroCont;

  const Card=({l,v,info})=>(
    <div style={{background:info?"var(--bg-tint-blue)":"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:info?"0.5px solid var(--border-info)":"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"13px 15px",boxShadow:"var(--glass-shadow-sm)"}}>
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:info?"var(--text-info)":"var(--text-secondary)",marginBottom:6}}>{l}</div>
      <div style={{fontSize:20,fontWeight:600,letterSpacing:"-.02em",color:info?"var(--text-info)":"var(--text-primary)"}}>{v}</div>
    </div>
  );

  return(
    <div>
      <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 1rem",color:"var(--text-primary)"}}>Ventas</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        <Card l="Operaciones" v={fmt(ventas.length)}/>
        <Card l="Unidades" v={fmt(totalU)+" u"}/>
        <Card l="USD facturado" v={fmtUSD(totalUSD)} info/>
      </div>
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:10}}>Filtros</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:hayFiltros?10:0}}>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Artículo</label><select value={filtroArt} onChange={e=>setFiltroArt(e.target.value)}><option value="">Todos</option>{ARTS_UNICOS.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Contenedor</label><select value={filtroCont} onChange={e=>setFiltroCont(e.target.value)}><option value="">Todos</option>{CONTS_UNICOS.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></div>
        </div>
        {hayFiltros&&<button onClick={()=>{setDesde("");setHasta("");setFiltroArt("");setFiltroCont("");}} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>✕ Limpiar filtros</button>}
      </div>
      {ventas.length===0
        ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>Sin ventas para los filtros seleccionados.</div>
        :(()=>{
          // Group by pedidoId
          const pedMap=new Map();
          for(const v of ventas){
            const pid=v.pedidoId||v.id;
            if(!pedMap.has(pid))pedMap.set(pid,{pid,fecha:v.fecha,cliente:v.cliente,contId:v.contId,estado:v.estado,lineas:[],totalARS:0,totalUSD:0});
            const p=pedMap.get(pid);
            p.lineas.push(v);
            p.totalARS+=Number(v.total||0);
            p.totalUSD+=Number(v.usd||0);
            if(v.fecha>p.fecha)p.fecha=v.fecha;
          }
          const pedidos=[...pedMap.values()];
          return(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {pedidos.map(p=>{
                const cont=(data.contenedores||[]).find(c=>c.id===p.contId);
                const est=p.estado||"Retirado";
                return(
                  <div key={p.pid} style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",overflow:"hidden",boxShadow:"var(--glass-shadow-sm)"}}>
                    {/* Header del pedido */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"0.5px solid var(--glass-border)"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{p.cliente}</div>
                        <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:1}}>
                          {p.fecha}
                          {cont&&<span style={{marginLeft:6}}>· {cont.nombre.split(" ")[0]}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:"var(--text-primary)"}}>${fmt(p.totalARS)}</div>
                          <div style={{fontSize:11,color:"var(--text-info)",fontWeight:500}}>{fmtUSD(p.totalUSD)}</div>
                        </div>
                        <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:"var(--r-pill)",background:stBg[est]||"rgba(120,120,128,0.1)",color:stCol[est]||"var(--text-secondary)",whiteSpace:"nowrap"}}>{est}</span>
                      </div>
                    </div>
                    {/* Líneas del pedido */}
                    {p.lineas.map((v,i)=>(
                      <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 14px",borderBottom:i<p.lineas.length-1?"0.5px solid rgba(120,120,128,0.08)":"none",fontSize:12}}>
                        <div style={{flex:1,minWidth:0}}>
                          <span style={{color:"var(--text-primary)",fontWeight:500}}>{v.articulo}</span>
                          <span style={{color:"var(--text-secondary)",marginLeft:6}}>×{fmt(v.cantidad)}</span>
                        </div>
                        <div style={{display:"flex",gap:12,alignItems:"center",flexShrink:0}}>
                          {v.precioVenta>0&&(
                            <span style={{color:"var(--text-secondary)",fontSize:11}}>${fmt(v.precioVenta)}/u</span>
                          )}
                          {v.total>0&&(
                            <span style={{fontWeight:600,color:"var(--text-primary)"}}>${fmt(v.total)}</span>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          );
        })()
      }
    </div>
  );
}

  </script>

  <script>
    function runApp(){
      if(typeof Babel==="undefined"){showErr("Babel no cargó.");return;}
      try{
        setMsg("Iniciando…");
        var src=document.getElementById("src").textContent;
        var compiled=Babel.transform(src,{
          presets:[["react",{"runtime":"classic","pragma":"React.createElement"}]],
          filename:"status.jsx"
        }).code;
        var run=new Function("React","ReactDOM",compiled+"\nreturn App;");
        var AppComp=run(React,ReactDOM);
        var root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(AppComp));
        document.getElementById("loading").style.display="none";
      }catch(e){console.error(e);showErr(e);}
    }
    if(document.readyState==="complete"){runApp();}
    else{window.addEventListener("load",runApp);}
  </script>
</body>
</html>
