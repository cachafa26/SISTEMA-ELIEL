<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#F47920"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="light-content"/>
  <meta name="apple-mobile-web-app-title" content="SC Status"/>
  <title>Status Super Coating</title>
  <style>
    /* ── LIQUID GLASS DESIGN SYSTEM ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;min-height:100%}
    
    body{
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:var(--bg-base);color:var(--text-primary);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      transition:background .3s,color .3s;
    }

    /* ── LIGHT MODE ─────────────────────────────────────────────────── */
    :root{
      /* SC Brand colors from logo */
      --sc-orange:#F47920;
      --sc-green:#5BAD41;
      --sc-blue:#2E86C1;
      --sc-gradient:linear-gradient(135deg,#F47920 0%,#5BAD41 50%,#2E86C1 100%);
      --sc-gradient-soft:linear-gradient(135deg,rgba(244,121,32,0.12) 0%,rgba(91,173,65,0.12) 50%,rgba(46,134,193,0.12) 100%);

      /* Backgrounds */
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);
      --bg-modal:rgba(255,255,255,0.92);
      --bg-tint-green:rgba(91,173,65,0.12);
      --bg-tint-orange:rgba(244,121,32,0.12);
      --bg-tint-blue:rgba(46,134,193,0.12);
      --bg-tint-red:rgba(220,53,69,0.10);
      --bg-tint-amber:rgba(255,149,0,0.12);
      --bg-overlay:rgba(0,0,0,0.45);

      /* Glass effect */
      --glass-blur:blur(20px) saturate(1.8);
      --glass-border:rgba(255,255,255,0.55);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.7) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.07),0 1px 0 rgba(255,255,255,0.6) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 1.5px 0 rgba(255,255,255,0.65) inset;

      /* Text */
      --text-primary:#1C1C1E;
      --text-secondary:#636366;
      --text-tertiary:#AEAEB2;
      --text-success:#1A7F3C;
      --text-warning:#B25000;
      --text-danger:#C0392B;
      --text-info:#1A5FA5;
      --text-on-color:#fff;

      /* Borders */
      --border-sm:0.5px solid rgba(0,0,0,0.10);
      --border-md:0.5px solid rgba(0,0,0,0.16);
      --border-card:0.5px solid rgba(255,255,255,0.8);
      --border-input:0.5px solid rgba(0,0,0,0.18);
      --border-focus:rgba(46,134,193,0.6);
      --border-success:rgba(91,173,65,0.4);
      --border-danger:rgba(192,57,43,0.3);

      /* Radius */
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-pill:100px;

      /* Semantic aliases (keep old names working) */
      --font-sans:"Inter",-apple-system,sans-serif;
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(240,242,245,0.8);
      --color-background-tertiary:var(--bg-base);
      --color-background-success:var(--bg-tint-green);
      --color-background-warning:var(--bg-tint-amber);
      --color-background-danger:var(--bg-tint-red);
      --color-background-info:var(--bg-tint-blue);
      --color-text-primary:var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-tertiary:var(--text-tertiary);
      --color-text-success:var(--text-success);
      --color-text-warning:var(--text-warning);
      --color-text-danger:var(--text-danger);
      --color-text-info:var(--text-info);
      --color-border-tertiary:rgba(0,0,0,0.08);
      --color-border-secondary:rgba(0,0,0,0.14);
      --color-border-primary:rgba(0,0,0,0.28);
      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);
      --color-border-info:rgba(46,134,193,0.4);
      --color-border-warning:rgba(178,80,0,0.3);
      --border-radius-md:var(--r-md);
      --border-radius-lg:var(--r-lg);
      --border-radius-xl:var(--r-xl);
    }

    /* ── DARK MODE ───────────────────────────────────────────────────── */
    @media(prefers-color-scheme:dark){:root{
      --bg-base:#0E0E10;
      --bg-elevated:rgba(28,28,30,0.85);
      --bg-card:rgba(28,28,30,0.72);
      --bg-card-hover:rgba(44,44,46,0.85);
      --bg-input:rgba(44,44,46,0.8);
      --bg-nav:rgba(18,18,20,0.85);
      --bg-modal:rgba(28,28,30,0.95);
      --bg-tint-green:rgba(91,173,65,0.18);
      --bg-tint-orange:rgba(244,121,32,0.18);
      --bg-tint-blue:rgba(46,134,193,0.18);
      --bg-tint-red:rgba(220,53,69,0.16);
      --bg-tint-amber:rgba(255,149,0,0.16);
      --glass-border:rgba(255,255,255,0.12);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.45),0 1px 0 rgba(255,255,255,0.08) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.08) inset;
      --text-primary:#F2F2F7;
      --text-secondary:#AEAEB2;
      --text-tertiary:#636366;
      --text-success:#5BAD41;
      --text-warning:#F47920;
      --text-danger:#FF6B6B;
      --text-info:#5B9BD5;
      --border-sm:0.5px solid rgba(255,255,255,0.10);
      --border-md:0.5px solid rgba(255,255,255,0.14);
      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
    }}
    html[data-theme="dark"]{
      --bg-base:#0E0E10;
      --bg-elevated:rgba(28,28,30,0.85);
      --bg-card:rgba(28,28,30,0.72);
      --bg-card-hover:rgba(44,44,46,0.85);
      --bg-input:rgba(44,44,46,0.8);
      --bg-nav:rgba(18,18,20,0.85);
      --bg-modal:rgba(28,28,30,0.95);
      --bg-tint-green:rgba(91,173,65,0.18);
      --bg-tint-orange:rgba(244,121,32,0.18);
      --bg-tint-blue:rgba(46,134,193,0.18);
      --bg-tint-red:rgba(220,53,69,0.16);
      --bg-tint-amber:rgba(255,149,0,0.16);
      --glass-border:rgba(255,255,255,0.12);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.45),0 1px 0 rgba(255,255,255,0.08) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.08) inset;
      --text-primary:#F2F2F7;
      --text-secondary:#AEAEB2;
      --text-tertiary:#636366;
      --text-success:#5BAD41;
      --text-warning:#F47920;
      --text-danger:#FF6B6B;
      --text-info:#5B9BD5;
      --border-sm:0.5px solid rgba(255,255,255,0.10);
      --border-md:0.5px solid rgba(255,255,255,0.14);
      --border-card:0.5px solid rgba(255,255,255,0.10);
      --border-input:0.5px solid rgba(255,255,255,0.16);
      --color-background-primary:var(--bg-card);
      --color-background-secondary:rgba(28,28,30,0.6);
      --color-background-tertiary:var(--bg-base);
      --color-background-success:var(--bg-tint-green);
      --color-background-warning:var(--bg-tint-amber);
      --color-background-danger:var(--bg-tint-red);
      --color-background-info:var(--bg-tint-blue);
      --color-text-primary:var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-tertiary:var(--text-tertiary);
      --color-text-success:var(--text-success);
      --color-text-warning:var(--text-warning);
      --color-text-danger:var(--text-danger);
      --color-text-info:var(--text-info);
      --color-border-tertiary:rgba(255,255,255,0.08);
      --color-border-secondary:rgba(255,255,255,0.14);
    }
    html[data-theme="light"]{
      --bg-base:#F0F2F5;
      --bg-elevated:rgba(255,255,255,0.72);
      --bg-card:rgba(255,255,255,0.65);
      --bg-card-hover:rgba(255,255,255,0.85);
      --bg-input:rgba(255,255,255,0.8);
      --bg-nav:rgba(255,255,255,0.78);
      --bg-modal:rgba(255,255,255,0.92);
      --bg-tint-green:rgba(91,173,65,0.12);
      --bg-tint-orange:rgba(244,121,32,0.12);
      --bg-tint-blue:rgba(46,134,193,0.12);
      --bg-tint-red:rgba(220,53,69,0.10);
      --bg-tint-amber:rgba(255,149,0,0.12);
      --glass-border:rgba(255,255,255,0.55);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.7) inset;
      --glass-shadow-sm:0 2px 12px rgba(0,0,0,0.07),0 1px 0 rgba(255,255,255,0.6) inset;
      --glass-shadow-lg:0 20px 60px rgba(0,0,0,0.14),0 1.5px 0 rgba(255,255,255,0.65) inset;
      --text-primary:#1C1C1E;
      --text-secondary:#636366;
      --text-tertiary:#AEAEB2;
      --text-success:#1A7F3C;
      --text-warning:#B25000;
      --text-danger:#C0392B;
      --text-info:#1A5FA5;
      --border-sm:0.5px solid rgba(0,0,0,0.10);
      --border-md:0.5px solid rgba(0,0,0,0.16);
      --border-card:0.5px solid rgba(255,255,255,0.8);
      --border-input:0.5px solid rgba(0,0,0,0.18);
      --border-focus:rgba(46,134,193,0.6);
      --border-success:rgba(91,173,65,0.4);
      --border-danger:rgba(192,57,43,0.3);
      --color-background-primary:rgba(255,255,255,0.65);
      --color-background-secondary:rgba(240,242,245,0.8);
      --color-background-tertiary:#F0F2F5;
      --color-background-success:rgba(91,173,65,0.12);
      --color-background-warning:rgba(255,149,0,0.12);
      --color-background-danger:rgba(220,53,69,0.10);
      --color-background-info:rgba(46,134,193,0.12);
      --color-text-primary:#1C1C1E;
      --color-text-secondary:#636366;
      --color-text-tertiary:#AEAEB2;
      --color-text-success:#1A7F3C;
      --color-text-warning:#B25000;
      --color-text-danger:#C0392B;
      --color-text-info:#1A5FA5;
      --color-border-tertiary:rgba(0,0,0,0.08);
      --color-border-secondary:rgba(0,0,0,0.14);
      --color-border-primary:rgba(0,0,0,0.28);
      --color-border-success:rgba(91,173,65,0.4);
      --color-border-danger:rgba(192,57,43,0.3);
      --color-border-info:rgba(46,134,193,0.4);
      --color-border-warning:rgba(178,80,0,0.3);
    }

    /* ── GLOBAL AMBIENT BACKGROUND ──────────────────────────────────── */
    body::before{
      content:"";position:fixed;inset:0;z-index:-1;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%,rgba(244,121,32,0.18) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 20%,rgba(91,173,65,0.14) 0%,transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 90%,rgba(46,134,193,0.16) 0%,transparent 70%),
        var(--bg-base);
      pointer-events:none;
    }

    /* ── GLASS CARD ─────────────────────────────────────────────────── */
    .glass{
      background:var(--bg-card);
      backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
    }
    .glass-sm{
      background:var(--bg-card);
      backdrop-filter:blur(12px) saturate(1.6);
      -webkit-backdrop-filter:blur(12px) saturate(1.6);
      border:0.5px solid var(--glass-border);
      box-shadow:var(--glass-shadow-sm);
    }
    .glass-nav{
      background:var(--bg-nav);
      backdrop-filter:blur(24px) saturate(2);
      -webkit-backdrop-filter:blur(24px) saturate(2);
      border-bottom:0.5px solid var(--glass-border);
    }

    /* ── INPUTS ─────────────────────────────────────────────────────── */
    input,select,textarea{
      font-family:inherit;font-size:14px;padding:9px 12px;
      border:var(--border-input);border-radius:var(--r-sm);
      background:var(--bg-input);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      color:var(--text-primary);outline:none;
      transition:border-color .15s,box-shadow .15s;width:100%;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--border-focus);
      box-shadow:0 0 0 3px rgba(46,134,193,0.15);
    }
    input::placeholder{color:var(--text-tertiary)}

    /* ── BUTTONS ─────────────────────────────────────────────────────── */
    button{font-family:inherit;cursor:pointer;}
    .btn-primary{
      background:var(--sc-gradient);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(244,121,32,0.3);
      transition:transform .12s,box-shadow .12s,opacity .12s;
      letter-spacing:0.01em;
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,121,32,0.4);}
    .btn-primary:active{transform:translateY(0);opacity:.9;}
    .btn-glass{
      background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:var(--border-card);color:var(--text-primary);
      padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;
      box-shadow:var(--glass-shadow-sm);transition:transform .12s,box-shadow .12s;
    }
    .btn-glass:hover{transform:translateY(-1px);box-shadow:var(--glass-shadow);}
    .btn-danger{
      background:var(--bg-tint-red);color:var(--text-danger);
      border:0.5px solid var(--border-danger);
      padding:6px 12px;border-radius:var(--r-pill);font-size:12px;font-weight:500;
    }
    .btn-success{
      background:linear-gradient(135deg,#5BAD41,#3D8B2A);color:#fff;border:none;
      padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
      box-shadow:0 4px 16px rgba(91,173,65,0.35);
      transition:transform .12s,box-shadow .12s;
    }
    .btn-success:hover{transform:translateY(-1px);}

    /* ── PILLS / BADGES ─────────────────────────────────────────────── */
    .pill{display:inline-flex;align-items:center;padding:3px 10px;font-size:11px;font-weight:500;border-radius:var(--r-pill);}
    .pill-green{background:var(--bg-tint-green);color:var(--text-success);}
    .pill-orange{background:var(--bg-tint-orange);color:var(--text-warning);}
    .pill-blue{background:var(--bg-tint-blue);color:var(--text-info);}
    .pill-red{background:var(--bg-tint-red);color:var(--text-danger);}
    .pill-gray{background:rgba(120,120,128,0.12);color:var(--text-secondary);}

    /* ── PROGRESS BAR ───────────────────────────────────────────────── */
    .progress-track{height:5px;background:rgba(120,120,128,0.15);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

    /* ── TABLE ──────────────────────────────────────────────────────── */
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;
      color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;
      border-bottom:var(--border-sm);}
    td{padding:9px 10px;border-bottom:var(--border-sm);color:var(--text-primary);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(120,120,128,0.05);}

    /* ── LOADING ─────────────────────────────────────────────────────── */
    #loading{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;z-index:9999;
      background:var(--bg-base);
    }
    #loading::before{
      content:"";position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%,rgba(244,121,32,0.2) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%,rgba(91,173,65,0.16) 0%,transparent 70%);
    }
    .spin{
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid rgba(120,120,128,0.15);
      border-top-color:var(--sc-orange);
      animation:sp .7s linear infinite;z-index:1;
    }
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading p{font-size:13px;color:var(--text-secondary);z-index:1;font-weight:500;}
    #loading .brand{
      font-size:22px;font-weight:700;letter-spacing:-.02em;z-index:1;
      background:var(--sc-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* ── ERROR ───────────────────────────────────────────────────────── */
    #err{display:none;position:fixed;inset:0;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;background:var(--bg-base);padding:2rem;text-align:center;z-index:9999}
    #err h3{color:var(--text-danger);font-size:15px;margin-bottom:8px}
    #err pre{font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-width:500px;
      background:var(--bg-card);padding:12px;border-radius:var(--r-md);max-height:300px;overflow:auto;text-align:left;border:var(--border-sm)}
    #err button{margin-top:8px;padding:9px 20px;border:none;background:var(--sc-gradient);color:#fff;border-radius:var(--r-pill);font-size:13px;font-weight:600;cursor:pointer}

    /* ── SCROLLBAR ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(120,120,128,0.3);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(120,120,128,0.5)}

    /* ── TOAST ───────────────────────────────────────────────────────── */
    .toast{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:var(--border-card);box-shadow:var(--glass-shadow-lg);
      padding:10px 20px;border-radius:var(--r-pill);
      font-size:13px;font-weight:500;color:var(--text-primary);
      animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
    }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

    /* ── MODAL ───────────────────────────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;z-index:1000;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:flex-start;justify-content:center;
      overflow-y:auto;padding:1rem;
    }
    .modal-box{
      background:var(--bg-modal);backdrop-filter:blur(40px) saturate(2);-webkit-backdrop-filter:blur(40px) saturate(2);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-lg);
      border-radius:var(--r-xl);width:100%;max-width:560px;padding:24px;
      margin:auto;animation:modalIn .3s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* ── SC HEADER GRADIENT ──────────────────────────────────────────── */
    .sc-header{
      background:var(--sc-gradient);
      padding:3px 12px 3px 4px;border-radius:var(--r-pill);
      display:inline-flex;align-items:center;gap:6px;
    }
    .sc-header span{color:#fff;font-weight:700;font-size:12px;letter-spacing:.02em;}

    /* ── METRIC CARD ─────────────────────────────────────────────────── */
    .metric-card{
      background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:0.5px solid var(--glass-border);box-shadow:var(--glass-shadow-sm);
      border-radius:var(--r-lg);padding:14px 16px;
    }
    .metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:6px;}

  <script id="src" type="text/raw">
const {useState,useEffect,useRef}=React;

// ── helpers ───────────────────────────────────────────────────────────────
const fmt = n => Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtUSD = n => "USD "+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => Number(n||0).toFixed(1)+"%";
const pesoRollo = a => (Number(a.gramaje||0)/1000)*Number(a.ancho||0)*Number(a.largo||0);
const haceUnMes = () => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; };

async function fetchBlue(){
  try{const r=await fetch("https://dolarapi.com/v1/dolares/blue");const d=await r.json();return d.venta||d.compra||null;}catch{return null;}
}
function pagadoVenta(v,pagos){
  return Number(v.pago||0)+(pagos||[]).filter(p=>p.ventaId===v.id).reduce((a,p)=>a+Number(p.monto),0);
}
function cobradoUSD(v,pagos){
  const total=Number(v.total||0);if(total===0)return 0;
  return Number(v.usd||0)*Math.min(1,pagadoVenta(v,pagos)/total);
}
function stockDisp(contId,artNombre,ventas){
  return(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre).reduce((a,v)=>a+Number(v.cantidad),0);
}
function precioPromedioUltimoMes(contId,artNombre,ventas){
  const desde=haceUnMes();
  const vs=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&v.fecha>=desde&&Number(v.precioVenta||0)>0);
  if(!vs.length){const all=(ventas||[]).filter(v=>v.contId===contId&&v.articulo===artNombre&&Number(v.precioVenta||0)>0);if(!all.length)return 0;return all.reduce((a,v)=>a+Number(v.precioVenta),0)/all.length;}
  return vs.reduce((a,v)=>a+Number(v.precioVenta),0)/vs.length;
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(null);
  const [blue,setBlue]=useState(null);

  const [lastUpdate,setLastUpdate]=useState(null);

  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";localStorage.setItem("sc_status_theme",n);document.documentElement.setAttribute("data-theme",n);return n;});
  const logout=()=>{localStorage.removeItem("eliel_session");localStorage.removeItem("eliel_status_session");window.location.replace("login.html");};

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
  },[theme]);

  useEffect(()=>{
    let unsub=null;
    (async()=>{
      setBlue(await fetchBlue());
      try{
        const db=window._fbDB;
        if(!db)throw new Error("Sin Firebase");
        const docRef=db.doc("eliel/datos");
        const snap=await docRef.get();
        if(snap.exists){
          const d=snap.data().payload;
          setData(d||{contenedores:[],ventas:[],pagos:[],retiros:[]});
        } else {
          setData({contenedores:[],ventas:[],pagos:[],retiros:[]});
        }
        setSyncStatus("ok");
        // Escuchar cambios en tiempo real
        unsub=docRef.onSnapshot(snap=>{
          if(snap.exists){
            const d=snap.data().payload;
            if(d){setData(d);setLastUpdate(new Date());setSyncStatus("ok");}
          }
        });
      }catch(e){
        console.error(e);
        setSyncStatus("error");
        setData({contenedores:[],ventas:[],pagos:[],retiros:[]});
      }
    })();
    return()=>{if(unsub)unsub();};

      {/* TOP NAV */}

        position:"sticky",top:0,zIndex:50,
        background:"var(--bg-nav)",
        backdropFilter:"blur(24px) saturate(2)",WebkitBackdropFilter:"blur(24px) saturate(2)",
        borderBottom:"0.5px solid var(--glass-border)",
        padding:"0 1rem",display:"flex",alignItems:"center",gap:0,minHeight:52,overflowX:"auto",
      }}>
        {/* Brand */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginRight:16,flexShrink:0}}>
          <div style={{
            width:28,height:28,borderRadius:8,flexShrink:0,
            background:"linear-gradient(135deg,#F47920,#5BAD41,#2E86C1)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:14,fontWeight:900,color:"#fff",
            boxShadow:"0 2px 8px rgba(244,121,32,0.4)",
          }}>S</div>
          <div>
            <div style={{
              fontSize:13,fontWeight:700,letterSpacing:"-.01em",lineHeight:1.1,
              background:"linear-gradient(135deg,#F47920,#5BAD41,#2E86C1)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
            }}>Super Coating</div>
            <div style={{fontSize:9,fontWeight:600,color:"var(--text-secondary)",letterSpacing:".06em",textTransform:"uppercase"}}>Status · Tiempo real</div>
          </div>
        </div>

        {/* Nav tabs */}
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>{setView(n.id);setContSel(null);}}
            style={{
              background:"none",border:"none",padding:"14px 12px",cursor:"pointer",
              fontSize:12,fontWeight:view===n.id?600:400,
              color:view===n.id?"var(--text-primary)":"var(--text-secondary)",
              borderBottom:view===n.id?"2px solid var(--sc-orange)":"2px solid transparent",
              whiteSpace:"nowrap",transition:"color .15s",
            }}>
            {n.label}
          </button>
        ))}

        {/* Right */}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          <div style={{
            fontSize:10,fontWeight:500,padding:"4px 9px",borderRadius:"var(--r-pill)",
            background:syncStatus==="ok"?"var(--bg-tint-green)":"var(--bg-tint-amber)",
            color:syncStatus==="ok"?"var(--text-success)":"var(--text-warning)",
            border:syncStatus==="ok"?"0.5px solid var(--border-success)":"0.5px solid rgba(244,121,32,0.3)",
          }}>
            {syncStatus==="ok"?"● en vivo":"⚠ sin sync"}
          </div>
          {lastUpdate&&<div style={{fontSize:10,color:"var(--text-secondary)"}}>
            {lastUpdate.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}

          <button onClick={toggleTheme} style={{width:30,height:30,borderRadius:"50%",border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",flexShrink:0}}>
            {theme==="dark"?"☀️":"🌙"}
          </button>
          <button onClick={logout} title="Cerrar sesión" style={{width:30,height:30,borderRadius:"50%",border:"0.5px solid var(--glass-border)",background:"var(--bg-card)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",flexShrink:0,color:"var(--text-secondary)"}}>⏻</button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"1rem",maxWidth:900,margin:"0 auto",paddingBottom:20}}>
        {view==="dashboard"&&<ViewDashboard data={data} stockUni={stockUni} setView={setView} lastUpdate={lastUpdate}/>}
        {view==="stock"&&<ViewStock stockUni={stockUni} data={data}/>}
        {view==="ventas"&&<ViewVentas data={data}/>}
        {view==="costos"&&<ViewCostos data={data} blue={blue} tcActual={tcActual}/>}
      </div>
    </div>
  );
}

// ── TARJETA MÉTRICA ────────────────────────────────────────────────────────
function Metric({label,value,sub,green,warn,info}){
  const bg=green?"var(--bg-tint-green)":warn?"var(--bg-tint-amber)":info?"var(--bg-tint-blue)":"var(--bg-card)";
  const col=green?"var(--text-success)":warn?"var(--text-warning)":info?"var(--text-info)":"var(--text-primary)";
  const border=green?"0.5px solid var(--border-success)":warn?"0.5px solid rgba(244,121,32,0.3)":info?"0.5px solid var(--border-info)":"0.5px solid var(--glass-border)";
  return(
    <div style={{
      background:bg,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
      border:border,borderRadius:"var(--r-lg)",padding:"13px 15px",
      boxShadow:"var(--glass-shadow-sm)",
    }}>
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:green||warn||info?col:"var(--text-secondary)",marginBottom:6}}>{label}</div>
      <div style={{fontSize:20,fontWeight:600,letterSpacing:"-.02em",color:col}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:col,opacity:0.75,marginTop:3}}>{sub}</div>}
    </div>
  );
}

// ── BARRA DE PROGRESO ──────────────────────────────────────────────────────
function BarraProgreso({pct,enGanancia}){
  return(
    <div style={{height:5,background:"rgba(120,120,128,0.15)",borderRadius:3,overflow:"hidden",margin:"8px 0"}}>
      <div style={{height:"100%",width:Math.min(100,pct)+"%",background:enGanancia?"var(--text-success)":"var(--sc-blue,#2E86C1)",borderRadius:3,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function ViewDashboard({data,stockUni,lastUpdate,setView}){
  const conts=data.contenedores||[];
  const stockTotal=Object.values(stockUni).reduce((a,v)=>a+v,0);
  const resumen=conts.map(c=>{
    const cobUSD=(data.ventas||[]).filter(v=>v.contId===c.id).reduce((a,v)=>a+cobradoUSD(v,data.pagos),0);
    const costo=c.costoTotal||0;
    const pct=costo>0?Math.min(100,(cobUSD/costo)*100):0;
    const enG=costo>0&&cobUSD>=costo;
    const stockCont=Object.values(
      (c.articulos||[]).reduce((acc,art)=>{
        acc[art.nombre]=Math.max(0,Number(art.cantidad)-stockDisp(c.id,art.nombre,data.ventas));
        return acc;
      },{})
    ).reduce((a,v)=>a+v,0);
    return{c,cobUSD,costo,pct,enG,stockCont};
  });

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem"}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 2px",color:"var(--text-primary)"}}>Status Super Coating</h1>
          <p style={{fontSize:12,color:"var(--text-secondary)",margin:0}}>Datos en tiempo real · Solo lectura</p>
        </div>
        {lastUpdate&&<div style={{fontSize:10,color:"var(--text-secondary)",textAlign:"right"}}>
          Actualizado<br/>{lastUpdate.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
        </div>}
      </div>

      {/* Stock total único */}
      <div style={{background:"var(--bg-tint-green)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--border-success)",borderRadius:"var(--r-lg)",boxShadow:"var(--glass-shadow-sm)",padding:"14px 18px",marginBottom:"1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text-success)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Stock total disponible</div>
          <div style={{fontSize:28,fontWeight:700,letterSpacing:"-.03em",color:"var(--text-success)"}}>{fmt(stockTotal)} <span style={{fontSize:14}}>unidades</span></div>
        </div>
        <button onClick={()=>setView("stock")} style={{fontSize:12,padding:"7px 14px",border:"0.5px solid var(--color-text-success)",borderRadius:"var(--r-md)",background:"none",color:"var(--text-success)",cursor:"pointer"}}>Ver detalle →</button>
      </div>

      {/* Estado por contenedor */}
      <div style={{fontSize:10,fontWeight:600,color:"var(--text-secondary)",marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>Estado por contenedor</div>
      <div style={{display:"grid",gap:8}}>
        {resumen.map(({c,cobUSD,costo,pct,enG,stockCont})=>(
          <div key={c.id} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"14px 16px",cursor:"pointer"}}
            onClick={()=>setView("stock")}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontWeight:500,fontSize:14,color:"var(--text-primary)"}}>{c.nombre}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:500,color:"var(--text-secondary)"}}>{fmt(stockCont)} u</span>
                <span style={{fontSize:11,padding:"2px 9px",borderRadius:20,
                  background:enG?"var(--bg-tint-green)":costo===0?"rgba(120,120,128,0.1)":"var(--bg-tint-amber)",
                  color:enG?"var(--text-success)":costo===0?"var(--text-secondary)":"var(--text-warning)",fontWeight:500}}>
                  {costo===0?"Activo":enG?"✓ Recuperado":fmtPct(pct)+" recuperado"}
                </span>
              </div>
            </div>
            {costo>0&&<BarraProgreso pct={pct} enGanancia={enG}/>}
          </div>
        ))}
        {resumen.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin contenedores.</div>}
      </div>
    </div>
  );
}


// ── CONTENEDORES ───────────────────────────────────────────────────────────
function ViewContenedores({data,stockUni,blue,tcActual,setContSel}){
  const conts=data.contenedores||[];
  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 1rem",color:"var(--text-primary)"}}>Contenedores</h2>
      <div style={{display:"grid",gap:10}}>
        {conts.map(c=>{
          const ventasCont=(data.ventas||[]).filter(v=>v.contId===c.id);
          const cobUSD=ventasCont.reduce((a,v)=>a+cobradoUSD(v,data.pagos),0);
          const costo=c.costoTotal||0;
          const pct=costo>0?Math.min(100,(cobUSD/costo)*100):0;
          const enG=costo>0&&cobUSD>=costo;
          const stockCont={};
          (c.articulos||[]).forEach(art=>{
            const sd=Math.max(0,Number(art.cantidad)-stockDisp(c.id,art.nombre,data.ventas));
            if(sd>0)stockCont[art.nombre]=sd;
          });
          const totalStockCont=Object.values(stockCont).reduce((a,v)=>a+v,0);
          const fobTot=(c.articulos||[]).reduce((a,x)=>a+Number(x.precio||0)*Number(x.cantidad),0);

          // Proyección si no está en ganancia
          let proyeccion=null;
          if(!enG&&costo>0){
            let stockRestARS=0;
            const tc_=Number(c.costos?.tipoCambioFijado||c.costos?.tipoCambio||tcActual);
            for(const art of(c.articulos||[])){
              const sd=Math.max(0,Number(art.cantidad)-stockDisp(c.id,art.nombre,data.ventas));
              if(sd>0){const prom=precioPromedioUltimoMes(c.id,art.nombre,data.ventas);if(prom>0)stockRestARS+=sd*prom;}
            }
            const stockRestUSD=stockRestARS/tc_;
            const ganFutura=Math.max(0,cobUSD+stockRestUSD-costo);
            proyeccion={stockRestUSD,ganFutura};
          }

          return(
            <div key={c.id} style={{background:"var(--bg-card)",backdropFilter:"blur(16px) saturate(1.8)",WebkitBackdropFilter:"blur(16px) saturate(1.8)",border:"0.5px solid var(--glass-border)",boxShadow:"var(--glass-shadow-sm)",borderRadius:"var(--r-lg)",padding:"16px 18px",cursor:"pointer"}}
              onClick={()=>setContSel(c)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:15,fontWeight:500,color:"var(--text-primary)",marginBottom:2}}>{c.nombre}</div>
                  <div style={{fontSize:11,color:"var(--text-secondary)"}}>{(c.articulos||[]).length} artículos · {fmt(totalStockCont)} u en stock</div>
                </div>
                <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,
                  background:enG?"var(--bg-tint-green)":costo===0?"rgba(120,120,128,0.1)":"var(--bg-tint-amber)",
                  color:enG?"var(--text-success)":costo===0?"var(--text-secondary)":"var(--text-warning)",fontWeight:500}}>
                  {costo===0?"Sin costo":enG?"✓ En ganancia":fmtPct(pct)}
                </span>
              </div>

              {costo>0&&(
                <>
                  <BarraProgreso pct={pct} enGanancia={enG}/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginTop:10}}>
                    {[
                      {l:"Inversión total",v:fmtUSD(costo)},
                      {l:"Cobrado",v:fmtUSD(cobUSD),ok:cobUSD>0},
                      {l:enG?"Ganancia":"Falta cobrar",v:fmtUSD(enG?cobUSD-costo:costo-cobUSD),green:enG,warn:!enG},
                      {l:"FOB original",v:fmt(fobTot)+" ¥"},
                    ].map(x=>(
                      <div key={x.l} style={{background:"rgba(120,120,128,0.08)",borderRadius:"var(--r-md)",padding:"8px 10px"}}>
                        <div style={{fontSize:10,color:"var(--text-secondary)",marginBottom:2}}>{x.l}</div>
                        <div style={{fontSize:13,fontWeight:500,color:x.green?"var(--text-success)":x.warn?"var(--text-warning)":"var(--text-primary)"}}>{x.v}</div>
                      </div>
                    ))}
                  </div>
                  {proyeccion&&(
                    <div style={{marginTop:10,padding:"10px 12px",background:"var(--bg-tint-blue)",borderRadius:"var(--r-md)"}}>
                      <div style={{fontSize:11,color:"var(--text-info)",marginBottom:4,fontWeight:500}}>📊 Proyección si se vende el stock restante</div>
                      <div style={{display:"flex",gap:16,fontSize:12}}>
                        <span style={{color:"var(--text-info)"}}>Stock restante est.: <strong>{fmtUSD(proyeccion.stockRestUSD)}</strong></span>
                        <span style={{color:proyeccion.ganFutura>0?"var(--text-success)":"var(--text-secondary)"}}>Ganancia est.: <strong>{fmtUSD(proyeccion.ganFutura)}</strong></span>
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}
        {conts.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin contenedores.</div>}
      </div>
    </div>
  );
}

// ── STOCK UNIFICADO ────────────────────────────────────────────────────────
function ViewStock({stockUni,data}){
  const stockPapel={}, stockTinta={};
  let totalPapel=0, totalTinta=0;
  Object.entries(stockUni).filter(([,v])=>v>0).forEach(([nombre,cant])=>{
    if(nombre.includes("TINTA")){stockTinta[nombre]=cant;totalTinta+=cant;}
    else{stockPapel[nombre]=cant;totalPapel+=cant;}
  });
  const Row=([art,cant],esTinta)=>{
    const conts=(data.contenedores||[]).filter(c=>(c.articulos||[]).some(a=>a.nombre===art));
    const detalle=conts.map(c=>{
      const enCont=(c.articulos||[]).find(a=>a.nombre===art);
      const disp=enCont?Math.max(0,Number(enCont.cantidad)-stockDisp(c.id,art,data.ventas)):0;
      return disp>0?c.nombre+" ("+fmt(disp)+")":null;
    }).filter(Boolean).join(" · ");
    return(
      <div key={art} style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{art}</div>
          <div style={{fontSize:10,color:"var(--text-secondary)",marginTop:2}}>{detalle}</div>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:esTinta?"var(--text-info)":"var(--text-success)",marginLeft:12}}>{fmt(cant)}</div>
      </div>
    );
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:"-.02em",margin:0,color:"var(--text-primary)"}}>Stock disponible</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.5rem"}}>
        <div style={{background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:6}}>📄 Total Papel</div>
          <div style={{fontSize:28,fontWeight:700,color:"var(--text-primary)"}}>{fmt(totalPapel)}</div>
          <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:2}}>rollos disponibles</div>
        </div>
        <div style={{background:"var(--bg-tint-blue)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--border-info)",borderRadius:"var(--r-lg)",padding:"14px 16px",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:6}}>🖨️ Total Tinta</div>
          <div style={{fontSize:28,fontWeight:700,color:"var(--text-info)"}}>{fmt(totalTinta)}</div>
          <div style={{fontSize:11,color:"var(--text-info)",marginTop:2,opacity:.8}}>unidades disponibles</div>
        </div>
      </div>
      {totalPapel===0&&totalTinta===0
        ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13}}>Sin stock.</div>
        :<>
          {Object.keys(stockPapel).length>0&&(
            <div style={{marginBottom:"1.5rem"}}>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:8}}>📄 Papeles</div>
              <div style={{display:"grid",gap:6}}>{Object.entries(stockPapel).sort((a,b)=>b[1]-a[1]).map(e=>Row(e,false))}</div>
            </div>
          )}
          {Object.keys(stockTinta).length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-info)",marginBottom:8}}>🖨️ Tintas</div>
              <div style={{display:"grid",gap:6}}>{Object.entries(stockTinta).sort((a,b)=>b[1]-a[1]).map(e=>Row(e,true))}</div>
            </div>
          )}
        </>
      }
    </div>
  );
}

// ── VENTAS SOLO LECTURA ─────────────────────────────────────────────────
function ViewVentas({data}){
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [filtroArt,setFiltroArt]=useState("");
  const [filtroCont,setFiltroCont]=useState("");
  const fmtUSD=n=>"USD "+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmt=n=>Number(n||0).toLocaleString("es-AR");

  const ARTS_UNICOS=[...new Set((data.ventas||[]).map(v=>v.articulo))].filter(Boolean).sort();
  const CONTS_UNICOS=[...(data.contenedores||[])].sort((a,b)=>b.id.localeCompare(a.id)).map(c=>({id:c.id,nombre:c.nombre}));
  const stBg={"Retirado":"var(--bg-tint-green)","A despachar":"var(--bg-tint-blue)","Despachado":"var(--bg-tint-blue)","A retirar Ezeiza":"var(--bg-tint-amber)","A retirar Once":"var(--bg-tint-amber)"};
  const stCol={"Retirado":"var(--text-success)","A despachar":"var(--text-info)","Despachado":"var(--text-info)","A retirar Ezeiza":"var(--text-warning)","A retirar Once":"var(--text-warning)"};

  const ventas=[...(data.ventas||[])]
    .filter(v=>{
      if(desde&&v.fecha<desde)return false;
      if(hasta&&v.fecha>hasta)return false;
      if(filtroArt&&v.articulo!==filtroArt)return false;
      if(filtroCont&&v.contId!==filtroCont)return false;
      return true;
    })
    .sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const totalUSD=ventas.reduce((a,v)=>a+Number(v.usd||0),0);
  const totalU=ventas.reduce((a,v)=>a+Number(v.cantidad||0),0);
  const hayFiltros=desde||hasta||filtroArt||filtroCont;

  const Card=({l,v,info})=>(
    <div style={{background:info?"var(--bg-tint-blue)":"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:info?"0.5px solid var(--border-info)":"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"13px 15px",boxShadow:"var(--glass-shadow-sm)"}}>
      <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:info?"var(--text-info)":"var(--text-secondary)",marginBottom:6}}>{l}</div>
      <div style={{fontSize:20,fontWeight:600,letterSpacing:"-.02em",color:info?"var(--text-info)":"var(--text-primary)"}}>{v}</div>
    </div>
  );

  return(
    <div>
      <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.02em",margin:"0 0 1rem",color:"var(--text-primary)"}}>Ventas</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:"1.25rem"}}>
        <Card l="Operaciones" v={fmt(ventas.length)}/>
        <Card l="Unidades" v={fmt(totalU)+" u"}/>
        <Card l="USD facturado" v={fmtUSD(totalUSD)} info/>
      </div>

      {/* Filtros */}
      <div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",padding:"14px 16px",marginBottom:"1rem",boxShadow:"var(--glass-shadow-sm)"}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text-secondary)",marginBottom:10}}>Filtros</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:hayFiltros?10:0}}>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Artículo</label><select value={filtroArt} onChange={e=>setFiltroArt(e.target.value)}><option value="">Todos</option>{ARTS_UNICOS.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
          <div><label style={{fontSize:11,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Contenedor</label><select value={filtroCont} onChange={e=>setFiltroCont(e.target.value)}><option value="">Todos</option>{CONTS_UNICOS.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></div>
        </div>
        {hayFiltros&&<button onClick={()=>{setDesde("");setHasta("");setFiltroArt("");setFiltroCont("");}} style={{fontSize:11,padding:"5px 12px",borderRadius:"var(--r-pill)",border:"0.5px solid var(--glass-border)",background:"none",color:"var(--text-secondary)",cursor:"pointer"}}>✕ Limpiar filtros</button>}
      </div>

      {ventas.length===0
        ?<div style={{padding:"3rem",textAlign:"center",color:"var(--text-secondary)",fontSize:13,background:"var(--bg-card)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)"}}>Sin ventas para los filtros seleccionados.</div>
        :<div style={{background:"var(--bg-card)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"0.5px solid var(--glass-border)",borderRadius:"var(--r-lg)",overflow:"hidden",boxShadow:"var(--glass-shadow-sm)"}}>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr>{["Fecha","Contenedor","Artículo","Cant.","Cliente","USD","Estado"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {ventas.map(v=>{
                  const cont=(data.contenedores||[]).find(c=>c.id===v.contId);
                  const est=v.estado||"Retirado";
                  return(<tr key={v.id}>
                    <td style={{fontSize:11,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{v.fecha}</td>
                    <td style={{fontSize:11,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{cont?.nombre?.split(" ")[0]||"—"}</td>
                    <td style={{fontWeight:500,whiteSpace:"nowrap"}}>{v.articulo}</td>
                    <td style={{color:"var(--text-secondary)"}}>{fmt(v.cantidad)}</td>
                    <td style={{whiteSpace:"nowrap"}}>{v.cliente}</td>
                    <td style={{fontWeight:500,color:"var(--text-info)",whiteSpace:"nowrap"}}>{fmtUSD(v.usd||0)}</td>
                    <td><span style={{fontSize:10,fontWeight:500,padding:"2px 8px",borderRadius:"var(--r-pill)",background:stBg[est]||"rgba(120,120,128,0.1)",color:stCol[est]||"var(--text-secondary)"}}>{est}</span></td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      }
    </div>
  );
}

  </script>

  <script>
    function runApp(){
      if(typeof Babel==="undefined"){showErr("Babel no cargó.");return;}
      try{
        setMsg("Iniciando…");
        var src=document.getElementById("src").textContent;
        var compiled=Babel.transform(src,{
          presets:[["react",{"runtime":"classic","pragma":"React.createElement"}]],
          filename:"status.jsx"
        }).code;
        var run=new Function("React","ReactDOM",compiled+"\nreturn App;");
        var AppComp=run(React,ReactDOM);
        var root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(AppComp));
        document.getElementById("loading").style.display="none";
      }catch(e){console.error(e);showErr(e);}
    }
    if(document.readyState==="complete"){runApp();}
    else{window.addEventListener("load",runApp);}
  </script>
</body>
</html>
